<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suivi de colis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- En-tête -->
  <header class="bg-white shadow-md py-4 px-6 flex items-center justify-between">
    <div class="text-xl font-bold text-pink-600">📦 TrackFast</div>
    <nav class="flex items-center gap-4 text-gray-600 text-sm">
      <div class="cursor-pointer hover:text-black">Français ▼</div>
      <div class="cursor-pointer hover:text-black">Profil</div>
    </nav>
  </header>

  <!-- Section principale -->
  <main class="flex-grow flex flex-col justify-center items-center px-6 text-center mt-10">
    <div class="max-w-md w-full">
      <span class="inline-block mb-4 text-pink-600 font-semibold border border-pink-200 px-4 py-1 rounded-full text-xs">
        Sécurité & Livraison rapide
      </span>
      <h1 class="text-3xl font-bold text-gray-800 mb-4 leading-tight">
        Suivez votre colis facilement
      </h1>
      <p class="text-gray-500 mb-6">
        Entrez votre numéro de suivi et recevez les mises à jour en temps réel sur la livraison de votre colis.
      </p>
      <form class="flex flex-col gap-4">
        <input
          type="text"
          placeholder="Numéro de suivi"
          class="w-full p-4 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-400"
        />
        <button
          type="submit"
          class="w-full bg-pink-600 text-white font-semibold py-4 rounded-xl hover:bg-pink-700 transition">
          🔍 Suivre le colis
        </button>
      </form>
    </div>
  </main>

  <!-- Pied de page -->
  <footer class="text-center text-gray-400 text-sm py-6">
    © 2025 TrackFast. Tous droits réservés.
  </footer>

</body>
</html>
