<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Suivi de colis - ELZ Track</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: url('https://images.unsplash.com/photo-1604147706284-26ab6f3f5797?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
      background-size: cover;
    }

    .glass {
      backdrop-filter: blur(20px);
      background-color: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }

    .glass input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
  </style>
</head>
<body class="text-white font-sans">

  <!-- Header -->
  <header class="glass flex items-center justify-between p-4 px-6 fixed w-full top-0 z-50">
    <div class="text-2xl font-bold">📦 ELZ Track</div>
    <nav class="hidden md:flex gap-6 text-sm">
      <a href="#" class="hover:underline">Accueil</a>
      <a href="#" class="hover:underline">Services</a>
      <a href="#" class="hover:underline">PME</a>
      <a href="#" class="hover:underline">Contact</a>
    </nav>
    <div class="flex items-center gap-4">
      <span class="hidden sm:inline">Mathieu Denis</span>
      <img src="https://i.pravatar.cc/40" alt="Profil" class="w-10 h-10 rounded-full border border-white/30">
    </div>
  </header>

  <!-- Main content -->
  <main class="flex flex-col items-center justify-center min-h-screen px-4 pt-32 pb-10">
    <div class="glass w-full max-w-2xl rounded-2xl p-8">
      <h1 class="text-4xl font-bold mb-6 text-center text-white drop-shadow">Suivi de votre colis</h1>
      <form class="space-y-4">
        <label for="tracking" class="block text-sm font-medium text-white/80">Numéro de suivi</label>
        <input
          type="text"
          id="tracking"
          name="tracking"
          placeholder="Ex : 1Z999AA10123456784"
          class="w-full px-5 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
        >
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 transition py-3 rounded-xl font-semibold text-white shadow-lg"
        >
          Rechercher
        </button>
      </form>
    </div>
  </main>

</body>
</html>
