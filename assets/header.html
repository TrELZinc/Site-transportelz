
  <style>
    html {
      background-color: #f4f4f4;
    }

    body {
      margin: 0;
      padding-top: calc(60px + env(safe-area-inset-top));
      background-color: #f4f4f4;
      font-family: 'Segoe UI', sans-serif;
    }

    header {
      position: fixed;
      transition: transform 0.3s ease;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #111;
      color: white;
      padding-top: env(safe-area-inset-top);
      height: calc(60px + env(safe-area-inset-top));
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-left: 20px;
      padding-right: 20px;
      box-sizing: border-box;
      z-index: 9999;
    }

    .header-logo img {
      height: 40px;
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      z-index: 10001;
    }

    .hamburger div {
      width: 25px;
      height: 3px;
      background-color: white;
      transition: all 0.3s ease;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 25px;
      position: fixed;
      top: 0;
      right: -100%;
      height: 100vh;
      width: 280px;
      background-color: #111;
      padding: 80px 25px 30px;
      box-shadow: -6px 0 20px rgba(0, 0, 0, 0.5);
      transition: right 0.3s ease;
      z-index: 10000;
      overflow-y: auto;
    }

    .nav-links.show {
      right: 0;
    }

    .nav-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-title {
      color: #84b6f4;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 4px;
      text-transform: uppercase;
      border-bottom: 1px solid #333;
      padding-bottom: 3px;
    }

    .nav-links a {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      background-color: #1a1a1a;
      padding: 10px 14px;
      border-radius: 8px;
      transition: background 0.3s, transform 0.2s;
    }

    .nav-links a:hover {
      background-color: #0d6efd;
      transform: translateX(5px);
    }

    .nav-links a::before {
      content: "👉";
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-logo">
      <img src="assets/logo.jpeg" alt="Logo ELZ">
    </div>

    <div class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('show')">
      <div></div><div></div><div></div>
    </div>

    <nav class="nav-links">
      <button onclick="document.querySelector('.nav-links').classList.remove('show')" 
        style="background:none; border:none; color:white; font-size:1.8rem; align-self:flex-end; cursor:pointer;">
        &times;
      </button>

      <div class="nav-section">
        <div class="nav-title">Dispatch</div>
        <a href="dispos.html">Disponibilités</a>
        <a href="sommaire.html">Sommaire</a>
      </div>

      <div class="nav-section">
        <div class="nav-title">Réparations</div>
        <a href="garage.html">Garage</a>
        <a href="equipements.html">Flotte</a>
      </div>

      <div class="nav-section">
        <div class="nav-title">Administration</div>
        <a href="mathieu.html">Paye</a>
        <a href="permis.html">Permis</a>
        <a href="cartes.html">Cartes à fuel</a>
      </div>
      </nav>
      <script>
  let lastScroll = 0;
  const header = document.querySelector("header");

  window.addEventListener("scroll", () => {
    const currentScroll = window.pageYOffset;

    if (currentScroll > lastScroll && currentScroll > 60) {
      // Scroll vers le bas → cache le header
      header.style.transform = "translateY(-100%)";
    } else {
      // Scroll vers le haut → montre le header
      header.style.transform = "translateY(0)";
    }

    lastScroll = currentScroll;
  });
</script>
    
  </header>
