<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transport ELZ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f4f4;
      padding-top: 70px;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background-color: #111;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
    }

    .header-logo img {
      height: 45px;
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
    }

    .hamburger span {
      width: 25px;
      height: 3px;
      background-color: white;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    nav.nav-links {
      position: fixed;
      top: 0;
      right: -100%;
      height: 100vh;
      width: 280px;
      background-color: #111;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 80px 25px;
      transition: right 0.4s ease-in-out;
      overflow-y: auto;
      z-index: 999;
    }

    nav.nav-links.active {
      right: 0;
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      background: none;
      border: none;
      font-size: 2rem;
      color: white;
      cursor: pointer;
    }

    .nav-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav-title {
      font-size: 0.95rem;
      text-transform: uppercase;
      color: #6cb2eb;
      margin-bottom: 5px;
      border-bottom: 1px solid #333;
      padding-bottom: 3px;
    }

    nav a {
      text-decoration: none;
      color: white;
      background: #1a1a1a;
      padding: 10px 14px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      transition: background 0.3s ease;
    }

    nav a:hover {
      background-color: #0d6efd;
    }

    nav a i {
      width: 20px;
      text-align: center;
    }

    /* ✅ Garder le menu hamburger visible partout */
  </style>
</head>
<body>
  <header>
    <div class="header-logo">
      <img src="assets/logo.jpeg" alt="Logo ELZ" />
    </div>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <nav class="nav-links" id="navMenu">
      <button class="close-btn" id="closeBtn">&times;</button>
      <div class="nav-section">
        <div class="nav-title">Dispatch</div>
        <a href="dispos.html"><i class="fas fa-calendar-check"></i>Disponibilités</a>
        <a href="sommaire.html"><i class="fas fa-list-ul"></i>Sommaire</a>
      </div>
      <div class="nav-section">
        <div class="nav-title">Réparations</div>
        <a href="garage.html"><i class="fas fa-tools"></i>Garage</a>
        <a href="equipements.html"><i class="fas fa-cogs"></i>Flotte</a>
      </div>
      <div class="nav-section">
        <div class="nav-title">Administration</div>
        <a href="mathieu.html"><i class="fas fa-money-check-alt"></i>Paye</a>
        <a href="permis.html"><i class="fas fa-id-card"></i>Permis</a>
      </div>
    </nav>
  </header>

  <script>
    document.getElementById('hamburger').addEventListener('click', function () {
      document.getElementById('navMenu').classList.add('active');
    });

    document.getElementById('closeBtn').addEventListener('click', function () {
      document.getElementById('navMenu').classList.remove('active');
    });
  </script>
</body>
</html>
