<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner de documents</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
    }

    #video-container::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 1;
  pointer-events: none;
  clip-path: inset(20% 10% 20% 10% round 8px);
}

#frame-guide {
  z-index: 2;
}

#video-container {
  position: relative;
  width: 100%;
  max-width: 400px;
  aspect-ratio: 3/4;
  margin: auto;
  background: black;
  overflow: hidden;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#frame-guide {
  position: absolute;
  top: 20%;
  left: 10%;
  width: 80%;
  height: 60%;
  border: 3px dashed gray;
  border-radius: 8px;
  pointer-events: none;
  box-sizing: border-box;
}

    .shutter-btn {
      width: 70px;
      height: 70px;
      background-color: white;
      border: 5px solid #6c757d;
      border-radius: 50%;
      margin: 20px auto;
      display: block;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }
    #thumbnail-scroll {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
      background: #fff;
    }
    .thumb {
      height: 110px;
      object-fit: cover;
      border-radius: 5px;
      cursor: pointer;
      border: 2px solid #dee2e6;
    }



  </style>
</head>
<body>

<div class="container py-4">
  <h3 class="text-center mb-4">Scanner de documents</h3>

  <div id="video-container" style="position:relative; max-width: 100%; margin:auto;">
    <video id="video" autoplay playsinline muted></video>
    <div id="frame-guide"></div>
  </div>

  <canvas id="captureCanvas" style="display:none;"></canvas>

  <div class="text-center">
    <div id="capture" class="shutter-btn"></div>
  </div>

  <div id="thumbnail-scroll" class="mb-3"></div>

  <div class="row">
    <div class="col-6">
      <button id="send" class="btn btn-success btn-block" style="display:none;">Envoyer PDF</button>
    </div>
    <div class="col-6">
      <button id="clear" class="btn btn-outline-secondary btn-block" style="display:none;">Réinitialiser</button>
    </div>
  </div>

  <p class="text-center text-muted mt-3" id="status"></p>
</div>

<!-- Modal Preview -->
<div class="modal fade" id="previewModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-light text-center p-3">
      <div class="modal-header border-0">
        <h5 class="modal-title w-100">Prévisualisation</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
      </div>
      <div class="modal-body">
        <img id="previewImg" src="" alt="Preview" class="img-fluid" />
        <button id="deletePage" class="btn btn-danger mt-3">Supprimer cette page</button>
      </div>
    </div>
  </div>
</div>

<script>
const video = document.getElementById('video');
const previewImg = document.getElementById('previewImg');
const captureCanvas = document.getElementById('captureCanvas');
const thumbnails = document.getElementById('thumbnail-scroll');
const captureBtn = document.getElementById('capture');
const sendBtn = document.getElementById('send');
const clearBtn = document.getElementById('clear');
const statusText = document.getElementById('status');
const previewModal = new bootstrap.Modal(document.getElementById('previewModal'));

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    alert("Erreur d'accès à la caméra : " + err.message);
  });

let pages = [];
let previewIndex = null;
let totalSize = 0;
const MAX_SIZE = 25 * 1024 * 1024;

captureBtn.onclick = () => {
  const guide = document.getElementById("frame-guide");
  const videoRect = video.getBoundingClientRect();
  const guideRect = guide.getBoundingClientRect();

  const scaleX = video.videoWidth / videoRect.width;
  const scaleY = video.videoHeight / videoRect.height;

  const sx = (guideRect.left - videoRect.left) * scaleX;
  const sy = (guideRect.top - videoRect.top) * scaleY;
  const sw = guideRect.width * scaleX;
  const sh = guideRect.height * scaleY;

  captureCanvas.width = sw;
  captureCanvas.height = sh;
  const ctx = captureCanvas.getContext("2d");
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

  captureCanvas.toBlob(blob => {
    if (totalSize + blob.size > MAX_SIZE) {
      alert("🚫 Taille maximale atteinte (25 Mo).");
      return;
    }

    pages.push(blob);
    totalSize += blob.size;

    const img = document.createElement('img');
    img.className = 'thumb';
    img.src = URL.createObjectURL(blob);
    img.dataset.index = pages.length - 1;
    thumbnails.appendChild(img);

    sendBtn.style.display = 'block';
    clearBtn.style.display = 'block';
  }, 'image/jpeg', 0.95);
};
</script>
