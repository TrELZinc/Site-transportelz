<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Multi-pages - Billets</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #f0f0f0;
      text-align: center;
    }

    #video {
      width: 90vw;
      margin: 10px auto;
      border: 2px solid #333;
    }

    #thumbnails {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px;
    }

    .thumb {
      width: 80px;
      height: 110px;
      object-fit: cover;
      margin: 5px;
      border: 2px solid #888;
    }

    button {
      padding: 12px 18px;
      margin: 10px;
      font-size: 16px;
      display: inline-block;
    }

    #canvas {
      display: none;
    }

    #status {
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <h2>Scanner vos documents</h2>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div>
    <button id="capture">Ajouter une page</button>
    <button id="send" style="display:none;">Envoyer le PDF</button>
    <button id="clear" style="display:none;">Réinitialiser</button>
  </div>

  <div id="thumbnails"></div>

  <p id="status"></p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const captureBtn = document.getElementById('capture');
    const sendBtn = document.getElementById('send');
    const clearBtn = document.getElementById('clear');
    const statusText = document.getElementById('status');
    const thumbnails = document.getElementById('thumbnails');

    let pages = [];

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(stream => video.srcObject = stream)
      .catch(err => alert('Erreur caméra : ' + err));

    captureBtn.onclick = () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      // Sauvegarde l'image dans pages[]
      canvas.toBlob(blob => {
        pages.push(blob);
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = URL.createObjectURL(blob);
        thumbnails.appendChild(img);
        sendBtn.style.display = 'inline-block';
        clearBtn.style.display = 'inline-block';
      }, 'image/jpeg', 0.95);
    };

    clearBtn.onclick = () => {
      pages = [];
      thumbnails.innerHTML = '';
      sendBtn.style.display = 'none';
      clearBtn.style.display = 'none';
      statusText.innerText = '';
    };

    sendBtn.onclick = async () => {
      if (pages.length === 0) return;
      statusText.innerText = "Génération du PDF...";

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      for (let i = 0; i < pages.length; i++) {
        const imgData = await blobToDataURL(pages[i]);
        const img = new Image();
        await new Promise(resolve => {
          img.onload = () => {
            const w = pdf.internal.pageSize.getWidth();
            const h = (img.height / img.width) * w;
            if (i > 0) pdf.addPage();
            pdf.addImage(img, 'JPEG', 0, 0, w, h);
            resolve();
          };
          img.src = imgData;
        });
      }

      const pdfBlob = pdf.output('blob');
      const base64 = await blobToBase64(pdfBlob);

      statusText.innerText = "Envoi en cours...";

      const response = await fetch('https://SCRIPT_WEB_APP_URL', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filename: 'multi-pages-scan.pdf',
          imageData: base64
        })
      });

      if (response.ok) {
        statusText.innerText = "Document envoyé avec succès ✅";
        clearBtn.click();
      } else {
        statusText.innerText = "Erreur lors de l'envoi ❌";
      }
    };

    function blobToDataURL(blob) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
    }

    function blobToBase64(blob) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => {
          resolve(reader.result.split(',')[1]);
        };
        reader.readAsDataURL(blob);
      });
    }
  </script>
</body>
</html>
