<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner PDF - Mobile</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }

    #video {
      width: 100vw;
      height: auto;
      border-bottom: 2px solid #333;
    }

    .controls {
      display: flex;
      justify-content: center;
      margin: 15px 0;
    }

    .shutter {
      width: 70px;
      height: 70px;
      background: white;
      border-radius: 50%;
      border: 4px solid #ccc;
      box-shadow: 0 0 10px #999;
    }

    #thumbnails {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px;
      background: #111;
    }

    .thumb {
      width: 80px;
      height: 100px;
      object-fit: cover;
      margin: 5px;
      border: 2px solid #666;
      cursor: pointer;
    }

    #canvas {
      display: none;
    }

    #send, #clear {
      margin: 10px;
      padding: 12px 18px;
      font-size: 16px;
    }

    #status {
      margin: 10px 0;
      color: lightgreen;
    }

    #previewModal {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #previewModal img {
      max-width: 90%;
      max-height: 80%;
      border: 3px solid #fff;
    }

    #deletePage {
      background: red;
      color: white;
      font-size: 18px;
      margin-top: 15px;
      padding: 10px 20px;
    }
  </style>
</head>
<body>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div class="controls">
    <div id="capture" class="shutter"></div>
  </div>

  <div id="thumbnails"></div>

  <div>
    <button id="send" style="display:none;">Envoyer PDF</button>
    <button id="clear" style="display:none;">Réinitialiser</button>
  </div>

  <p id="status"></p>

  <div id="previewModal">
    <img id="previewImg" src="">
    <button id="deletePage">Supprimer</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const captureBtn = document.getElementById('capture');
    const sendBtn = document.getElementById('send');
    const clearBtn = document.getElementById('clear');
    const thumbnails = document.getElementById('thumbnails');
    const statusText = document.getElementById('status');

    const previewModal = document.getElementById('previewModal');
    const previewImg = document.getElementById('previewImg');
    const deletePageBtn = document.getElementById('deletePage');

    let pages = [];
    let previewIndex = null;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(stream => video.srcObject = stream)
      .catch(err => alert('Erreur caméra : ' + err));

    captureBtn.onclick = () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      canvas.toBlob(blob => {
        pages.push(blob);
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = URL.createObjectURL(blob);
        img.dataset.index = pages.length - 1;
        thumbnails.appendChild(img);
        sendBtn.style.display = 'inline-block';
        clearBtn.style.display = 'inline-block';
      }, 'image/jpeg', 0.95);
    };

    thumbnails.onclick = (e) => {
      if (e.target.tagName !== 'IMG') return;
      previewIndex = parseInt(e.target.dataset.index);
      previewImg.src = e.target.src;
      previewModal.style.display = 'flex';
    };

    deletePageBtn.onclick = () => {
      if (previewIndex === null) return;
      pages.splice(previewIndex, 1);
      thumbnails.removeChild(thumbnails.children[previewIndex]);
      [...thumbnails.children].forEach((img, i) => img.dataset.index = i);
      previewModal.style.display = 'none';
      previewIndex = null;
      if (pages.length === 0) {
        sendBtn.style.display = 'none';
        clearBtn.style.display = 'none';
      }
    };

    previewModal.onclick = (e) => {
      if (e.target === previewModal) {
        previewModal.style.display = 'none';
      }
    };

    clearBtn.onclick = () => {
      pages = [];
      thumbnails.innerHTML = '';
      sendBtn.style.display = 'none';
      clearBtn.style.display = 'none';
      statusText.innerText = '';
    };

    sendBtn.onclick = async () => {
      statusText.innerText = "Génération du PDF...";

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      for (let i = 0; i < pages.length; i++) {
        const imgData = await blobToDataURL(pages[i]);
        const img = new Image();
        await new Promise(resolve => {
          img.onload = () => {
            const w = pdf.internal.pageSize.getWidth();
            const h = (img.height / img.width) * w;
            if (i > 0) pdf.addPage();
            pdf.addImage(img, 'JPEG', 0, 0, w, h);
            resolve();
          };
          img.src = imgData;
        });
      }

      const pdfBlob = pdf.output('blob');
      const base64 = await blobToBase64(pdfBlob);

      statusText.innerText = "Envoi en cours...";

      const response = await fetch('https://SCRIPT_WEB_APP_URL', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filename: 'scan-multipage.pdf',
          imageData: base64
        })
      });

      if (response.ok) {
        statusText.innerText = "✅ Document envoyé avec succès";
        clearBtn.click();
      } else {
        statusText.innerText = "❌ Erreur lors de l'envoi";
      }
    };

    function blobToDataURL(blob) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
    }

    function blobToBase64(blob) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(blob);
      });
    }
  </script>
</body>
</html>
