<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cartes de diesel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding-top: calc(60px + env(safe-area-inset-top));
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f4f4;
    }

    h1 {
      text-align: center;
      margin-top: 2rem;
    }

    .filters {
      max-width: 800px;
      margin: 1.5rem auto;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      padding: 1rem;
    }

    .carte {
      width: 300px;
      height: 180px;
      border-radius: 15px;
      background: linear-gradient(135deg, #3a3a3a, #1a1a1a);
      color: #fff;
      padding: 1.2rem;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      font-size: 0.95rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .carte .logo {
      text-align: right;
      font-weight: bold;
      font-size: 1.2rem;
    }

    .carte .numero {
      letter-spacing: 2px;
      font-size: 1.1rem;
      margin: 0.5rem 0;
    }

    .carte .nip {
      font-weight: bold;
    }

    .carte .unite {
      font-size: 0.9rem;
      color: #bbb;
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      fetch("assets/header.html")
        .then(res => res.text())
        .then(html => document.getElementById("customHeader").innerHTML = html);
    });
  </script>
</head>
<body>
  <div id="customHeader"></div>

  <h1>Cartes de diesel</h1>

  <div class="filters">
    <select id="filterCamion" class="form-select w-auto">
      <option value="">Tous les camions</option>
    </select>
    <input type="text" id="searchCarte" class="form-control w-auto" placeholder="Rechercher une carte (ex: 1234)">
  </div>

  <div class="container" id="cartes-container"></div>

  <script>
    const cartes = [
      { numero: "1234 5678 9012 3456", nip: "9876", unite: "Camion 1203" },
      { numero: "2345 6789 0123 4567", nip: "4321", unite: "Remorque 2506" },
      { numero: "3456 7890 1234 5678", nip: "1111", unite: "Camion 1404" },
      { numero: "4567 8901 2345 6789", nip: "2222", unite: "Camion 1203" },
      { numero: "5678 9012 3456 7890", nip: "3333", unite: "Remorque 2506" }
    ];

    const container = document.getElementById('cartes-container');
    const select = document.getElementById('filterCamion');
    const search = document.getElementById('searchCarte');

    // Remplir le menu déroulant sans doublons
    const unites = [...new Set(cartes.map(c => c.unite))];
    unites.forEach(unite => {
      const opt = document.createElement("option");
      opt.value = unite;
      opt.textContent = unite;
      select.appendChild(opt);
    });

    function renderCartes() {
      container.innerHTML = '';
      const filtreUnite = select.value.toLowerCase();
      const rechercheTexte = search.value.toLowerCase();

      cartes.forEach(carte => {
        const matchUnite = !filtreUnite || carte.unite.toLowerCase() === filtreUnite;
        const matchNumero = !rechercheTexte || carte.numero.toLowerCase().includes(rechercheTexte);

        if (matchUnite && matchNumero) {
          const div = document.createElement('div');
          div.className = 'carte';
          div.innerHTML = `
            <div class="logo">ELZ</div>
            <div class="numero">${carte.numero}</div>
            <div class="nip">NIP : ${carte.nip}</div>
            <div class="unite">${carte.unite}</div>
          `;
          container.appendChild(div);
        }
      });
    }

    select.addEventListener("change", renderCartes);
    search.addEventListener("input", renderCartes);

    renderCartes();
  </script>
</body>
</html>
