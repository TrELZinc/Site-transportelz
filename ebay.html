<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Site Inutile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #ffd1ff);
      height: 100vh;
      margin: 0;
      font-family: 'Comic Sans MS', cursive;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .useless-box {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease;
    }

    .useless-box:hover {
      transform: scale(1.03);
    }

    .useless-button {
      background: linear-gradient(45deg, #f857a6, #ff5858);
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 1.5rem;
      border-radius: 30px;
      box-shadow: 0 10px 20px rgba(248, 87, 166, 0.4);
      transition: all 0.2s ease-in-out;
    }

    .useless-button:hover {
      background: linear-gradient(45deg, #ff5858, #f857a6);
      transform: scale(1.1);
    }

    .reaction {
      margin-top: 30px;
      font-size: 1.2rem;
      color: #555;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .reaction.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="useless-box">
    <h1>Ceci est le site le plus inutile.</h1>
    <p>Mais avoue… c’est joli non ?</p>
    <button class="useless-button" onclick="react()">Clique-moi pour rien</button>
    <div id="reaction" class="reaction">Bravo. Tu as cliqué. C’est toujours inutile.</div>
  </div>

  <script>
    function react() {
      const reaction = document.getElementById('reaction');
      reaction.classList.add('show');
      reaction.innerText = "Encore un clic… toujours aussi inutile.";
      setTimeout(() => {
        reaction.innerText = "Tu veux recommencer ?";
      }, 3000);
    }
  </script>
</body>
</html>
