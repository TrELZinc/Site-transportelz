<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Réparation mécanique</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Comfortaa', cursive;
      background-color: #fefefe;
    }

    header {
      background-color: #141414;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header img {
      height: 60px;
      margin-bottom: 10px;
    }

    .preview-image img {
      height: 80px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

.remove-btn {
  position: absolute;
  top: -10px;
  right: -10px;
  background-color: red;
  color: white;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  z-index: 2;
  border: 2px solid white;
  transition: transform 0.2s ease;
}

.remove-btn:hover {
  transform: scale(1.1);
}

    .confirmation-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #141414;
      color: white;
      padding: 20px 30px;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
      font-size: 18px;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .confirmation-popup.show {
      opacity: 1;
      pointer-events: auto;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9998;
    }

    #loading-screen.show {
      display: flex;
    }

    .loader {
      border: 6px solid #ccc;
      border-top: 6px solid #141414;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-width: 576px) {
  .form-control, .form-select, textarea, button {
    font-size: 1rem;
    padding: 12px;
  }

  .btn {
    font-size: 1.1rem;
  }

  header h1 {
    font-size: 1.25rem;
  }

  .preview-image img {
    height: 70px;
  }

  .confirmation-popup {
    width: 90%;
    font-size: 1rem;
    padding: 16px;
  }
}

.preview {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 15px;
}

.preview-image {
  position: relative;
  width: 80px;
  height: 80px;
  overflow: visible; /* Autorise le X à dépasser */
  margin-right: 4px;
}

.preview-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
  </style>
</head>
<body>

  <header>
    <img src="assets/logo.jpeg" alt="Logo ELZ"/>
  </header>

  <div class="container my-5">
    <form id="repair-form" class="bg-white p-4 rounded shadow-sm">
      <h2 class="h5 text-center mb-4">📋 Demande de réparation mécanique</h2>
      <div class="mb-3">
        <label for="nom" class="form-label">Nom complet</label>
        <input type="text" class="form-control" id="nom" name="nom" required />
      </div>

      <div class="mb-3">
        <label for="unite" class="form-label">Numéro de l'unité</label>
        <select class="form-select" id="unite" name="unite" required>
          <option value="">-- Sélectionner une unité --</option>
          <option>Camion 1103</option>
          <option>Camion 1202</option>
          <option>Camion 1203</option>
          <option>Camion 1303</option>
          <option>Camion 1404</option>
          <option>Camion 1502</option>
          <option>Camion 1503</option>
          <option>Camion 1602</option>
          <option>Camion 1603</option>
          <option>Camion 1703</option>
          <option>Camion 1803</option>
          <option>Remorque 1505</option>
          <option>Remorque 1605</option>
          <option>Remorque 1805</option>
          <option>Remorque 1806</option>
          <option>Remorque 1905</option>
          <option>Remorque 1906</option>
          <option>Remorque 2006</option>
          <option>Remorque 2205</option>
          <option>Remorque 2405</option>
          <option>Remorque 2506</option>
          <option>Remorque 2706</option>
        </select>

        <div id="alerte-reparations" class="alert alert-warning d-none mt-3" role="alert" style="font-size: 0.95rem;">
          <strong>Réparations en cours pour cette unité :</strong>
          <div id="reparations-liste" class="mt-2"></div>
        </div>
      </div>

      <div class="mb-3">
        <label for="description" class="form-label">Description du problème</label>
        <textarea class="form-control" id="description" name="description" rows="4" required></textarea>
      </div>

<div class="mb-3">
  <label class="form-label">Ajouter des  ou vidéos</label>
  
  <!-- Bouton customisé -->
  <div class="d-flex flex-column gap-2">
    <button type="button" class="btn btn-outline-primary" id="fileTrigger">Choisir des fichiers</button>
    <input type="file" id="photos" name="photos" accept="image/*,video/mp4,video/quicktime" multiple hidden />
    <div id="fileNames" class="text-muted small"></div>
  </div>

  <!-- Preview ici -->
  <div class="d-flex flex-wrap gap-2 mt-2" id="preview"></div>
</div>

      <button type="submit" class="btn btn-dark w-100">Envoyer</button>
    </form>

    <a href="linktree.html" class="btn btn-outline-dark w-100 mt-3">Retour au menu principal</a>
  </div>

  <div id="confirmation" class="confirmation-popup">
    ✅ Demande envoyée avec succès !
  </div>

  <div id="loading-screen">
    <div class="loader"></div>
  </div>

  <script>
const form = document.getElementById("repair-form");
const photosInput = document.getElementById("photos");
const preview = document.getElementById("preview");
const confirmation = document.getElementById("confirmation");
const loading = document.getElementById("loading-screen");
let imageList = [];

const fileTrigger = document.getElementById("fileTrigger");
const fileNames = document.getElementById("fileNames");

// Bouton customisé déclenche l'input
fileTrigger.addEventListener("click", () => {
  photosInput.click();
});

// Affiche les noms des fichiers
photosInput.addEventListener("change", (e) => {
  preview.innerHTML = "";

  const files = Array.from(e.target.files);
  const MAX_FILE_SIZE = 12 * 1024 * 1024;

  files.forEach((file) => {
    if (file.size > MAX_FILE_SIZE) {
      alert(`⛔ Le fichier "${file.name}" dépasse la limite de 12 Mo et a été ignoré.`);
      return;
    }

    const container = document.createElement("div");
    container.className = "preview-image";

    if (file.type.startsWith("image/")) {
      const img = document.createElement("img");
      img.src = URL.createObjectURL(file); // ✅ plus rapide que FileReader
      container.appendChild(img);
    } else if (file.type.startsWith("video/")) {
      const videoIcon = document.createElement("div");
      videoIcon.style.width = "100%";
      videoIcon.style.height = "100%";
      videoIcon.style.display = "flex";
      videoIcon.style.alignItems = "center";
      videoIcon.style.justifyContent = "center";
      videoIcon.style.fontSize = "26px";
      videoIcon.style.background = "#e9ecef";
      videoIcon.style.borderRadius = "6px";
      videoIcon.textContent = "🎥";
      container.appendChild(videoIcon);
    }

    const removeBtn = document.createElement("div");
    removeBtn.className = "remove-btn";
    removeBtn.innerHTML = `<i class="bi bi-x-lg"></i>`;
    removeBtn.onclick = () => container.remove();

    container.appendChild(removeBtn);
    preview.appendChild(container);
  });

  fileNames.textContent = ""; // Pas besoin d'afficher les noms ici
});

document.getElementById("unite").addEventListener("change", async (e) => {
  const unite = e.target.value;
  const alertBox = document.getElementById("alerte-reparations");
  const reparationsListe = document.getElementById("reparations-liste");

  alertBox.classList.add("d-none");
  reparationsListe.innerHTML = "";

  if (!unite) return;

  try {
    const response = await fetch(`https://script.google.com/macros/s/TON_DEPLOIEMENT/exec?read=1&unite=${encodeURIComponent(unite)}`);
    const data = await response.json();

    const actifs = data.filter(rep => !rep.dateFin && rep.unite === unite);

    if (actifs.length > 0) {
      actifs.forEach(rep => {
        const item = document.createElement("details");
        item.classList.add("mb-2");
        const summary = document.createElement("summary");
        summary.innerHTML = `🔧 ${rep.description}`;
        const contenu = document.createElement("div");
        contenu.innerHTML = `<small><strong>Demandeur :</strong> ${rep.nom}<br><strong>ID :</strong> ${rep.id}</small>`;
        item.appendChild(summary);
        item.appendChild(contenu);
        reparationsListe.appendChild(item);
      });
      alertBox.classList.remove("d-none");
    }
  } catch (err) {
    console.error("Erreur lors de la vérification des réparations :", err);
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData();
  formData.append("nom", form.nom.value);
  formData.append("unite", form.unite.value);
  formData.append("description", form.description.value);

  Array.from(photosInput.files).forEach((file, index) => {
    formData.append("fichier" + index, file);
  });

  try {
    loading.classList.add("show");

    await fetch("https://script.google.com/macros/s/AKfycbwj-YDRbVYJYRyvGlZ81mayy-_8-fS0A9GxNfXJ7zrtEI0OXweXachMIrn29d8SCRCI/exec", {
      method: "POST",
      body: formData
    });

    loading.classList.remove("show");
    confirmation.classList.add("show");

    setTimeout(() => {
      confirmation.classList.remove("show");
    }, 4000);

    form.reset();
    preview.innerHTML = "";
    fileNames.textContent = "";
  } catch (error) {
    loading.classList.remove("show");
    alert("Erreur lors de l'envoi du formulaire : " + error.message);
  }
});

 </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
