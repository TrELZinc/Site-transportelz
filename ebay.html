<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carte Avions Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <style>
    body, html {
      height: 100%;
      margin: 0;
    }
    #map {
      height: 100%;
    }
    .leaflet-popup-content {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([48.8566, 2.3522], 5); // Centré sur Paris

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 10,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let planeMarkers = [];

    function fetchPlanes() {
      fetch('https://opensky-network.org/api/states/all')
        .then(res => res.json())
        .then(data => {
          planeMarkers.forEach(m => map.removeLayer(m)); // Remove old markers
          planeMarkers = [];

          data.states.forEach(plane => {
            const callsign = plane[1];
            const lat = plane[6];
            const lon = plane[5];
            const alt = plane[7];
            const country = plane[2];

            if (lat && lon) {
              const marker = L.marker([lat, lon]).addTo(map);
              marker.bindPopup(`<strong>${callsign || 'Unknown'}</strong><br>
                Altitude: ${alt} m<br>
                Pays: ${country}`);
              planeMarkers.push(marker);
            }
          });
        })
        .catch(console.error);
    }

    fetchPlanes();
    setInterval(fetchPlanes, 15000); // Mise à jour toutes les 15s
  </script>
</body>
</html>
