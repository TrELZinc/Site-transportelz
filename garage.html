<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Réparations Mécanique</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/photoswipe@5/dist/photoswipe.css">

  <style>
    body {
      background-color: #f8f9fa;
    }
    .list-group-item {
      border: 1px solid #ddd;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .list-group-item:hover {
      background-color: #f1f1f1;
    }
    .details {
      display: none;
      margin-top: 10px;
    }
    .opened .details {
      display: block;
    }
    .badge-custom {
      font-size: 0.8rem;
      padding: 4px 8px;
      border-radius: 10px;
    }
    input[type=range] {
  height: 30px;
}
input[type=range]::-webkit-slider-thumb {
  height: 30px;
  width: 30px;
  background: #0d6efd;
  border: 2px solid white;
  border-radius: 50%;
  cursor: pointer;
  margin-top: -10px;
}
#timeDisplay {
  font-size: 1.2rem;
  font-weight: bold;
  margin-bottom: 10px;
  color: #0d6efd;
  text-align: center;
}
.btn-completer {
  width: 100%;
  padding: 15px;
  font-size: 1.2rem;
  font-weight: bold;
}
.img-thumbnail-mini {
  height: 80px;
  width: 80px;
  object-fit: cover;
  border-radius: 8px;
  transition: transform 0.2s ease;
}
.img-thumbnail-mini:hover {
  transform: scale(1.05);
}
@media (max-width: 768px) {
  .img-thumbnail-mini {
    height: 60px;
    width: 60px;
  }
}
.details {
  display: none;
  margin-top: 10px;
  transition: max-height 0.3s ease, padding 0.3s ease;
  overflow: hidden;
}
.opened .details {
  display: block;
}
.pswp__bg {
  backdrop-filter: blur(8px);
  background: rgba(0, 0, 0, 0.5); /* Un peu de foncé aussi */
}

  </style>
</head>
<body>

<!-- Bannière noire avec logo -->
<div style="background-color: #111; padding: 10px 0; text-align: center;">
  <img src="assets/logo.jpeg" alt="Logo" style="height: 60px; object-fit: contain;">
</div>

<div class="container py-4">
  <h2 class="text-center mb-4">🔧 Réparations Mécanique 🔧</h2>

  <!-- Onglets -->
  <ul class="nav nav-pills nav-justified mb-3">
    <li class="nav-item">
      <button class="nav-link active" id="a-faire-tab" onclick="showTab('faire')">À faire</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" id="fait-tab" onclick="showTab('fait')">Réparé</button>
    </li>
  </ul>

  <!-- Zone de filtre -->
  <div id="filterZone" class="mb-3">
    <input type="text" class="form-control" id="searchInput" placeholder="🔎 Filtrer par unité..." oninput="renderCurrentTab()">
  </div>

  <!-- Contenus -->
  <div id="faireList" class="list-group"></div>
  <div id="faitList" class="list-group d-none"></div>
  <div class="text-center my-3">
  <button id="toggleFaitView" class="btn btn-secondary btn-sm" onclick="toggleFaitView()">Afficher tout</button>
  </div>
</div>

<!-- Juste la partie dynamique JS modifiée car le reste du HTML est correct -->

<script>
// Données simulées
let aFaire = [];
let fait = [];
let showAllFait = false;


async function chargerReparations(noReset = false) {
  try {
    const response = await fetch("https://script.google.com/macros/s/AKfycby8eRNmj1-ApWoVYv2JUKhr_FL_q1_AvnNZlRax7nacutt7meMkEc6TE5023aBQTes0/exec?read=1");
    aFaire = await response.json();
    aFaire = aFaire.sort((a, b) => new Date(b.date) - new Date(a.date)); // 🔥 auto tri

    if (!noReset) {
      showTab('faire');
    } else {
      renderCurrentTab(); 
      updateCounters();
    }
  } catch (error) {
    console.error("Erreur de chargement :", error);
    alert("Erreur lors du chargement des réparations. Veuillez réessayer.");
  }
}


// Charger automatiquement les réparations au démarrage
chargerReparations();


let currentTab = 'faire';

function showTab(tab) {
  currentTab = tab;
  document.getElementById('a-faire-tab').classList.remove('active');
  document.getElementById('fait-tab').classList.remove('active');
  document.getElementById('faireList').classList.add('d-none');
  document.getElementById('faitList').classList.add('d-none');
  document.getElementById('filterZone').classList.remove('d-none');

  if (tab === 'faire') {
    document.getElementById('a-faire-tab').classList.add('active');
    document.getElementById('faireList').classList.remove('d-none');
    renderAFaire();
  } else {
    document.getElementById('fait-tab').classList.add('active');
    document.getElementById('faitList').classList.remove('d-none');
    renderFait();
  }
  updateCounters();

  document.getElementById('toggleFaitView').style.display = (tab === 'fait') ? 'inline-block' : 'none';
}

function renderCurrentTab() {
  if (currentTab === 'faire') renderAFaire();
  else renderFait();
}

function renderAFaire() {
  const content = document.getElementById('faireList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  content.innerHTML = '';

  let filtered = aFaire.filter(item => 
  item.unite.toLowerCase().includes(search) && 
  (!item.notes || item.notes.trim() === "")
  );  

  filtered.sort((a, b) => getUrgenceLevel(b.date) - getUrgenceLevel(a.date));

  if (filtered.length === 0) {
    content.innerHTML = '<div class="text-center text-muted">Aucune réparation trouvée.</div>';
    updateCounters();
    return;
  }

  filtered.forEach(item => {
    const diffDays = getDaysSince(item.date);
    const badge = getDaysBadge(diffDays);
    const hasFiles = item.fichiers && item.fichiers.length > 0;

    const div = document.createElement('div');
    div.className = 'list-group-item';
    div.innerHTML = `
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h6 class="mb-1">${item.unite} - ${item.nom}</h6>
          ${hasFiles ? '<div class="text-warning small mt-1">📸 Fichiers attachés</div>' : ''}
          ${badge}<br>
          <small class="text-muted">${formatDate(item.date)}</small>
          <p class="mb-1">${item.description}</p>
        </div>
        <div><small class="text-primary">🔽 Voir</small></div>
      </div>

      <div class="details mt-2" style="display: none;">
        ${hasFiles ? `
          <div class="mb-3 d-flex flex-wrap gap-2 gallery" id="gallery-${item.id}">
            ${item.fichiers.map(f => {
              const ext = f.toLowerCase();
              const isVideo = ext.includes(".mp4") || ext.includes(".mov") || ext.includes(".webm");
              const type = isVideo ? "video" : "image";
              const src = transformDriveUrl(f, type);
            
              if (type === "image") {
                return `
                  <a href="${src}" data-pswp-width="1600" data-pswp-height="1200" class="gallery-link">
                    <img src="${src}" class="img-thumbnail-mini">
                  </a>
                `;
              } else {
                // Vidéo = simple clic normal pour popup interne
                return `
                  <img src="${src}" class="img-thumbnail-mini" onclick="openPopupMedia('${src}', '${type}')">
                `;
              }
            }).join('')}


          </div>
        ` : ''}
        <textarea class="form-control mb-2" placeholder="🛠️ Réparations effectuées" oninput="checkFields(this)"></textarea>
        <label class="form-label mt-2">⏱️ Temps de réparation</label>
        <div class="mb-2"><strong id="timeDisplay">Sélectionnez le temps</strong></div>
        <input type="range" class="form-range" min="0" max="240" step="15" value="0" oninput="updateTimeDisplay(this)">
        <button class="btn btn-success btn-completer mt-3" onclick="completer(this)" disabled>✅ Compléter</button>
      </div>
    `;

    div.addEventListener('click', function(e) {
      if (!e.target.closest('a') && !e.target.closest('img') && !e.target.closest('textarea') && !e.target.closest('input') && !e.target.closest('button')) {
        this.classList.toggle('opened');
        const details = this.querySelector('.details');
        if (this.classList.contains('opened')) {
          details.style.display = 'block';
        } else {
          details.style.display = 'none';
        }
      }
    });


    content.appendChild(div);
  });
  
  initGalleries();
  updateCounters();
}

function initGalleries() {
  // Détruire d'abord d'éventuelles anciennes instances
  document.querySelectorAll('.pswp').forEach(el => el.remove());

  document.querySelectorAll('.gallery').forEach(gallery => {
    const lightbox = new PhotoSwipeLightbox({
      gallery: '#' + gallery.id,
      children: 'a.gallery-link',
      pswpModule: () => import('https://unpkg.com/photoswipe@5/dist/photoswipe.esm.min.js')
    });
    lightbox.init();
  });
}

function transformDriveUrl(url, type = "image") {
  let match = url.match(/\/d\/([^\/]+)/);
  if (match && match[1]) {
    const id = match[1];
    return type.startsWith("video") 
      ? `https://drive.google.com/file/d/${id}/preview` 
      : `https://drive.google.com/thumbnail?id=${id}`;
  }

  match = url.match(/id=([^&]+)/);
  if (match && match[1]) {
    const id = match[1];
    return type.startsWith("video") 
      ? `https://drive.google.com/file/d/${id}/preview`
      : `https://drive.google.com/thumbnail?id=${id}`;
  }

  return url; // fallback
}

function renderFait() {
  const content = document.getElementById('faitList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  content.innerHTML = '';

  let filtered = aFaire.filter(item => 
    item.notes && item.notes.trim() !== "" &&
    item.unite.toLowerCase().includes(search)
  );

  if (!showAllFait) {
    filtered = filtered.filter(item => {
      const days = getDaysSince(item.date);
      return days <= 30; // Seulement si 30 jours ou moins
    });
  }

  if (filtered.length === 0) {
    content.innerHTML = '<div class="text-center text-muted">Aucune réparation complétée trouvée.</div>';
    return;
  }

  filtered.forEach(item => {
    const div = document.createElement('div');
    div.className = 'list-group-item';
    div.innerHTML = `
      <div class="d-flex justify-content-between align-items-center">
        <div class="w-100">
          <h6 class="mb-1">${item.unite} - ${item.nom}</h6>
          <small class="text-muted">${item.date}</small>
          <div class="mb-2">${escapeHtml(truncateText(item.description, 60))}</div>
        </div>
        <div class="ms-2">
          <small class="text-primary">🔽 Voir</small>
        </div>
      </div>
      <div class="details mt-2 p-2 bg-light rounded">
        <hr>
        <p class="mb-2">
          <strong>🛠️ Réparations effectuées :</strong><br>
          <span class="text-muted">${escapeHtml(item.notes)}</span>
        </p>
        <p class="mb-0">
          <strong>⏱️ Temps :</strong> 
          <span class="text-muted">${item.temps}</span>
        </p>
      </div>
    `;
    div.addEventListener('click', function(e) {
      this.classList.toggle('opened');
    });
    content.appendChild(div);
  });

  updateCounters();
}

function toggleFaitView() {
  showAllFait = !showAllFait;
  document.getElementById('toggleFaitView').innerText = showAllFait ? "Afficher seulement 30 jours" : "Afficher tout";
  renderFait();
}

function truncateText(text, maxLength) {
  if (text.length <= maxLength) return text;
  return text.substring(0, maxLength) + "...";
}

  function formatDate(dateStr) {
  const date = new Date(dateStr);
  const options = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };
  return date.toLocaleDateString('fr-CA', options).replace(',', ' à');
}

  
  function escapeHtml(text) {
  const div = document.createElement('div');
  div.innerText = text;
  return div.innerHTML;
}

function getDaysSince(dateStr) {
  const today = new Date();
  const repairDate = new Date(dateStr);
  const diffTime = today - repairDate;
  return Math.floor(diffTime / (1000 * 60 * 60 * 24));
}
  
function getUrgenceLevel(dateStr) {
  return getDaysSince(dateStr);
}

function getDaysBadge(diffDays) {
  let color = "bg-success";
  if (diffDays >= 3 && diffDays <= 5) color = "bg-warning text-dark";
  if (diffDays > 5) color = "bg-danger";

  return `<span class="badge ${color} rounded-pill">Demandée il y a ${diffDays} jours</span>`;
}

function updateTimeDisplay(slider) {
  const display = slider.parentElement.querySelector("#timeDisplay");
  const minutes = parseInt(slider.value);

  if (minutes === 0) {
    display.innerText = "Sélectionnez le temps";
  } else {
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    display.innerText = `${h > 0 ? h + "h" : ""}${m > 0 ? " " + m + "min" : ""}`;
  }
  checkFields(slider);
}

function checkFields(input) {
  const container = input.closest('.details');
  const textarea = container.querySelector('textarea');
  const slider = container.querySelector('input[type=range]');
  const button = container.querySelector('button');

  if (textarea.value.trim() !== "" && parseInt(slider.value) > 0) {
    button.disabled = false;
  } else {
    button.disabled = true;
  }
}

function openPopupMedia(url, type) {
  const overlay = document.getElementById('popupOverlay');
  const content = document.getElementById('popupInner');
  content.innerHTML = '';

  if (type.startsWith('image')) {
    content.innerHTML = `
      <img src="${url}" style="width: 100vw; height: auto; max-height: 90vh; object-fit: contain; border-radius: 10px;">
    `;
  } else if (type.startsWith('video')) {
    content.innerHTML = `
      <iframe src="${url}" frameborder="0" allow="autoplay; fullscreen" allowfullscreen style="width:100%; height:80%; border-radius:10px;"></iframe>
    `;
  }

  overlay.style.display = 'flex';
}


function closePopup() {
  const overlay = document.getElementById('popupOverlay');
  overlay.style.display = 'none';
}

function completer(button) {
  const item = button.closest('.list-group-item');
  const textarea = item.querySelector('textarea').value.trim();
  const slider = item.querySelector('input[type=range]');
  const title = item.querySelector('h6').innerText;
  const subtitle = item.querySelectorAll('small')[1].innerText;
  const description = item.querySelector('p').innerText;

  const minutes = parseInt(slider.value);
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  const temps = `${h > 0 ? h + "h" : ""}${m > 0 ? " " + m + "min" : ""}`;

  const id = aFaire.find(r => title.includes(r.nom)).id;

  fetch("https://script.google.com/macros/s/AKfycby8eRNmj1-ApWoVYv2JUKhr_FL_q1_AvnNZlRax7nacutt7meMkEc6TE5023aBQTes0/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      update: true,
      id: id,
      notes: textarea,
      temps: temps
    })
  })
.then(() => {
  showToast("Réparation complétée avec succès ✅");
  
  // Nouvelle logique plus propre
  setTimeout(() => {
    console.log("Recharge après 2 secondes pour laisser Google Sheet se mettre à jour...");
    chargerReparations(true);
  }, 2000); // 2 secondes, pas moins !
})
  .catch(error => {
    console.error("Erreur mise à jour:", error);
    alert("Erreur lors de l'envoi au serveur.");
  });
}


function updateCounters() {
  const aFaireCount = aFaire.filter(item => !item.notes || item.notes.trim() === "").length;
  const faitCount = aFaire.filter(item => item.notes && item.notes.trim() !== "").length;

  document.getElementById('a-faire-tab').innerHTML = `À faire (${aFaireCount})`;
  document.getElementById('fait-tab').innerHTML = `Réparé (${faitCount})`;
}

function showToast(message = "Succès") {
  const toastEl = document.getElementById('liveToast');
  toastEl.querySelector('.toast-body').textContent = message;
  const toast = new bootstrap.Toast(toastEl);
  toast.show();
}


</script>


  <!-- Petit Popup Media -->
<div id="popupOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index:1050; justify-content:center; align-items:center;">
  <div id="popupContent" style="position:relative; max-width:90%; max-height:90%;">
    <button onclick="closePopup()" style="position:absolute; top:-10px; right:-10px; background:red; color:white; border:none; border-radius:50%; width:30px; height:30px; font-weight:bold;">&times;</button>
    <div id="popupInner" style="width:100%; height:100%;"></div>
  </div>
</div>
  
<!-- Toast Notification -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
  <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body">
        Réparation enregistrée ✅
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

  
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
  import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5/dist/photoswipe-lightbox.esm.min.js';
  window.PhotoSwipeLightbox = PhotoSwipeLightbox;
</script>

</body>

</html>
