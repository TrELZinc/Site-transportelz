<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Réparations Mobile Avancée</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
    .list-group-item {
      border: none;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .details {
      display: none;
      margin-top: 10px;
    }
    .opened .details {
      display: block;
    }
  </style>
</head>
<body>

<div class="container py-4">
  <h2 class="text-center mb-4">Réparations</h2>

  <!-- Onglets -->
  <ul class="nav nav-pills nav-justified mb-3">
    <li class="nav-item">
      <button class="nav-link active" id="a-faire-tab" onclick="showTab('faire')">À faire</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" id="fait-tab" onclick="showTab('fait')">Réparé</button>
    </li>
  </ul>

  <!-- Zone de filtre -->
  <div id="filterZone" class="mb-3">
    <input type="text" class="form-control" id="searchInput" placeholder="Filtrer par unité..." oninput="renderAFaire()">
  </div>

  <!-- Contenus -->
  <div id="faireList" class="list-group"></div>
  <div id="faitList" class="list-group d-none"></div>

</div>

<!-- ... (le head et le body restent identiques, juste le script change un peu) -->

<script>
// Données simulées
let aFaire = [
  { id: 1, date: "2025-04-25", nom: "Jean Dupont", unite: "Camion 101", description: "Changer l'huile moteur." },
  { id: 2, date: "2025-04-22", nom: "Marie Tremblay", unite: "Tracteur 302", description: "Remplacer la batterie." },
  { id: 3, date: "2025-04-18", nom: "Luc Gagnon", unite: "Excavatrice 501", description: "Réparer fuite hydraulique." }
];

let fait = []; // Réparations complétées

function showTab(tab) {
  document.getElementById('a-faire-tab').classList.remove('active');
  document.getElementById('fait-tab').classList.remove('active');
  document.getElementById('faireList').classList.add('d-none');
  document.getElementById('faitList').classList.add('d-none');
  document.getElementById('filterZone').classList.add('d-none');

  if (tab === 'faire') {
    document.getElementById('a-faire-tab').classList.add('active');
    document.getElementById('faireList').classList.remove('d-none');
    document.getElementById('filterZone').classList.remove('d-none');
    renderAFaire();
  } else {
    document.getElementById('fait-tab').classList.add('active');
    document.getElementById('faitList').classList.remove('d-none');
    renderFait();
  }
}

function renderAFaire() {
  const content = document.getElementById('faireList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  content.innerHTML = '';

  const filtered = aFaire.filter(item => item.unite.toLowerCase().includes(search));

  if (filtered.length === 0) {
    content.innerHTML = '<div class="text-center text-muted">Aucune réparation trouvée.</div>';
    return;
  }

  filtered.forEach(item => {
    const urgenceBadge = getUrgenceBadge(item.date);

    const div = document.createElement('div');
    div.className = 'list-group-item';
    div.innerHTML = `
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h6 class="mb-1">${item.unite} - ${item.nom} ${urgenceBadge}</h6>
          <small class="text-muted">${item.date}</small>
          <p class="mb-1">${item.description}</p>
        </div>
        <div><small class="text-primary">Voir</small></div>
      </div>
      <div class="details">
        <textarea class="form-control mb-2" placeholder="Réparations effectuées" oninput="checkFields(this)"></textarea>
        <input type="number" class="form-control mb-2" placeholder="Temps (minutes)" min="1" oninput="checkFields(this)">
        <button class="btn btn-success btn-sm" onclick="completer(this)" disabled>Compléter</button>
      </div>
    `;
    div.addEventListener('click', function(e) {
      if (!e.target.closest('textarea') && !e.target.closest('input') && !e.target.closest('button')) {
        this.classList.toggle('opened');
      }
    });
    content.appendChild(div);
  });
}

function getUrgenceBadge(dateStr) {
  const today = new Date();
  const repairDate = new Date(dateStr);
  const diffTime = today - repairDate;
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  if (diffDays <= 2) {
    return `<span class="badge bg-success ms-2">Normal</span>`;
  } else if (diffDays <= 5) {
    return `<span class="badge bg-warning text-dark ms-2">À prioriser</span>`;
  } else {
    return `<span class="badge bg-danger ms-2">URGENT</span>`;
  }
}

function renderFait() {
  const content = document.getElementById('faitList');
  content.innerHTML = '';

  if (fait.length === 0) {
    content.innerHTML = '<div class="text-center text-muted">Aucune réparation complétée.</div>';
    return;
  }

  fait.forEach(item => {
    const div = document.createElement('div');
    div.className = 'list-group-item bg-light';
    div.innerHTML = `
      <h6>${item.unite} - ${item.nom}</h6>
      <small class="text-muted">${item.date}</small>
      <p class="mb-1">${item.description}</p>
      <hr>
      <p><strong>Réparations effectuées :</strong> ${item.notes}</p>
      <p><strong>Temps :</strong> ${item.temps} minutes</p>
    `;
    content.appendChild(div);
  });
}

function checkFields(input) {
  const container = input.closest('.details');
  const textarea = container.querySelector('textarea');
  const timeInput = container.querySelector('input[type="number"]');
  const button = container.querySelector('button');

  if (textarea.value.trim() !== "" && timeInput.value.trim() !== "" && parseInt(timeInput.value) > 0) {
    button.disabled = false;
  } else {
    button.disabled = true;
  }
}

function completer(button) {
  const item = button.closest('.list-group-item');
  const textarea = item.querySelector('textarea').value.trim();
  const temps = item.querySelector('input[type="number"]').value.trim();
  const title = item.querySelector('h6').innerText;
  const subtitle = item.querySelector('small').innerText;
  const description = item.querySelector('p').innerText;

  const id = aFaire.find(r => title.includes(r.nom)).id;

  fait.push({
    id: id,
    unite: title.split(" - ")[0],
    nom: title.split(" - ")[1],
    date: subtitle,
    description: description,
    notes: textarea,
    temps: temps
  });

  aFaire = aFaire.filter(r => r.id !== id);

  alert("Réparation complétée!");

  showTab('faire');
}

// Charger initialement
showTab('faire');
</script>

</body>
</html>
