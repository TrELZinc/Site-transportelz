<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Réparations Mobile Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
    .list-group-item {
      border: 1px solid #ddd;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .list-group-item:hover {
      background-color: #f1f1f1;
    }
    .details {
      display: none;
      margin-top: 10px;
    }
    .opened .details {
      display: block;
    }
    .badge-custom {
      font-size: 0.8rem;
      padding: 4px 8px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<!-- Bannière noire avec logo -->
<div style="background-color: #111; padding: 10px 0; text-align: center;">
  <img src="assets/logo.jpeg" alt="Logo" style="height: 60px; object-fit: contain;">
</div>

<div class="container py-4">
  <h2 class="text-center mb-4">🔧 Réparations</h2>

  <!-- Onglets -->
  <ul class="nav nav-pills nav-justified mb-3">
    <li class="nav-item">
      <button class="nav-link active" id="a-faire-tab" onclick="showTab('faire')">À faire</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" id="fait-tab" onclick="showTab('fait')">Réparé</button>
    </li>
  </ul>

  <!-- Zone de filtre -->
  <div id="filterZone" class="mb-3">
    <input type="text" class="form-control" id="searchInput" placeholder="🔎 Filtrer par unité..." oninput="renderCurrentTab()">
  </div>

  <!-- Contenus -->
  <div id="faireList" class="list-group"></div>
  <div id="faitList" class="list-group d-none"></div>
</div>

<script>
// Données simulées
let aFaire = [
  { id: 1, date: "2025-04-25", nom: "Jean Dupont", unite: "Camion 101", description: "Changer l'huile moteur." },
  { id: 2, date: "2025-04-22", nom: "Marie Tremblay", unite: "Tracteur 302", description: "Remplacer la batterie." },
  { id: 3, date: "2025-04-18", nom: "Luc Gagnon", unite: "Excavatrice 501", description: "Réparer fuite hydraulique." }
];

let fait = [
  {
    id: 4,
    unite: "Camion 202",
    nom: "Maxime Roy",
    date: "2025-04-23",
    description: "Remplacement des freins avant.",
    notes: "Remplacé plaquettes et disques. Nettoyage complet du système de freinage.",
    temps: 120
  },
  {
    id: 5,
    unite: "Tracteur 450",
    nom: "Sophie Martin",
    date: "2025-04-24",
    description: "Réglage du moteur et changement de filtres.",
    notes: "Réglé l'injection, changé le filtre à air et filtre à huile.",
    temps: 90
  }
];

let currentTab = 'faire';

function showTab(tab) {
  currentTab = tab;
  document.getElementById('a-faire-tab').classList.remove('active');
  document.getElementById('fait-tab').classList.remove('active');
  document.getElementById('faireList').classList.add('d-none');
  document.getElementById('faitList').classList.add('d-none');
  document.getElementById('filterZone').classList.remove('d-none');

  if (tab === 'faire') {
    document.getElementById('a-faire-tab').classList.add('active');
    document.getElementById('faireList').classList.remove('d-none');
    renderAFaire();
  } else {
    document.getElementById('fait-tab').classList.add('active');
    document.getElementById('faitList').classList.remove('d-none');
    renderFait();
  }
}

function renderCurrentTab() {
  if (currentTab === 'faire') renderAFaire();
  else renderFait();
}

function renderAFaire() {
  const content = document.getElementById('faireList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  content.innerHTML = '';

  let filtered = aFaire.filter(item => item.unite.toLowerCase().includes(search));
  filtered.sort((a, b) => getUrgenceLevel(b.date) - getUrgenceLevel(a.date));

  if (filtered.length === 0) {
    content.innerHTML = '<div class="text-center text-muted">Aucune réparation trouvée.</div>';
    return;
  }

  filtered.forEach(item => {
    const badge = getDaysBadge(item.date);
    const div = document.createElement('div');
    div.className = 'list-group-item';
    div.innerHTML = `
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h6 class="mb-1">${item.unite} - ${item.nom} ${badge}</h6>
          <small class="text-muted">${item.date}</small>
          <p class="mb-1">${item.description}</p>
        </div>
        <div><small class="text-primary">🔽 Voir</small></div>
      </div>
      <div class="details">
        <textarea class="form-control mb-2" placeholder="🛠️ Réparations effectuées" oninput="checkFields(this)"></textarea>
        <input type="number" class="form-control mb-2" placeholder="⏱️ Temps (minutes)" min="1" oninput="checkFields(this)">
        <button class="btn btn-success btn-sm" onclick="completer(this)" disabled>✅ Compléter</button>
      </div>
    `;
    div.addEventListener('click', function(e) {
      if (!e.target.closest('textarea') && !e.target.closest('input') && !e.target.closest('button')) {
        this.classList.toggle('opened');
      }
    });
    content.appendChild(div);
  });
}

function renderFait() {
  const content = document.getElementById('faitList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  content.innerHTML = '';

  let filtered = fait.filter(item => item.unite.toLowerCase().includes(search));

  if (filtered.length === 0) {
    content.innerHTML = '<div class="text-center text-muted">Aucune réparation complétée trouvée.</div>';
    return;
  }

  filtered.forEach(item => {
    const div = document.createElement('div');
    div.className = 'list-group-item';
    div.innerHTML = `
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h6 class="mb-1">${item.unite} - ${item.nom}</h6>
          <small class="text-muted">${item.date}</small>
          <p class="mb-1">${item.description}</p>
        </div>
        <div><small class="text-primary">🔽 Voir</small></div>
      </div>
      <div class="details">
        <hr>
        <p><strong>🛠️ Réparations effectuées :</strong><br>${item.notes}</p>
        <p><strong>⏱️ Temps :</strong> ${item.temps} minutes</p>
      </div>
    `;
    div.addEventListener('click', function(e) {
      this.classList.toggle('opened');
    });
    content.appendChild(div);
  });
}

function getDaysBadge(dateStr) {
  const today = new Date();
  const repairDate = new Date(dateStr);
  const diffTime = today - repairDate;
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  let color = "success"; // vert
  if (diffDays >= 3 && diffDays <= 5) color = "warning text-dark"; // jaune
  if (diffDays > 5) color = "danger"; // rouge

  return `<span class="badge bg-${color} badge-custom">${diffDays} jours</span>`;
}

function getUrgenceLevel(dateStr) {
  const today = new Date();
  const repairDate = new Date(dateStr);
  const diffTime = today - repairDate;
  return Math.floor(diffTime / (1000 * 60 * 60 * 24));
}

function checkFields(input) {
  const container = input.closest('.details');
  const textarea = container.querySelector('textarea');
  const timeInput = container.querySelector('input[type="number"]');
  const button = container.querySelector('button');

  if (textarea.value.trim() !== "" && timeInput.value.trim() !== "" && parseInt(timeInput.value) > 0) {
    button.disabled = false;
  } else {
    button.disabled = true;
  }
}

function completer(button) {
  const item = button.closest('.list-group-item');
  const textarea = item.querySelector('textarea').value.trim();
  const temps = item.querySelector('input[type="number"]').value.trim();
  const title = item.querySelector('h6').innerText;
  const subtitle = item.querySelector('small').innerText;
  const description = item.querySelector('p').innerText;

  const id = aFaire.find(r => title.includes(r.nom)).id;

  fait.push({
    id: id,
    unite: title.split(" - ")[0].trim(),
    nom: title.split(" - ")[1].trim(),
    date: subtitle,
    description: description,
    notes: textarea,
    temps: temps
  });

  aFaire = aFaire.filter(r => r.id !== id);

  alert("Réparation complétée avec succès!");

  showTab('faire');
}

// Démarrer
showTab('faire');
</script>

</body>
</html>
