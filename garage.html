<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Réparations Mobile Démo 2.0</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
    .list-group-item {
      border: none;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    .details {
      display: none;
      margin-top: 10px;
    }
    .opened .details {
      display: block;
    }
  </style>
</head>
<body>

<div class="container py-4">
  <h2 class="text-center mb-4">Réparations à traiter</h2>

  <div id="content" class="list-group">
    <!-- Réparations simulées ici -->
  </div>
</div>

<script>
// Données simulées
const reparations = [
  { id: 1, date: "2025-04-25", nom: "Jean Dupont", unite: "Camion 101", description: "Changer l'huile moteur." },
  { id: 2, date: "2025-04-24", nom: "Marie Tremblay", unite: "Tracteur 302", description: "Remplacer la batterie." },
  { id: 3, date: "2025-04-23", nom: "Luc Gagnon", unite: "Excavatrice 501", description: "Réparer fuite hydraulique." }
];

// Générer l'affichage
function renderList() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  reparations.forEach(item => {
    const div = document.createElement('div');
    div.className = 'list-group-item';
    div.innerHTML = `
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h6 class="mb-1">${item.unite} - ${item.nom}</h6>
          <small class="text-muted">${item.date}</small>
          <p class="mb-1">${item.description}</p>
        </div>
        <div><small class="text-primary">Voir</small></div>
      </div>
      <div class="details">
        <textarea class="form-control mb-2" placeholder="Réparations effectuées" oninput="checkFields(this)"></textarea>
        <input type="number" class="form-control mb-2" placeholder="Temps (minutes)" min="0" oninput="checkFields(this)">
        <button class="btn btn-success btn-sm" onclick="completer(this)" disabled>Compléter</button>
      </div>
    `;

    div.addEventListener('click', function(e) {
      if (!e.target.closest('textarea') && !e.target.closest('input') && !e.target.closest('button')) {
        this.classList.toggle('opened');
      }
    });

    content.appendChild(div);
  });
}

function checkFields(input) {
  const container = input.closest('.details');
  const textarea = container.querySelector('textarea');
  const timeInput = container.querySelector('input[type="number"]');
  const button = container.querySelector('button');

  if (textarea.value.trim() !== "" && timeInput.value.trim() !== "" && parseInt(timeInput.value) > 0) {
    button.disabled = false;
  } else {
    button.disabled = true;
  }
}

function completer(button) {
  const item = button.closest('.list-group-item');
  const note = item.querySelector('textarea').value.trim();
  const temps = item.querySelector('input[type="number"]').value.trim();

  item.classList.add('text-muted');
  item.querySelector('textarea').disabled = true;
  item.querySelector('input[type="number"]').disabled = true;
  button.disabled = true;
  button.innerText = "Complété";
  item.style.backgroundColor = "#d4edda"; // vert pâle pour visuel

  alert(`Réparation complétée!\nNotes: ${note}\nTemps: ${temps} minutes`);
}

// Charger initialement
renderList();
</script>

</body>
</html>
