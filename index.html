<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion – Transport E.L.Z inc.</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Comfortaa', sans-serif;
      background: #f6f6f6;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      background-color: #111;
      width: 100%;
      padding: 20px 0;
      text-align: center;
    }

    header img {
      height: 50px;
    }

    form {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
      margin: 40px auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    input[type="text"], input[type="password"] {
      padding: 12px;
      margin: 10px 0;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      background-color: #000;
      color: white;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin: 10px 0;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #000;
      border-radius: 4px;
      display: inline-block;
      position: relative;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"]:checked::after {
      content: "\2713";
      font-size: 14px;
      position: absolute;
      top: -2px;
      left: 2px;
      color: #000;
    }

    #erreur {
      color: red;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <img src="assets/logo.jpeg" alt="Logo Transportelz">
  </header>

  <form id="loginForm">
    <h2>Connexion</h2>
    <input type="text" id="identifiant" placeholder="Matricule" required autocomplete="username">
    <input type="password" id="motdepasse" placeholder="Mot de passe" required autocomplete="current-password">

    <label class="checkbox-group">
      <input type="checkbox" id="rememberMe">
      Rester connecté
    </label>

    <button type="submit">Se connecter</button>
    <p id="erreur"></p>
  </form>

  <!-- Firebase App (core SDK) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAxbpNoGfMEK5N6sy3WYWMTD3WGelff0QA",
      authDomain: "transportelz.firebaseapp.com",
      projectId: "transportelz",
      storageBucket: "transportelz.appspot.com",
      messagingSenderId: "290260714729",
      appId: "1:290260714729:web:a433a445eb44fe5404dc78",
      measurementId: "G-EKZYPTGFT7"
    };
    firebase.initializeApp(firebaseConfig);

    document.getElementById("loginForm").addEventListener("submit", function(event) {
  event.preventDefault();
  const matricule = document.getElementById("identifiant").value.trim().toLowerCase();
  const password = document.getElementById("motdepasse").value;
  const erreur = document.getElementById("erreur");
  const rememberMe = document.getElementById("rememberMe").checked;

  const email = matricule + "@transportelz.com";
  const persistence = rememberMe
    ? firebase.auth.Auth.Persistence.LOCAL
    : firebase.auth.Auth.Persistence.SESSION;

  firebase.auth().setPersistence(persistence)
    .then(() => {
      return firebase.auth().signInWithEmailAndPassword(email, password);
    })
    .then((userCredential) => {
      const user = userCredential.user;
      // Aller chercher le rôle dans Firestore
      return firebase.firestore().collection("roles").doc(user.uid).get()
        .then((doc) => {
          let role = "user"; // Valeur par défaut
          if (doc.exists && doc.data().role === "admin") {
            role = "admin";
          }
          localStorage.setItem("roleTransportelz", role);
          // TOUJOURS rediriger vers linktree
          window.location.href = "/linktree.html";
        });
    })
    .catch((error) => {
      erreur.textContent = "Informations incorrectes.";
    });
  });

  </script>
</body>
</html>
