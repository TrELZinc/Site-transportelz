<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magasin ELZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet" />
  <style>
    .article {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}.article img {
  width: 100%;
  height: 160px;
  object-fit: contain;
  object-position: center center;
  border-radius: 8px;
}


.article-content {
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}

.article-actions {
  margin-top: auto;
}

    body {
      margin: 0;
      font-family: 'Comfortaa', sans-serif;
      background-color: #f5f5f5;
    }

    header {
      background-color: #111;
      padding: 20px 0;
      text-align: center;
    }

    header img {
      height: 50px;
    }

    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .articles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .article {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .article img {
      max-width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .article h3 {
      margin: 10px 0 5px;
    }

    .article p {
      font-size: 0.9em;
      color: #555;
    }

    .article button {
      margin-top: 10px;
      background: #000;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
    }

    .select-taille {
      margin-top: 10px;
    }

    .select-taille select {
      padding: 6px 10px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1em;
    }

    @media (max-width: 600px) {
      .select-taille select {
        font-size: 1.2em;
        padding: 10px 14px;
      }
    }

    #panier-btn {
      display: block;
      margin: 20px auto;
      background-color: #000;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-family: inherit;
      border: none;
      cursor: pointer;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #000;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 9999;
    }

    #toast.show {
      opacity: 1;
    }

    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      z-index: 999;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      z-index: 1000;
      text-align: center;
    }

    .modal ul {
      list-style: none;
      padding: 0;
      margin-bottom: 20px;
      text-align: left;
    }

    .modal li {
      padding: 5px 0;
      display: flex;
      justify-content: space-between;
    }

    .modal li button {
      background: red;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 2px 6px;
      cursor: pointer;
    }

    #confirm-btn, #fermer-btn, #fermer-confirmation {
      background-color: #000;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <img src="assets/logo.jpeg" alt="Logo ELZ" />
  </header>

  <div class="container">
    <h1>Magasin interne ELZ</h1>
    <button id="panier-btn" onclick="afficherPanier()">🛒 Voir mon panier (0)</button>
    <div class="articles" id="articles"></div>
  </div>

  <div id="toast">Ajouté au panier ✅</div>

  <div id="overlay">
    <div class="modal" id="panier-modal">
      <h2>Mon panier</h2>
      <ul id="liste-panier"></ul>
      <button id="confirm-btn" onclick="envoyerCommande()">Confirmer la commande</button>
      <button id="fermer-btn" onclick="fermerPanier()">Fermer</button>
    </div>
    <div class="modal" id="confirmation-modal" style="display:none">
      <h2 id="confirmation-message"></h2>
      <button id="fermer-confirmation" onclick="fermerPanier()">Fermer</button>
    </div>
  </div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxnrZ5WZSMLPl0qGE5Adks2sDowlnakd0R8Asv9NGVmcmaq9akwNKCUsXC_PNMHzD8-/exec';
    const nom = localStorage.getItem('nom') || 'Inconnu';
    const courriel = localStorage.getItem('email') || 'non défini';
    const panier = [];
    const vetements = ['t-shirt', 'polo', 'hoodie', 'pantalon'];

    fetch(scriptURL)
      .then(res => res.json())
      .then(data => afficherArticles(data));

    function afficherArticles(articles) {
  const container = document.getElementById('articles');
  articles.forEach((article, index) => {
    const div = document.createElement('div');
    div.className = 'article';

    const isVetement = vetements.some(type => article.nom.toLowerCase().includes(type));
    const stock = parseInt(article.stock || 0);
    const rupture = stock === 0;

    div.innerHTML = `
      <div class="article-content">
        <img src="${article.image}" alt="${article.nom}" />
        <h3>${article.nom}</h3>
        <p>${article.description}</p>
        ${isVetement ? `
          <div class="select-taille">
            <label for="taille-${index}">Taille :</label>
            <select id="taille-${index}">
              <option value="S">S</option>
              <option value="M">M</option>
              <option value="L">L</option>
              <option value="XL">XL</option>
              <option value="XXL">XXL</option>
            </select>
          </div>
        ` : ''}
      </div>
      <div class="article-actions">
        ${rupture
          ? `<p style="color:red;font-weight:bold">Stock épuisé 🔥</p>`
          : `<p style="color:green;font-weight:bold">Stock : ${stock} 🟢</p>
             <button onclick="ajouterAuPanier('${article.nom}', ${isVetement}, ${index})">Ajouter au panier</button>`}
      </div>
    `;
    container.appendChild(div);
  });
}

    function ajouterAuPanier(nomArticle, hasSize, index) {
      let taille = '';
      if (hasSize) {
        const select = document.getElementById(`taille-${index}`);
        taille = select ? select.value : '';
      }

      panier.push({ article: nomArticle, taille });
      document.getElementById('panier-btn').innerText = `🛒 Voir mon panier (${panier.length})`;

      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function afficherPanier() {
      const overlay = document.getElementById('overlay');
      const liste = document.getElementById('liste-panier');
      const panierModal = document.getElementById('panier-modal');
      const confirmationModal = document.getElementById('confirmation-modal');

      liste.innerHTML = '';
      panier.forEach((item, i) => {
        const li = document.createElement('li');
        li.innerHTML = `${item.article}${item.taille ? ' - Taille ' + item.taille : ''} <button onclick="supprimerArticle(${i})">🗑</button>`;
        liste.appendChild(li);
      });

      panierModal.style.display = 'block';
      confirmationModal.style.display = 'none';
      overlay.style.display = 'flex';
    }

    function supprimerArticle(index) {
      panier.splice(index, 1);
      afficherPanier();
      document.getElementById('panier-btn').innerText = `🛒 Voir mon panier (${panier.length})`;
    }

    function fermerPanier() {
      document.getElementById('overlay').style.display = 'none';
    }

    function envoyerCommande() {
      const numeroCommande = `ELZ${Math.floor(1000 + Math.random() * 9000)}`;
      const payload = {
        nom,
        courriel,
        numeroCommande,
        date: new Date().toISOString(),
        panier
      };

      fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      document.getElementById('confirmation-message').innerText = `Commande envoyée ! Numéro : ${numeroCommande}`;
      document.getElementById('panier-modal').style.display = 'none';
      document.getElementById('confirmation-modal').style.display = 'block';
      panier.length = 0;
      document.getElementById('panier-btn').innerText = `🛒 Voir mon panier (0)`;
    }

    document.getElementById('overlay').addEventListener('click', function(e) {
      if (e.target === this) fermerPanier();
    });
  </script>
</body>
</html>
