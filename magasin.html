<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magasin ELZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Comfortaa', sans-serif;
      background-color: #f5f5f5;
    }

    header {
      background-color: #111;
      padding: 20px 0;
      text-align: center;
    }

    header img {
      height: 50px;
    }

    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .articles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .article {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .article img {
      max-width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .article h3 {
      margin: 10px 0 5px;
    }

    .article p {
      font-size: 0.9em;
      color: #555;
    }

    .article button {
      margin-top: 10px;
      background: #000;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
    }

    .select-taille {
      margin-top: 10px;
    }

    .select-taille select {
      padding: 6px 10px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1em;
    }

    @media (max-width: 600px) {
      .select-taille select {
        font-size: 1.2em;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="assets/logo.jpeg" alt="Logo ELZ" />
  </header>

  <div class="container">
    <h1>Magasin interne ELZ</h1>
    <div class="articles" id="articles"></div>
  </div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyIoU97J9Cei6xmxY-6j19HEszk8n-xeVZMpgl_SoYFm8ZUGPJKPamJjpPEv7CiZfUH/exec';
    const vetements = ['t-shirt', 'polo', 'hoodie', 'pantalon'];

    fetch(scriptURL)
      .then(res => res.json())
      .then(data => afficherArticles(data));

    function afficherArticles(articles) {
      const container = document.getElementById('articles');
      articles.forEach((article, index) => {
        const div = document.createElement('div');
        div.className = 'article';

        const isVetement = vetements.some(type => article.nom.toLowerCase().includes(type));

        div.innerHTML = `
          <img src="${article.image}" alt="${article.nom}" />
          <h3>${article.nom}</h3>
          <p>${article.description}</p>
          ${isVetement ? renderTailleDropdown(article, index) : renderBouton(article.nom, false, index)}
        `;

        container.appendChild(div);
      });
    }

    function renderTailleDropdown(article, index) {
      const tailles = ['S', 'M', 'L', 'XL', 'XXL'];
      let options = '';

      tailles.forEach(taille => {
        const key = `stock_${taille}`;
        const stock = parseInt(article[key] || 0);
        if (stock > 0) {
          options += `<option value="${taille}">${taille} (${stock})</option>`;
        } else {
          options += `<option value="${taille}" disabled>${taille} (épuisé)</option>`;
        }
      });

      const disabled = options.includes('selected') ? '' : 'disabled';

      return `
        <div class="select-taille">
          <label for="taille-${index}">Taille :</label>
          <select id="taille-${index}">
            ${options}
          </select>
        </div>
        <button onclick="ajouterAuPanier('${article.nom}', true, ${index})" ${disabled}>Ajouter au panier</button>
      `;
    }

    function renderBouton(nom, hasSize, index) {
      return `<button onclick="ajouterAuPanier('${nom}', ${hasSize}, ${index})">Ajouter au panier</button>`;
    }
  </script>
</body>
</html>
