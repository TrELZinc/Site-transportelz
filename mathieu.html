<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Résumé Hebdomadaire Chauffeur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #f8f9fa;
      color: #212529;
    }
    .card-day {
      flex: 1;
      min-width: 250px;
      background: #ffffff;
      border: 1px solid #dee2e6;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 0 8px rgba(0,0,0,0.05);
      transition: all 0.2s ease-in-out;
    }
    .card-day:hover {
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }
    .card-day h5 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .editable {
      border: 1px dashed transparent;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .editable:hover {
      border-color: #ccc;
      background-color: #f8f9fa;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <h2 class="text-center mb-4">Résumé Hebdomadaire</h2>
    <form id="selection-form" class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label">Chauffeur</label>
        <select id="chauffeurSelect" class="form-select" required>
          <option value="">-- Choisir --</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Date de début</label>
        <input type="date" id="startDate" class="form-control" required />
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <button type="submit" class="btn btn-primary w-100">Afficher la semaine</button>
      </div>
    </form>

    <div id="week-summary" class="d-flex justify-content-between gap-3 flex-wrap"></div>
  </div>

  <script>
    const chauffeurSelect = document.getElementById("chauffeurSelect");
    const form = document.getElementById("selection-form");
    const summaryContainer = document.getElementById("week-summary");

    // Exemple local de données chauffeurs
    const chauffeurs = [
      { nom: "Alex Tremblay", id: "alex" },
      { nom: "Marc Gagnon", id: "marc" },
      { nom: "Julie Lefebvre", id: "julie" }
    ];

    // Mock data pour résumé jour
    function getMockDayData(date, chauffeurId) {
      return {
        date,
        chauffeurId,
        km: Math.floor(Math.random() * 200),
        heures: (Math.random() * 8).toFixed(2),
        prime: 60.85,
        note: ""
      };
    }

    function getNextDays(startDate, count) {
      const dates = [];
      const base = new Date(startDate);
      for (let i = 0; i < count; i++) {
        const d = new Date(base);
        d.setDate(base.getDate() + i);
        dates.push(d.toISOString().split("T")[0]);
      }
      return dates;
    }

    function createDayCard(dayData) {
      const div = document.createElement("div");
      div.className = "card-day";

      div.innerHTML = `
        <h5>${new Date(dayData.date).toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "short" })}</h5>
        <p><strong>KM:</strong> <span class="editable" contenteditable="true">${dayData.km}</span></p>
        <p><strong>Heures:</strong> <span class="editable" contenteditable="true">${dayData.heures}</span></p>
        <p><strong>Prime:</strong> <span class="editable" contenteditable="true">${dayData.prime}</span> $</p>
        <p><strong>Note:</strong> <span class="editable" contenteditable="true">${dayData.note}</span></p>
      `;

      return div;
    }

    // Init chauffeurs
    chauffeurs.forEach(ch => {
      const opt = document.createElement("option");
      opt.value = ch.id;
      opt.textContent = ch.nom;
      chauffeurSelect.appendChild(opt);
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      summaryContainer.innerHTML = "";

      const chauffeurId = chauffeurSelect.value;
      const start = document.getElementById("startDate").value;

      if (!chauffeurId || !start) return;

      const dates = getNextDays(start, 5);
      dates.forEach(date => {
        const data = getMockDayData(date, chauffeurId);
        summaryContainer.appendChild(createDayCard(data));
      });
    });
  </script>
</body>
</html>
