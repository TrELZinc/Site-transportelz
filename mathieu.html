<!-- PROJET: Sommaire Paye Chauffeurs -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sommaire Paye Chauffeur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background-color: #f8f9fa; }
    .week-container { display: flex; flex-direction: row; gap: 12px; overflow-x: auto; margin-bottom: 30px; }
    .day-card {
      flex: 1;
      min-width: 240px;
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    .day-card h5 {
      font-size: 1rem;
      font-weight: bold;
    }
    .editable { background-color: #fff3cd; padding: 4px; border-radius: 4px; }
  </style>
</head>
<body class="p-4">
  <div class="container">
    <h3>Sommaire hebdomadaire chauffeur</h3>
    
    <div class="row mb-3">
      <div class="col-md-3">
        <label>Nom chauffeur</label>
        <input type="text" id="chauffeur" class="form-control" placeholder="Ex: Jean Tremblay" />
      </div>
      <div class="col-md-3">
        <label>Date du lundi</label>
        <input type="date" id="dateLundi" class="form-control" />
      </div>
      <div class="col-md-6 d-flex align-items-end gap-2">
        <button class="btn btn-outline-secondary" onclick="chargerDepuisSheets()">Afficher depuis Google Sheets</button>
        <button class="btn btn-outline-success" onclick="sauverDansFirebase()">Enregistrer dans Firebase</button>
        <button class="btn btn-outline-primary" onclick="chargerDepuisFirebase()">Afficher Firebase</button>
      </div>
    </div>

    <div id="weekDisplay" class="week-container"></div>
  </div>

  <!-- Firebase SDK compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD4U85mokKXsAP1AdwClWtcbt8udZrwlAw",
      authDomain: "sommaireelz.firebaseapp.com",
      projectId: "sommaireelz",
      storageBucket: "sommaireelz.firebasestorage.app",
      messagingSenderId: "171788284751",
      appId: "1:171788284751:web:694f070d1cafe8b7c04b3a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function getWeekDates(dateStr) {
      const lundi = new Date(dateStr);
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(lundi);
        d.setDate(lundi.getDate() + i);
        dates.push(d.toISOString().split('T')[0]);
      }
      return dates;
    }

    function afficherSemaine(data) {
      const container = document.getElementById("weekDisplay");
      container.innerHTML = "";

      data.forEach(entry => {
        const div = document.createElement("div");
        div.className = "day-card";

        div.innerHTML = `
          <h5>${entry.date}</h5>
          <p><strong>Origine:</strong> ${entry.origine}</p>
          <p><strong>Destination:</strong> ${entry.destination}</p>
          <p><strong>Type:</strong> ${entry.type}</p>
          <p><strong>KM:</strong> <span contenteditable class="editable">${entry.km || 0}</span></p>
          <p><strong>Heures:</strong> <span contenteditable class="editable">${entry.heure || 0}</span></p>
        `;
        container.appendChild(div);
      });
    }

    // Placeholder : simulation données depuis Google Sheets
    function chargerDepuisSheets() {
      const chauffeur = document.getElementById("chauffeur").value;
      const dateLundi = document.getElementById("dateLundi").value;
      const dates = getWeekDates(dateLundi);

      // Simule données journalières
      const data = dates.map(d => ({
        date: d,
        origine: "St-Basile",
        destination: "Montréal",
        type: "kilométrage",
        km: Math.floor(Math.random() * 300),
        heure: 0
      }));

      afficherSemaine(data);
      window._currentSemaine = data;
    }

    function sauverDansFirebase() {
      if (!window._currentSemaine) return alert("Aucune donnée à enregistrer.");
      const chauffeur = document.getElementById("chauffeur").value;
      const semaineKey = document.getElementById("dateLundi").value;

      // Lire les valeurs modifiées
      const cards = document.querySelectorAll(".day-card");
      const sauvegarde = [];

      cards.forEach(card => {
        const spans = card.querySelectorAll(".editable");
        const km = parseFloat(spans[0].innerText || 0);
        const heure = parseFloat(spans[1].innerText || 0);
        const date = card.querySelector("h5").textContent;
        const origine = card.querySelector("p:nth-child(2)").textContent.replace("Origine: ", "");
        const destination = card.querySelector("p:nth-child(3)").textContent.replace("Destination: ", "");
        const type = card.querySelector("p:nth-child(4)").textContent.replace("Type: ", "");

        sauvegarde.push({ date, origine, destination, type, km, heure });
      });

      db.collection("paye_sommaire").add({
        chauffeur,
        semaine: semaineKey,
        timestamp: new Date(),
        jours: sauvegarde
      }).then(() => {
        alert("✅ Semaine enregistrée dans Firebase !");
      });
    }

    function chargerDepuisFirebase() {
      const chauffeur = document.getElementById("chauffeur").value;
      const semaineKey = document.getElementById("dateLundi").value;

      db.collection("paye_sommaire")
        .where("chauffeur", "==", chauffeur)
        .where("semaine", "==", semaineKey)
        .orderBy("timestamp", "desc")
        .limit(1)
        .get()
        .then(snapshot => {
          if (!snapshot.empty) {
            const data = snapshot.docs[0].data();
            afficherSemaine(data.jours);
          } else {
            alert("📭 Aucune donnée trouvée pour cette semaine dans Firebase.");
          }
        });
    }
  </script>
</body>
</html>
