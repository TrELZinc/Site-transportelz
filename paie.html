<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Journal de Travail</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8f9fa;
        color: #212529;
      }

      .form-label,
      .form-check-label {
        color: #212529;
      }

      .form-control,
      .form-select {
        background-color: #ffffff;
        color: #212529;
        border: 1px solid #ced4da;
      }

      .form-control:focus,
      .form-select:focus {
        border-color: #dc3545;
        box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25);
      }

      .btn-primary {
        background-color: #cc0000;
        border: none;
      }

      .btn-primary:hover {
        background-color: #ff0000;
      }

      .container {
        max-width: 540px;
      }

      .section-box {
        background-color: #ffffff;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.05);
        margin-bottom: 1.5rem;
      }
    </style>
  </head>

  <body>
    <div class="container py-4">
      <h2 class="mb-4 text-center">Journal de travail</h2>

      <form id="formulaire">
        <!-- SECTION 1 -->
        <div class="section-box">
          <div class="mb-3">
            <label for="date" class="form-label">Date</label>
            <input
              type="date"
              class="form-control"
              id="date"
              name="date"
              required
            />
          </div>

          <div class="mb-3">
            <label for="nom" class="form-label">Nom complet</label>
            <input
              type="text"
              class="form-control"
              id="nom"
              name="nom"
              required
            />
          </div>

          <div class="mb-3">
            <label for="camion" class="form-label">Numéro de camion</label>
            <select class="form-select" id="camion" name="camion" required>
              <option value="">-- Sélectionner --</option>
              <option value="C001">Camion C001</option>
              <option value="C002">Camion C002</option>
              <option value="C003">Camion C003</option>
              <option value="C004">Camion C004</option>
              <option value="C005">Camion C005</option>
              <option value="C006">Camion C006</option>
              <option value="C007">Camion C007</option>
              <option value="C008">Camion C008</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="remorque" class="form-label">Numéro de remorque</label>
            <select class="form-select" id="remorque" name="remorque" required>
              <option value="">-- Sélectionner --</option>
              <option value="R001">Remorque R001</option>
              <option value="R002">Remorque R002</option>
              <option value="R003">Remorque R003</option>
              <option value="R004">Remorque R004</option>
              <option value="R005">Remorque R005</option>
              <option value="R006">Remorque R006</option>
              <option value="R007">Remorque R007</option>
              <option value="R008">Remorque R008</option>
              <option value="R009">Remorque R009</option>
              <option value="R010">Remorque R010</option>
            </select>
          </div>
        </div>

        <!-- SECTION 2 -->
        <div class="section-box">
          <h5 class="mb-3">Type de voyage</h5>

          <div class="form-check mb-2">
            <input
              class="form-check-input"
              type="radio"
              name="type_voyage"
              id="voyage_km"
              value="kilometrage"
              required
            />
            <label class="form-check-label" for="voyage_km">
              Voyage au kilométrage
            </label>
          </div>

          <div class="form-check">
            <input
              class="form-check-input"
              type="radio"
              name="type_voyage"
              id="voyage_heure"
              value="heure"
              required
            />
            <label class="form-check-label" for="voyage_heure">
              Voyage à l’heure
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Continuer
        </button>
      </form>
    </div>
 <script>
  const radios = document.querySelectorAll('input[name="type_voyage"]');
  const form = document.getElementById("formulaire");

  const champConditionnel = document.createElement("div");
  champConditionnel.className = "section-box";
  form.insertBefore(champConditionnel, form.querySelector("button"));

  radios.forEach((radio) => {
    radio.addEventListener("change", () => {
      const selected = document.querySelector(
        'input[name="type_voyage"]:checked'
      )?.value;

      if (selected === "heure") {
        champConditionnel.innerHTML = `
          <h5 class="mb-3">Détails du voyage à l’heure</h5>

          <div class="mb-3">
            <label for="origine" class="form-label">Origine</label>
            <select class="form-select" id="origine" name="origine" required>
              <option value="St-Basile" selected>St-Basile</option>
              <option value="Vimont">Vimont</option>
              <option value="Stanstead">Stanstead</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="heure_debut" class="form-label">Heure de début</label>
            <input type="time" class="form-control" id="heure_debut" name="heure_debut" required />
          </div>

          <div class="mb-3">
            <label for="heure_fin" class="form-label">Heure de fin</label>
            <input type="time" class="form-control" id="heure_fin" name="heure_fin" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Avez-vous fait un autre voyage ensuite ?</label>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="autre_voyage" id="oui_heure" value="oui" required />
              <label class="form-check-label" for="oui_heure">Oui</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="autre_voyage" id="non_heure" value="non" required />
              <label class="form-check-label" for="non_heure">Non</label>
            </div>
          </div>
        `;
      } else if (selected === "kilometrage") {
        champConditionnel.innerHTML = `
          <h5 class="mb-3">Détails du voyage au kilométrage</h5>

          <div class="mb-3">
            <label for="origine_km" class="form-label">Origine</label>
            <select class="form-select" id="origine_km" name="origine_km" required>
              <option value="St-Basile" selected>St-Basile</option>
              <option value="Vimont">Vimont</option>
              <option value="Stanstead">Stanstead</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="destination" class="form-label">Ville de destination</label>
            <input list="destinations" class="form-control" id="destination" name="destination" required />
            <datalist id="destinations">
              <option value="Montréal"></option>
              <option value="Québec"></option>
              <option value="Drummondville"></option>
              <option value="Laval"></option>
              <option value="Gatineau"></option>
              <option value="Ottawa"></option>
              <option value="Sherbrooke"></option>
            </datalist>
          </div>

          <div class="mb-3">
            <label class="form-label">Avez-vous fait un autre voyage ensuite ?</label>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="autre_voyage" id="oui_km" value="oui" required />
              <label class="form-check-label" for="oui_km">Oui</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="autre_voyage" id="non_km" value="non" required />
              <label class="form-check-label" for="non_km">Non</label>
            </div>
          </div>
        `;
      } else {
        champConditionnel.innerHTML = "";
      }
    });
  });
</script>
  </body>
</html>
