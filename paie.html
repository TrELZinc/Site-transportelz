<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Journal de Travail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #f8f9fa;
      color: #212529;
    }
    .form-label,
    .form-check-label {
      color: #212529;
    }
    .form-control,
    .form-select {
      background-color: #ffffff;
      color: #212529;
      border: 1px solid #ced4da;
    }
    .btn-primary {
      background-color: #cc0000;
      border: none;
    }
    .btn-primary:hover {
      background-color: #ff0000;
    }
    .container {
      max-width: 540px;
    }
    .section-box {
      background-color: #ffffff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.05);
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <h2 class="mb-4 text-center">Journal de travail</h2>
    <form id="formulaire">
      <div class="section-box">
        <div class="mb-3">
          <label for="date" class="form-label">Date</label>
          <input type="date" class="form-control" id="date" name="date" required />
        </div>
        <div class="mb-3">
          <label for="nom" class="form-label">Nom complet</label>
          <input type="text" class="form-control" id="nom" name="nom" required />
        </div>
        <div class="mb-3">
          <label for="camion" class="form-label">Numéro de camion</label>
          <select class="form-select" id="camion" name="camion" required>
            <option value="">-- Sélectionner --</option>
            <option value="C001">Camion C001</option>
            <option value="C002">Camion C002</option>
            <option value="C003">Camion C003</option>
            <option value="C004">Camion C004</option>
            <option value="C005">Camion C005</option>
            <option value="C006">Camion C006</option>
            <option value="C007">Camion C007</option>
            <option value="C008">Camion C008</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="remorque" class="form-label">Numéro de remorque</label>
          <select class="form-select" id="remorque" name="remorque" required>
            <option value="">-- Sélectionner --</option>
            <option value="R001">Remorque R001</option>
            <option value="R002">Remorque R002</option>
            <option value="R003">Remorque R003</option>
            <option value="R004">Remorque R004</option>
            <option value="R005">Remorque R005</option>
            <option value="R006">Remorque R006</option>
            <option value="R007">Remorque R007</option>
            <option value="R008">Remorque R008</option>
            <option value="R009">Remorque R009</option>
            <option value="R010">Remorque R010</option>
          </select>
        </div>
      </div>

      <div id="voyageContainer"></div>

      <button type="submit" class="btn btn-primary w-100 mt-3">Soumettre</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("formulaire");
    const voyageContainer = document.getElementById("voyageContainer");
    let voyageCount = 0;
    const MAX_VOYAGES = 3;

    addVoyageSection();

    function addVoyageSection() {
      if (voyageCount >= MAX_VOYAGES) return;
      voyageCount++;
      const id = voyageCount;

      const section = document.createElement("div");
      section.className = "section-box";
      section.innerHTML = `
        <h5 class="mb-3">Voyage ${id}</h5>
        <div class="mb-3">
          <label class="form-label">Type de voyage</label>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="type_voyage_${id}" id="km_${id}" value="kilometrage" required>
            <label class="form-check-label" for="km_${id}">Voyage au kilométrage</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="type_voyage_${id}" id="heure_${id}" value="heure" required>
            <label class="form-check-label" for="heure_${id}">Voyage à l’heure</label>
          </div>
        </div>
        <div id="details_${id}"></div>
      `;
      voyageContainer.appendChild(section);

      section.querySelectorAll(`input[name="type_voyage_${id}"]`).forEach((radio) => {
        radio.addEventListener("change", () => {
          const container = section.querySelector(`#details_${id}`);
          if (radio.value === "heure") {
            container.innerHTML = `
              <div class="mb-3">
                <label class="form-label">Origine</label>
                <select class="form-select" name="origine_${id}" required>
                  <option value="St-Basile" selected>St-Basile</option>
                  <option value="Vimont">Vimont</option>
                  <option value="Stanstead">Stanstead</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Destination</label>
                <input type="text" class="form-control" name="destination_${id}" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Heure de début</label>
                <div class="d-flex gap-2">
      <select class="form-select" name="heure_debut_h_" required>
        <option value="00">00</option>
<option value="01">01</option>
<option value="02">02</option>
<option value="03">03</option>
<option value="04">04</option>
<option value="05">05</option>
<option value="06">06</option>
<option value="07">07</option>
<option value="08">08</option>
<option value="09">09</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
<option value="13">13</option>
<option value="14">14</option>
<option value="15">15</option>
<option value="16">16</option>
<option value="17">17</option>
<option value="18">18</option>
<option value="19">19</option>
<option value="20">20</option>
<option value="21">21</option>
<option value="22">22</option>
<option value="23">23</option>
      </select>
      <select class="form-select" name="heure_debut_m_" required>
        <option value="00">00</option>
        <option value="15">15</option>
        <option value="30">30</option>
        <option value="45">45</option>
      </select>
    </div><!--REPLACE_END--> name="heure_debut_h_${id}" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Heure de fin</label>
                <div class="d-flex gap-2">
      <select class="form-select" name="heure_debut_h_" required>
        <option value="00">00</option>
<option value="01">01</option>
<option value="02">02</option>
<option value="03">03</option>
<option value="04">04</option>
<option value="05">05</option>
<option value="06">06</option>
<option value="07">07</option>
<option value="08">08</option>
<option value="09">09</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
<option value="13">13</option>
<option value="14">14</option>
<option value="15">15</option>
<option value="16">16</option>
<option value="17">17</option>
<option value="18">18</option>
<option value="19">19</option>
<option value="20">20</option>
<option value="21">21</option>
<option value="22">22</option>
<option value="23">23</option>
      </select>
      <select class="form-select" name="heure_debut_m_" required>
        <option value="00">00</option>
        <option value="15">15</option>
        <option value="30">30</option>
        <option value="45">45</option>
      </select>
    </div><!--REPLACE_END--> name="heure_fin_h_${id}" required />
              </div>
              ${id < MAX_VOYAGES ? getSuiviHTML(id) : ''}
            `;
            setupSuiviListener(id);
          } else {
            container.innerHTML = `
              <div class="mb-3">
                <label class="form-label">Origine</label>
                <select class="form-select" name="origine_${id}" required>
                  <option value="St-Basile" selected>St-Basile</option>
                  <option value="Vimont">Vimont</option>
                  <option value="Stanstead">Stanstead</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Ville de destination</label>
                <input list="destinations" class="form-control" name="destination_${id}" required />
                <datalist id="destinations">
                  <option value="Montréal"></option>
                  <option value="Québec"></option>
                  <option value="Gatineau"></option>
                  <option value="Sherbrooke"></option>
                  <option value="Drummondville"></option>
                </datalist>
              </div>
              ${id < MAX_VOYAGES ? getSuiviHTML(id) : ''}
            `;
            setupSuiviListener(id);
          }
        });
      });
    }

    function getSuiviHTML(id) {
      return `
        <div class="mb-3 mt-3">
          <label class="form-label">Avez-vous fait un autre voyage ensuite ?</label>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="autre_${id}" id="oui_${id}" value="oui" required />
            <label class="form-check-label" for="oui_${id}">Oui</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="autre_${id}" id="non_${id}" value="non" required />
            <label class="form-check-label" for="non_${id}">Non</label>
          </div>
        </div>
      `;
    }

    function setupSuiviListener(id) {
      const oui = document.getElementById(`oui_${id}`);
      const non = document.getElementById(`non_${id}`);
      if (oui) {
        oui.addEventListener("change", () => {
          if (voyageCount < MAX_VOYAGES) {
            addVoyageSection();
          }
        });
      }
      if (non) {
        non.addEventListener("change", afficherSectionFinale);
      }
      if (voyageCount === MAX_VOYAGES) afficherSectionFinale();
    }

    function afficherSectionFinale() {
      if (document.getElementById("final_section")) return;
      const script = document.createElement("script");
      script.src = "FINAL_SECTION_PLACEHOLDER";
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
