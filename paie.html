<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Journal de Travail</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8f9fa;
        color: #212529;
      }

      .form-label,
      .form-check-label {
        color: #212529;
      }

      .form-control,
      .form-select {
        background-color: #ffffff;
        color: #212529;
        border: 1px solid #ced4da;
      }

      .form-control:focus,
      .form-select:focus {
        border-color: #dc3545;
        box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25);
      }

      .btn-primary {
        background-color: #cc0000;
        border: none;
      }

      .btn-primary:hover {
        background-color: #ff0000;
      }

      .container {
        max-width: 540px;
      }

      .section-box {
        background-color: #ffffff;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.05);
        margin-bottom: 1.5rem;
      }
    </style>
  </head>

  <body>
    <div class="container py-4">
      <h2 class="mb-4 text-center">Journal de travail</h2>

      <form id="formulaire">
        <!-- SECTION 1 -->
        <div class="section-box">
          <div class="mb-3">
            <label for="date" class="form-label">Date</label>
            <input
              type="date"
              class="form-control"
              id="date"
              name="date"
              required
            />
          </div>

          <div class="mb-3">
            <label for="nom" class="form-label">Nom complet</label>
            <input
              type="text"
              class="form-control"
              id="nom"
              name="nom"
              required
            />
          </div>

          <div class="mb-3">
            <label for="camion" class="form-label">Numéro de camion</label>
            <select class="form-select" id="camion" name="camion" required>
              <option value="">-- Sélectionner --</option>
              <option value="C001">Camion C001</option>
              <option value="C002">Camion C002</option>
              <option value="C003">Camion C003</option>
              <option value="C004">Camion C004</option>
              <option value="C005">Camion C005</option>
              <option value="C006">Camion C006</option>
              <option value="C007">Camion C007</option>
              <option value="C008">Camion C008</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="remorque" class="form-label">Numéro de remorque</label>
            <select class="form-select" id="remorque" name="remorque" required>
              <option value="">-- Sélectionner --</option>
              <option value="R001">Remorque R001</option>
              <option value="R002">Remorque R002</option>
              <option value="R003">Remorque R003</option>
              <option value="R004">Remorque R004</option>
              <option value="R005">Remorque R005</option>
              <option value="R006">Remorque R006</option>
              <option value="R007">Remorque R007</option>
              <option value="R008">Remorque R008</option>
              <option value="R009">Remorque R009</option>
              <option value="R010">Remorque R010</option>
            </select>
          </div>
        </div>

        <!-- SECTION 2 -->
        <div class="section-box">
          <h5 class="mb-3">Type de voyage</h5>

          <div class="form-check mb-2">
            <input
              class="form-check-input"
              type="radio"
              name="type_voyage"
              id="voyage_km"
              value="kilometrage"
              required
            />
            <label class="form-check-label" for="voyage_km">
              Voyage au kilométrage
            </label>
          </div>

          <div class="form-check">
            <input
              class="form-check-input"
              type="radio"
              name="type_voyage"
              id="voyage_heure"
              value="heure"
              required
            />
            <label class="form-check-label" for="voyage_heure">
              Voyage à l’heure
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Continuer
        </button>
      </form>
    </div>
<script>
  const form = document.getElementById("formulaire");
  const bouton = form.querySelector("button[type='submit']");
  const voyageContainer = document.createElement("div");
  voyageContainer.className = "mt-4";
  form.insertBefore(voyageContainer, bouton);

  let voyageCount = 0;
  const MAX_VOYAGES = 3;

  addVoyageSection(); // 1er voyage

  function addVoyageSection() {
    if (voyageCount >= MAX_VOYAGES) return;

    voyageCount++;
    const idSuffix = voyageCount;
    const section = document.createElement("div");
    section.className = "section-box";
    section.innerHTML = `
      <h5 class="mb-3">Voyage ${idSuffix}</h5>

      <div class="mb-3">
        <label class="form-label">Type de voyage</label>
        <div class="form-check">
          <input class="form-check-input type-radio" type="radio" name="type_voyage_${idSuffix}" id="km_${idSuffix}" value="kilometrage" required>
          <label class="form-check-label" for="km_${idSuffix}">Voyage au kilométrage</label>
        </div>
        <div class="form-check">
          <input class="form-check-input type-radio" type="radio" name="type_voyage_${idSuffix}" id="heure_${idSuffix}" value="heure" required>
          <label class="form-check-label" for="heure_${idSuffix}">Voyage à l’heure</label>
        </div>
      </div>

      <div id="details_${idSuffix}"></div>
    `;

    voyageContainer.appendChild(section);

    const radios = section.querySelectorAll(`input[name="type_voyage_${idSuffix}"]`);
    radios.forEach((radio) => {
      radio.addEventListener("change", () => {
        const type = radio.value;
        const detailsDiv = section.querySelector(`#details_${idSuffix}`);

        if (type === "heure") {
          detailsDiv.innerHTML = `
            <div class="mb-3">
              <label class="form-label">Origine</label>
              <select class="form-select" name="origine_${idSuffix}" required>
                <option value="St-Basile" selected>St-Basile</option>
                <option value="Vimont">Vimont</option>
                <option value="Stanstead">Stanstead</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Heure de début</label>
              <input type="time" class="form-control" name="heure_debut_${idSuffix}" required />
            </div>

            <div class="mb-3">
              <label class="form-label">Heure de fin</label>
              <input type="time" class="form-control" name="heure_fin_${idSuffix}" required />
            </div>
          ` + addSuiviHTML(idSuffix);
        } else {
          detailsDiv.innerHTML = `
            <div class="mb-3">
              <label class="form-label">Origine</label>
              <select class="form-select" name="origine_${idSuffix}" required>
                <option value="St-Basile" selected>St-Basile</option>
                <option value="Vimont">Vimont</option>
                <option value="Stanstead">Stanstead</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Ville de destination</label>
              <input list="destinations" class="form-control" name="destination_${idSuffix}" required />
              <datalist id="destinations">
                <option value="Montréal"></option>
                <option value="Québec"></option>
                <option value="Gatineau"></option>
                <option value="Sherbrooke"></option>
                <option value="Drummondville"></option>
              </datalist>
            </div>
          ` + addSuiviHTML(idSuffix);
        }

        setupSuiviListener(idSuffix);
      });
    });
  }

  function addSuiviHTML(id) {
    return `
      <div class="mb-3 mt-3">
        <label class="form-label">Avez-vous fait un autre voyage ensuite ?</label>
        <div class="form-check">
          <input class="form-check-input autre-radio" type="radio" name="autre_${id}" id="oui_${id}" value="oui" required />
          <label class="form-check-label" for="oui_${id}">Oui</label>
        </div>
        <div class="form-check">
          <input class="form-check-input autre-radio" type="radio" name="autre_${id}" id="non_${id}" value="non" required />
          <label class="form-check-label" for="non_${id}">Non</label>
        </div>
      </div>
    `;
  }

  function setupSuiviListener(id) {
    const ouiRadio = document.getElementById(`oui_${id}`);
    if (ouiRadio) {
      ouiRadio.addEventListener("change", () => {
        if (voyageCount < MAX_VOYAGES) {
          addVoyageSection();
        }
      });
    }
  }
</script>
  </body>
</html>
