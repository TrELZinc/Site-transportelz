<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Permis E.L.Z inc.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    #pdfViewer {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    canvas {
      width: 100% !important;
      height: auto !important;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <h4 class="text-center mb-4">Gestion des Permis</h4>

    <!-- Sélecteurs -->
    <div class="mb-3">
      <label class="form-label">Unité</label>
      <select id="unitSelect" class="form-select"></select>
    </div>

    <div class="mb-3">
      <label class="form-label">Permis</label>
      <select id="permitSelect" class="form-select"></select>
    </div>

    <!-- Date -->
    <div class="mb-3">
      <label class="form-label">Date de renouvellement</label>
      <input id="renewalDate" class="form-control" type="text" readonly value="N/A" />
    </div>

    <!-- Visionneuse -->
    <div id="pdfViewer" class="mb-3">
      <canvas id="pdfCanvas"></canvas>
    </div>

    <!-- Upload -->
    <div class="mb-3">
      <label class="form-label">Uploader un fichier PDF</label>
      <input class="form-control" type="file" id="fileInput" accept="application/pdf">
    </div>
  </div>

  <!-- PDF.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const unitSelect = document.getElementById('unitSelect');
    const permitSelect = document.getElementById('permitSelect');
    const renewalDate = document.getElementById('renewalDate');
    const fileInput = document.getElementById('fileInput');
    const canvas = document.getElementById('pdfCanvas');
    const ctx = canvas.getContext('2d');

    // ✅ Permis — à modifier ici SEULEMENT
    const permits = [
      "Permis N.H",
      "Permis MASS",
      "Permis Vermont",
      "Permis Overweight QC",
      "Immatriculation",
      "Permis F",
      "Permis G"
    ];

    // ✅ Unités personnalisées
    const customUnits = [
      "Camion 11103", "Camion 1202", "Camion 1203", "Camion 1303",
      "Camion 1404", "Camion 1502", "Camion 1503", "Camion 1603",
      "Camion 1703", "Camion 1803", "Remorque 1505", "Remorque 1605",
      "Remorque 1805", "Remorque 1806", "Remorque 1905", "Remorque 1906",
      "Remorque 2006", "Remorque 2205", "Remorque 2405", "Remorque 2506",
      "Remorque 2706"
    ];

    const data = {};

    function initPermits() {
      permitSelect.innerHTML = '';
      permits.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        permitSelect.appendChild(opt);
      });
    }

    function initUnits() {
      unitSelect.innerHTML = '';
      customUnits.forEach(unit => {
        const opt = document.createElement('option');
        opt.value = unit;
        opt.textContent = unit;
        unitSelect.appendChild(opt);

        if (!data[unit]) {
          data[unit] = {};
          permits.forEach(p => {
            data[unit][p] = {
              pdf: '',
              date: 'N/A'
            };
          });
        }
      });
    }

    async function renderPDF(url) {
      if (!url) return;
      const loadingTask = pdfjsLib.getDocument(url);
      const pdf = await loadingTask.promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 1.5 });
      canvas.height = viewport.height;
      canvas.width = viewport.width;
      await page.render({ canvasContext: ctx, viewport }).promise;
    }

    function updateDisplay() {
      const unit = unitSelect.value;
      const permit = permitSelect.value;
      const entry = data[unit][permit];
      renewalDate.value = entry.date;
      renderPDF(entry.pdf);
    }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function () {
          const pdfDataUrl = reader.result;
          const unit = unitSelect.value;
          const permit = permitSelect.value;
          data[unit][permit].pdf = pdfDataUrl;
          data[unit][permit].date = new Date().toISOString().split('T')[0];
          updateDisplay();
        };
        reader.readAsDataURL(file);
      }
    });

    unitSelect.addEventListener('change', updateDisplay);
    permitSelect.addEventListener('change', updateDisplay);

    // 🚀 Initialisation complète
    initPermits();
    initUnits();
    updateDisplay();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
