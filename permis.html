<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Permis E.L.Z inc.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    #pdfViewer { width: 100%; border: 1px solid #ccc; border-radius: 5px; }
    canvas { width: 100% !important; height: auto !important; }
  </style>
</head>
<body>
<div class="container py-4">
  <h4 class="text-center mb-4">Gestion des Permis Google Drive</h4>

  <div class="mb-3">
    <label class="form-label">Unité</label>
    <select id="unitSelect" class="form-select"></select>
  </div>

  <div class="mb-3">
    <label class="form-label">Permis</label>
    <select id="permitSelect" class="form-select"></select>
  </div>

  <div class="mb-3">
    <label class="form-label">Date de renouvellement</label>
    <input id="renewalDate" class="form-control" type="text" readonly value="N/A" />
  </div>

  <div id="pdfViewer" class="mb-3">
    <canvas id="pdfCanvas"></canvas>
  </div>
</div>

<script>
const CLIENT_ID = '634208374611-k813794di8olcaoci33pe1r56eknfljjp.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
const rootFolderId = '1jw4BN7tlvwttYv1vfp6sCi3GGvJrs8I1'; // Ton dossier "Permis"

const permits = [
  "Permis N.H", "Permis MASS", "Permis Vermont",
  "Permis Overweight QC", "Immatriculation", "Permis F", "Permis G"
];
const customUnits = [
  "Camion 11103", "Camion 1202", "Camion 1303",
  "Remorque 1505", "Remorque 1805"
];

const unitSelect = document.getElementById('unitSelect');
const permitSelect = document.getElementById('permitSelect');
const renewalDate = document.getElementById('renewalDate');
const canvas = document.getElementById('pdfCanvas');
const ctx = canvas.getContext('2d');

function initSelectors() {
  customUnits.forEach(unit => unitSelect.add(new Option(unit, unit)));
  permits.forEach(p => permitSelect.add(new Option(p, p)));
}

function waitGapiReady() {
  return new Promise(resolve => gapi.load("client:auth2", resolve));
}

async function initGoogleClient() {
  await gapi.client.init({
    clientId: CLIENT_ID,
    scope: SCOPES,
    discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]
  });

  const authInstance = gapi.auth2.getAuthInstance();
  if (!authInstance.isSignedIn.get()) {
    await authInstance.signIn();
  }

  console.log("✅ Auth Google OK");
}

async function getFolderIdByName(name, parentId) {
  const res = await gapi.client.drive.files.list({
    q: `'${parentId}' in parents and name = '${name}' and mimeType = 'application/vnd.google-apps.folder' and trashed = false`,
    fields: 'files(id, name)',
  });
  return res.result.files.length ? res.result.files[0].id : null;
}

async function getFileIdByName(name, folderId) {
  const res = await gapi.client.drive.files.list({
    q: `'${folderId}' in parents and name = '${name}.pdf' and mimeType='application/pdf' and trashed=false`,
    fields: 'files(id, name)'
  });
  return res.result.files.length ? res.result.files[0].id : null;
}

async function displaySelectedPDF() {
  const unit = unitSelect.value;
  const permit = permitSelect.value;

  try {
    const folderId = await getFolderIdByName(unit, rootFolderId);
    if (!folderId) return alert(`Dossier "${unit}" introuvable.`);

    const fileId = await getFileIdByName(permit, folderId);
    if (!fileId) return alert(`PDF "${permit}.pdf" introuvable dans "${unit}".`);

    const fileUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
    renewalDate.value = "À synchroniser (manuel ou metadata)";
    renderPDF(fileUrl);
  } catch (err) {
    console.error(err);
    alert("❌ Erreur Google Drive");
  }
}

async function renderPDF(url) {
  const loadingTask = pdfjsLib.getDocument(url);
  const pdf = await loadingTask.promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 1.5 });
  canvas.height = viewport.height;
  canvas.width = viewport.width;
  await page.render({ canvasContext: ctx, viewport }).promise;
}

// 📦 Init complet
unitSelect.addEventListener('change', displaySelectedPDF);
permitSelect.addEventListener('change', displaySelectedPDF);

initSelectors();

waitGapiReady().then(initGoogleClient).then(displaySelectedPDF);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
