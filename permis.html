<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Permis Viewer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding: 1rem;
      background-color: #f9f9f9;
    }
    iframe {
      width: 100%;
      height: 400px;
      border: 1px solid #ccc;
      margin-bottom: 1rem;
    }
    .equipment-entry {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .equipment-entry input {
      flex-grow: 1;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 class="mb-4">Permis</h1>

  <div class="mb-3">
    <label for="unitSelect" class="form-label">Numéro d’unité</label>
    <select class="form-select" id="unitSelect">
      <option selected disabled>Choisir une unité</option>
    </select>
  </div>

  <div class="mb-3">
    <label for="permitSelect" class="form-label">Permis</label>
    <select class="form-select" id="permitSelect" disabled>
      <option selected disabled>Choisir un permis</option>
    </select>
  </div>

  <div id="permitViewerContainer" class="d-none">
    <h5>Visionneuse de Permis</h5>
    <iframe id="pdfViewer" src=""></iframe>

    <p><strong>Date de renouvellement:</strong> <span id="renewalDate">—</span></p>

    <div class="mb-3">
      <label for="uploadPermit" class="form-label">Remplacer le permis</label>
      <input type="file" class="form-control" id="uploadPermit" accept="application/pdf">
    </div>
  </div>

  <hr>

  <h5>Équipements</h5>
  <div id="equipmentList">
    <!-- dynamic list -->
  </div>
  <div class="mb-3">
    <button class="btn btn-outline-primary" id="addEquipment">Ajouter équipement</button>
  </div>
</div>

<script>
  const unitSelect = document.getElementById('unitSelect');
  const permitSelect = document.getElementById('permitSelect');
  const pdfViewer = document.getElementById('pdfViewer');
  const renewalDate = document.getElementById('renewalDate');
  const permitViewerContainer = document.getElementById('permitViewerContainer');
  const uploadPermit = document.getElementById('uploadPermit');
  const equipmentList = document.getElementById('equipmentList');
  const addEquipment = document.getElementById('addEquipment');

  const units = Array.from({length: 20}, (_, i) => `Unité ${i + 1}`);
  const permitsPerUnit = 7;
  const baseDriveLink = "https://drive.google.com/file/d/"; // append file ID

  const fakePermits = {};
  for (let i = 1; i <= 20; i++) {
    fakePermits[`Unité ${i}`] = Array.from({length: permitsPerUnit}, (_, j) => ({
      name: `Permis ${j + 1}`,
      pdfId: `EXAMPLE_PDF_ID_${i}_${j}`,
      renewal: `2025-0${(j%12)+1}-01`
    }));
  }

  units.forEach(unit => {
    const opt = document.createElement('option');
    opt.value = unit;
    opt.textContent = unit;
    unitSelect.appendChild(opt);
  });

  unitSelect.addEventListener('change', () => {
    permitSelect.innerHTML = '<option selected disabled>Choisir un permis</option>';
    permitSelect.disabled = false;
    const selected = unitSelect.value;
    fakePermits[selected].forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name;
      permitSelect.appendChild(opt);
    });
  });

  permitSelect.addEventListener('change', () => {
    const unit = unitSelect.value;
    const permit = permitSelect.value;
    const data = fakePermits[unit].find(p => p.name === permit);
    const fullDriveLink = `${baseDriveLink}${data.pdfId}/preview`;

    pdfViewer.src = fullDriveLink;
    renewalDate.textContent = data.renewal;
    permitViewerContainer.classList.remove('d-none');
  });

  uploadPermit.addEventListener('change', () => {
    const file = uploadPermit.files[0];
    if (file && file.type === "application/pdf") {
      alert(`Fichier "${file.name}" prêt pour remplacement du permis.`);
      // Upload logic to backend goes here
    } else {
      alert("Veuillez sélectionner un fichier PDF valide.");
    }
  });

  function createEquipmentInput(value = '') {
    const div = document.createElement('div');
    div.className = 'equipment-entry';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'form-control';
    input.placeholder = 'Nom de l’équipement';
    input.value = value;

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn btn-danger';
    btn.textContent = 'Supprimer';
    btn.onclick = () => equipmentList.removeChild(div);

    div.appendChild(input);
    div.appendChild(btn);
    equipmentList.appendChild(div);
  }

  addEquipment.addEventListener('click', () => createEquipmentInput());
</script>

</body>
</html>
