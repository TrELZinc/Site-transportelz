<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestion des Permis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .icon-btn {
      background: none;
      border: none;
      padding: 5px;
    }
    .mobile-view {
      display: none;
    }
    @media (max-width: 768px) {
      .desktop-view {
        display: none !important;
      }
      .mobile-view {
        display: block !important;
      }
    }
  </style>
</head>
<body>
  <div class="container mt-4">
    <h2 class="mb-4">Gestion des Permis</h2>

    <!-- Mobile view -->
    <div class="mobile-view">
      <div class="mb-3">
        <label for="unitSelect" class="form-label">Sélectionner une unité</label>
        <select id="unitSelect" class="form-select">
          <!-- Options dynamiques -->
        </select>
      </div>

      <div class="mb-3">
        <label for="permitSelect" class="form-label">Sélectionner un permis</label>
        <select id="permitSelect" class="form-select">
          <option value="A">Permis A</option>
          <option value="B">Permis B</option>
          <option value="C">Permis C</option>
        </select>
      </div>

      <div id="mobilePermitAction" class="text-center mt-4">
        <!-- Actions dynamiques -->
      </div>
    </div>

    <!-- Desktop view -->
    <div class="desktop-view">
      <div class="mb-3">
        <button id="addUnitBtn" class="btn btn-primary">Ajouter une unité</button>
        <button id="removeUnitBtn" class="btn btn-danger">Supprimer dernière unité</button>
      </div>

      <div class="table-responsive">
        <table id="permitTable" class="table table-bordered text-center align-middle">
          <thead class="table-light">
            <tr>
              <th>Unité</th>
              <th>Permis A</th>
              <th>Permis B</th>
              <th>Permis C</th>
            </tr>
          </thead>
          <tbody id="permitBody">
            <!-- Rows generated by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const permitBody = document.getElementById('permitBody');
    const unitSelect = document.getElementById('unitSelect');
    const permitSelect = document.getElementById('permitSelect');
    const mobilePermitAction = document.getElementById('mobilePermitAction');

    let unitCount = 10;

    const renderRow = (unitIndex) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>Unité ${unitIndex}</td>
        <td>
          <button class="icon-btn text-primary" title="Upload">&#8679;</button>
          <button class="icon-btn text-success" title="Download">&#8681;</button>
        </td>
        <td>
          <button class="icon-btn text-primary" title="Upload">&#8679;</button>
          <button class="icon-btn text-success" title="Download">&#8681;</button>
        </td>
        <td>
          <button class="icon-btn text-primary" title="Upload">&#8679;</button>
          <button class="icon-btn text-success" title="Download">&#8681;</button>
        </td>
      `;
      permitBody.appendChild(tr);
    };

    const renderMobileView = () => {
      const unit = unitSelect.value;
      const permit = permitSelect.value;
      const permisLabel = {
        A: "Permis A",
        B: "Permis B",
        C: "Permis C"
      };

      mobilePermitAction.innerHTML = `
        <div class="card p-3">
          <h5>${unit} - ${permisLabel[permit]}</h5>
          <div class="mt-3">
            <button class="btn btn-outline-primary me-2">Upload</button>
            <button class="btn btn-outline-success">Download</button>
          </div>
        </div>
      `;
    };

    const initApp = () => {
      for (let i = 1; i <= unitCount; i++) {
        renderRow(i);

        const opt = document.createElement('option');
        opt.value = `Unité ${i}`;
        opt.textContent = `Unité ${i}`;
        unitSelect.appendChild(opt);
      }
      renderMobileView();
    };

    document.getElementById('addUnitBtn').addEventListener('click', () => {
      unitCount++;
      renderRow(unitCount);

      const opt = document.createElement('option');
      opt.value = `Unité ${unitCount}`;
      opt.textContent = `Unité ${unitCount}`;
      unitSelect.appendChild(opt);
    });

    document.getElementById('removeUnitBtn').addEventListener('click', () => {
      if (unitCount > 0) {
        permitBody.removeChild(permitBody.lastChild);
        unitSelect.removeChild(unitSelect.lastChild);
        unitCount--;
      }
    });

    unitSelect.addEventListener('change', renderMobileView);
    permitSelect.addEventListener('change', renderMobileView);

    initApp();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
