<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Permis E.L.Z inc.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    #pdfViewer { width: 100%; border: 1px solid #ccc; border-radius: 5px; }
    canvas { width: 100% !important; height: auto !important; }
  </style>
</head>
<body>
<div class="container py-4">
  <h4 class="text-center mb-4">Visionneuse de Permis</h4>

  <div class="mb-3">
    <label class="form-label">Unité</label>
    <select id="unitSelect" class="form-select"></select>
  </div>

  <div class="mb-3">
    <label class="form-label">Permis</label>
    <select id="permitSelect" class="form-select"></select>
  </div>

  <div class="mb-3">
    <label class="form-label">PDF affiché</label>
    <canvas id="pdfCanvas"></canvas>
  </div>

  <div class="alert alert-warning" id="msg" style="display: none;"></div>
</div>

<script>
const permits = [
  "Permis N.H", "Permis MASS", "Permis Vermont",
  "Permis Overweight QC", "Immatriculation", "Permis F", "Permis G"
];

const units = [
  "Camion 1103", "Camion 1202", "Camion 1303",
  "Remorque 1505", "Remorque 1805"
];

const unitSelect = document.getElementById('unitSelect');
const permitSelect = document.getElementById('permitSelect');
const canvas = document.getElementById('pdfCanvas');
const ctx = canvas.getContext('2d');
const msg = document.getElementById('msg');

let pdfMap = {};

function populateSelectors() {
  units.forEach(u => unitSelect.add(new Option(u, u)));
  permits.forEach(p => permitSelect.add(new Option(p, p)));
}

async function loadPDFMap() {
  try {
    const res = await fetch("https://transportelz.ca/data/pdfMap.json");
    pdfMap = await res.json();
  } catch (err) {
    msg.style.display = 'block';
    msg.textContent = "❌ Erreur lors du chargement du fichier JSON.";
    console.error(err);
  }
}

async function renderPDF(url) {
  try {
    const loadingTask = pdfjsLib.getDocument(url);
    const pdf = await loadingTask.promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 1.5 });
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    await page.render({ canvasContext: ctx, viewport }).promise;
  } catch (err) {
    msg.style.display = 'block';
    msg.textContent = "❌ Impossible d'afficher le PDF.";
    console.error(err);
  }
}

function updateDisplay() {
  const key = `${unitSelect.value} - ${permitSelect.value}`;
  const pdfUrl = pdfMap[key];

  if (!pdfUrl) {
    msg.style.display = 'block';
    msg.textContent = `⚠️ Aucun PDF trouvé pour : ${key}`;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    return;
  }

  msg.style.display = 'none';
  renderPDF(pdfUrl);
}

// Init
populateSelectors();
loadPDFMap().then(() => updateDisplay());

unitSelect.addEventListener('change', updateDisplay);
permitSelect.addEventListener('change', updateDisplay);
</script>
</body>
</html>
