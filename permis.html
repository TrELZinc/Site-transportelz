<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Permis Mobile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .pdf-viewer {
      width: 100%;
      height: 400px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <h4 class="mb-3 text-center">Gestion des Permis</h4>

    <!-- Sélection unité -->
    <div class="mb-3">
      <label class="form-label">Sélectionnez l’unité</label>
      <select id="unitSelect" class="form-select"></select>
    </div>

    <!-- Sélection permis -->
    <div class="mb-3">
      <label class="form-label">Sélectionnez le permis</label>
      <select id="permitSelect" class="form-select">
        <option value="Permis A">Permis A</option>
        <option value="Permis B">Permis B</option>
        <option value="Permis C">Permis C</option>
        <option value="Permis D">Permis D</option>
        <option value="Permis E">Permis E</option>
        <option value="Permis F">Permis F</option>
        <option value="Permis G">Permis G</option>
      </select>
    </div>

    <!-- PDF -->
    <div class="mb-3">
      <label class="form-label">Permis (Visionneuse PDF)</label>
      <iframe id="pdfViewer" class="pdf-viewer" src=""></iframe>
    </div>

    <!-- Date -->
    <div class="mb-3">
      <label class="form-label">Date de renouvellement</label>
      <input id="renewalDate" class="form-control" type="text" readonly value="N/A" />
    </div>

    <!-- Upload -->
    <div class="mb-3">
      <label class="form-label">Uploader un nouveau fichier</label>
      <input type="file" id="fileInput" accept="application/pdf" class="form-control" />
    </div>

    <!-- Boutons gestion équipements -->
    <div class="mb-3 text-center">
      <button class="btn btn-outline-success me-2" id="addUnit">Ajouter une unité</button>
      <button class="btn btn-outline-danger" id="removeUnit">Supprimer une unité</button>
    </div>
  </div>

  <script>
    const unitSelect = document.getElementById('unitSelect');
    const permitSelect = document.getElementById('permitSelect');
    const pdfViewer = document.getElementById('pdfViewer');
    const renewalDate = document.getElementById('renewalDate');
    const fileInput = document.getElementById('fileInput');

    let unitCount = 20;
    const permits = ['Permis A', 'Permis B', 'Permis C', 'Permis D', 'Permis E', 'Permis F', 'Permis G'];

    const data = {};

    // Initialisation des unités
    function initUnits() {
      unitSelect.innerHTML = '';
      for (let i = 1; i <= unitCount; i++) {
        const name = `Unité ${i}`;
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        unitSelect.appendChild(opt);

        if (!data[name]) {
          data[name] = {};
          permits.forEach(p => {
            data[name][p] = {
              pdf: '',
              date: 'N/A'
            };
          });
        }
      }
    }

    // Mise à jour de l'affichage
    function updateDisplay() {
      const unit = unitSelect.value;
      const permit = permitSelect.value;
      const entry = data[unit][permit];
      pdfViewer.src = entry.pdf || '';
      renewalDate.value = entry.date;
    }

    // Gérer l'upload
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        // Remplacer PDF localement (simulation)
        const fakeDriveUrl = `https://drive.google.com/viewerng/viewer?embedded=true&url=fake_url/${file.name}`;
        const unit = unitSelect.value;
        const permit = permitSelect.value;
        data[unit][permit].pdf = fakeDriveUrl;
        data[unit][permit].date = new Date().toISOString().split('T')[0];
        updateDisplay();
        alert('Fichier remplacé localement (à connecter à Google Drive)');
      }
    });

    // Ajout / suppression d’unités
    document.getElementById('addUnit').addEventListener('click', () => {
      unitCount++;
      initUnits();
    });

    document.getElementById('removeUnit').addEventListener('click', () => {
      if (unitCount > 1) {
        const last = `Unité ${unitCount}`;
        delete data[last];
        unitCount--;
        initUnits();
      }
    });

    unitSelect.addEventListener('change', updateDisplay);
    permitSelect.addEventListener('change', updateDisplay);

    initUnits();
    updateDisplay();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
