<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestion des Permis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; }
    iframe { width: 100%; height: 500px; border: none; margin-top: 15px; }
    .equipment-item { margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="container">
  <h3 class="text-center mb-4">Gestion des Permis</h3>

  <!-- Sélection unité -->
  <div class="mb-3">
    <label for="uniteSelect" class="form-label">Choisir l’unité :</label>
    <select class="form-select" id="uniteSelect">
      <option selected disabled>-- Sélectionnez une unité --</option>
    </select>
  </div>

  <!-- Sélection permis -->
  <div class="mb-3">
    <label for="permisSelect" class="form-label">Choisir le permis :</label>
    <select class="form-select" id="permisSelect" disabled>
      <option selected disabled>-- Sélectionnez un permis --</option>
    </select>
  </div>

  <!-- Visionneuse PDF -->
  <div id="pdfViewer" class="d-none">
    <h5>Permis sélectionné :</h5>
    <iframe id="pdfFrame" src=""></iframe>
    <p class="mt-2">Date de renouvellement : <strong id="renewalDate">--</strong></p>

    <!-- Upload de nouveau PDF -->
    <div class="mt-3">
      <label class="form-label">Remplacer ce permis :</label>
      <input type="file" class="form-control" id="fileUpload" accept="application/pdf">
    </div>
  </div>

  <!-- Équipements -->
  <div class="mt-4">
    <h5>Équipements liés</h5>
    <div id="equipmentList" class="mb-2"></div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-primary btn-sm" onclick="addEquipment()">Ajouter un équipement</button>
      <button class="btn btn-outline-danger btn-sm" onclick="removeEquipment()">Supprimer le dernier</button>
    </div>
  </div>
</div>

<script>
  const units = Array.from({ length: 20 }, (_, i) => `Unité ${i + 1}`);
  const permitsPerUnit = 7;

  const uniteSelect = document.getElementById("uniteSelect");
  const permisSelect = document.getElementById("permisSelect");
  const pdfFrame = document.getElementById("pdfFrame");
  const renewalDate = document.getElementById("renewalDate");
  const pdfViewer = document.getElementById("pdfViewer");
  const equipmentList = document.getElementById("equipmentList");

  // Simuler des liens Google Drive
  function getDriveURL(uniteIndex, permisIndex) {
    return `https://drive.google.com/file/d/FAKE_ID_U${uniteIndex}_P${permisIndex}/preview`;
  }

  // Simuler des dates de renouvellement
  function getFakeRenewalDate(uniteIndex, permisIndex) {
    const base = new Date();
    base.setMonth(base.getMonth() + uniteIndex + permisIndex);
    return base.toLocaleDateString("fr-FR");
  }

  // Populate unités
  units.forEach((unit, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = unit;
    uniteSelect.appendChild(opt);
  });

  uniteSelect.addEventListener("change", () => {
    const uniteIndex = parseInt(uniteSelect.value);
    permisSelect.innerHTML = '<option selected disabled>-- Sélectionnez un permis --</option>';
    permisSelect.disabled = false;

    for (let i = 1; i <= permitsPerUnit; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = `Permis ${i}`;
      permisSelect.appendChild(opt);
    }
    pdfViewer.classList.add("d-none");
  });

  permisSelect.addEventListener("change", () => {
    const uniteIndex = parseInt(uniteSelect.value);
    const permisIndex = parseInt(permisSelect.value);

    const pdfUrl = getDriveURL(uniteIndex, permisIndex);
    pdfFrame.src = pdfUrl;
    renewalDate.textContent = getFakeRenewalDate(uniteIndex, permisIndex);
    pdfViewer.classList.remove("d-none");
  });

  function addEquipment() {
    const input = document.createElement("input");
    input.type = "text";
    input.className = "form-control equipment-item";
    input.placeholder = "Nom de l’équipement";
    equipmentList.appendChild(input);
  }

  function removeEquipment() {
    const last = equipmentList.lastElementChild;
    if (last) equipmentList.removeChild(last);
  }

  // Upload local uniquement (pas backend)
  document.getElementById("fileUpload").addEventListener("change", (e) => {
    alert("Fichier sélectionné : " + e.target.files[0].name + "\n(Remplacement simulé côté client)");
  });
</script>

</body>
</html>
