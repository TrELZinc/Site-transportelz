<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestion des Permis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .renewal-date {
      font-weight: bold;
      font-size: 0.9em;
    }
    .soon-expire {
      background-color: #fff3cd !important;
    }
    .expired {
      background-color: #f8d7da !important;
    }
    .table-responsive {
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="container mt-4">
    <h2 class="mb-4">Gestion des Permis par Unité</h2>

    <div class="mb-3">
      <button id="addUnitBtn" class="btn btn-primary">Ajouter une unité</button>
      <button id="removeUnitBtn" class="btn btn-danger">Supprimer dernière unité</button>
    </div>

    <div class="table-responsive">
      <table id="permitTable" class="table table-bordered text-center align-middle">
        <thead class="table-light">
          <tr>
            <th>Unité</th>
            <th>
              Permis A<br>
              <span class="renewal-date">2025-06-01</span>
            </th>
            <th>
              Permis B<br>
              <span class="renewal-date">2025-09-15</span>
            </th>
            <th>
              Permis C<br>
              <span class="renewal-date">2025-11-30</span>
            </th>
          </tr>
        </thead>
        <tbody id="permitBody">
          <!-- Rows generated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const permitBody = document.getElementById('permitBody');
    let unitCount = 10;

    const renderRow = (unitIndex) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>Unité ${unitIndex}</td>
        <td><button class="btn btn-sm btn-outline-primary">Upload</button> <button class="btn btn-sm btn-outline-success">Download</button></td>
        <td><button class="btn btn-sm btn-outline-primary">Upload</button> <button class="btn btn-sm btn-outline-success">Download</button></td>
        <td><button class="btn btn-sm btn-outline-primary">Upload</button> <button class="btn btn-sm btn-outline-success">Download</button></td>
      `;
      permitBody.appendChild(tr);
    };

    const initTable = () => {
      for (let i = 1; i <= unitCount; i++) {
        renderRow(i);
      }
    };

    document.getElementById('addUnitBtn').addEventListener('click', () => {
      unitCount++;
      renderRow(unitCount);
    });

    document.getElementById('removeUnitBtn').addEventListener('click', () => {
      if (unitCount > 0) {
        permitBody.removeChild(permitBody.lastChild);
        unitCount--;
      }
    });

    initTable();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
