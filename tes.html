<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Firebase Firestore</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f4f4f4;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #2ecc71;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #27ae60;
    }
  </style>
</head>
<body>
  <h1>Test d'envoi vers Firebase Firestore</h1>
  <p>Appuie sur le bouton pour envoyer un test</p>
  <button id="testBtn">Tester Firebase</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD4U85mokKXsAP1AdwClWtcbt8udZrwlAw",
      authDomain: "sommaireelz.firebaseapp.com",
      projectId: "sommaireelz",
      storageBucket: "sommaireelz.firebasestorage.app",
      messagingSenderId: "171788284751",
      appId: "1:171788284751:web:694f070d1cafe8b7c04b3a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById("testBtn").addEventListener("click", async () => {
      try {
        await addDoc(collection(db, "test"), {
          message: "Ceci est un test Firebase",
          date: serverTimestamp()
        });
        alert("Envoi réussi ! Vérifie ta collection 'test' dans Firestore.");
      } catch (error) {
        console.error("Erreur lors de l'envoi Firebase :", error);
        alert("Erreur : " + error.message);
      }
    });
  </script>
</body>
</html>
