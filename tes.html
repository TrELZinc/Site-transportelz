<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Test Firebase</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"></script>
</head>
<body>
  <h1>Test d’enregistrement Firebase</h1>
  <button onclick="testSave()">Enregistrer un test</button>

  <script>
    // Configuration de ton projet Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyD4U85mokKXsAP1AdwClWtcbt8udZrwlAw",
      authDomain: "sommaireelz.firebaseapp.com",
      projectId: "sommaireelz",
      storageBucket: "sommaireelz.firebasestorage.app",
      messagingSenderId: "171788284751",
      appId: "1:171788284751:web:694f070d1cafe8b7c04b3a"
    };

    // Initialisation
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Fonction de test
    function testSave() {
      db.collection("disponibilites").add({
        message: "Ceci est un test Firebase",
        timestamp: new Date()
      }).then(() => {
        alert("Test sauvegardé dans Firestore !");
      }).catch((err) => {
        alert("Erreur : " + err.message);
        console.error(err);
      });
    }
  </script>
</body>
</html>
