<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Firebase</title>
</head>
<body>
  <h1>Test d'enregistrement Firebase</h1>
  <button id="testBtn">Enregistrer un test</button>

  <script type="module">
    // Import Firebase en module
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Configuration Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyD4U85mokKXsAP1AdwClWtcbt8udZrwlAw",
      authDomain: "sommaireelz.firebaseapp.com",
      projectId: "sommaireelz",
      storageBucket: "sommaireelz.firebasestorage.app",
      messagingSenderId: "171788284751",
      appId: "1:171788284751:web:694f070d1cafe8b7c04b3a"
    };

    // Initialiser Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Fonction de test
    async function enregistrerTest() {
      try {
        await addDoc(collection(db, "disponibilites"), {
          message: "Test Firebase réussi !",
          date: new Date().toISOString()
        });
        alert("Test enregistré dans Firestore !");
      } catch (e) {
        alert("Erreur lors de l'enregistrement : " + e.message);
        console.error(e);
      }
    }

    // Lier le bouton
    document.getElementById("testBtn").addEventListener("click", enregistrerTest);
  </script>
</body>
</html>
