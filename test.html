<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paye Chauffeur - Semaine</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f8f9fa; }
    .pastille {
      background: white;
      border: 2px solid #dee2e6;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      min-width: 220px;
    }
    .pastille h5 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .pastille .details { font-size: 0.9rem; line-height: 1.3; }
    .grid-week {
      display: flex; flex-wrap: nowrap; gap: 12px;
      overflow-x: auto; margin-bottom: 2rem;
    }
    .summary-box {
      border: 2px solid #ccc;
      border-radius: 8px;
      padding: 1rem;
      background: #e6f4ea;
    }
    .summary-box h5 { font-size: 1.2rem; margin-bottom: 1rem; }
  </style>
</head>
<body class="p-4">

<div class="container">
  <h2 class="mb-4">Semaine de paie - Visualisation</h2>

  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <label class="form-label">Nom du chauffeur</label>
      <select id="chauffeurSelect" class="form-select">
        <option value="">-- Choisir --</option>
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Date d'une journée de la semaine</label>
      <input type="date" id="dateInput" class="form-control" />
    </div>
    <div class="col-md-4 d-flex align-items-end">
      <button class="btn btn-primary w-100" onclick="loadSemaine()">Charger la semaine enregistrée</button>
    </div>
  </div>

  <div class="grid-week" id="pastillesContainer"></div>

  <div class="summary-box">
    <h5>Totaux de la semaine</h5>
    <p><strong>Kilomètres totaux :</strong> <span id="totalKm">0</span> km</p>
    <p><strong>Heures totales :</strong> <span id="totalH">0h00</span></p>
    <p><strong>Total forfaits :</strong> <span id="totalForfait">0.00</span> $</p>
    <p><strong>Total primes douane :</strong> <span id="totalDouane">0.00</span> $</p>
    <p><strong>Total primes :</strong> <span id="totalPrime">0.00</span> $</p>
    <p><strong>Montant total estimé :</strong> <span id="totalMontant" class="text-success fw-bold">0.00 $</span></p>
  </div>

  <div class="mt-4 d-flex gap-3">
    <button class="btn btn-secondary" onclick="changerSemaine()">Changer la semaine</button>
    <button class="btn btn-success" onclick="sauvegarderSemaine()">Enregistrer cette semaine dans Firebase</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    apiKey: "AIzaSyD4U85mokKXsAP1AdwClWtcbt8udZrwlAw",
    authDomain: "sommaireelz.firebaseapp.com",
    projectId: "sommaireelz",
    storageBucket: "sommaireelz.firebasestorage.app",
    messagingSenderId: "171788284751",

  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwyp3xm3MrEuPjvKjn3OQ8C5GyOuOUon7mYLY36J1sMyMglVRFXJnIulSJVQvOikZ90/exec";

let primeDouane = 15;
let primeForfait = 60.85;

function parseLocalDate(str) {
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function getWeekMonday(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  const mondayOffset = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + mondayOffset);
  return d.toISOString().split("T")[0];
}

async function fetchSemaineData(chauffeur, lundi) {
  const url = `${API_URL}?chauffeur=${encodeURIComponent(chauffeur)}&lundi=${lundi}`;
  const res = await fetch(url);
  return await res.json();
}

async function fetchTauxChauffeurs() {
  const res = await fetch(API_URL);
  const json = await res.json();

  primeDouane = parseFloat(json.parametres.prime_douane);
  primeForfait = parseFloat(json.parametres.prime_forfait);

  const map = {};
  json.chauffeurs.forEach(c => {
    map[c.nom] = { taux_km: parseFloat(c.taux_km), taux_h: parseFloat(c.taux_h) };
  });
  return map;
}

function getWeekMonday(dateStr) {
  const [year, month, day] = dateStr.split("-").map(Number);
  const date = new Date(year, month - 1, day);
  const dayOfWeek = date.getDay(); // 0 = dimanche, 1 = lundi, ..., 6 = samedi
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  date.setDate(date.getDate() + mondayOffset);
  return date.toISOString().split("T")[0];
}

async function loadSemaine() {
  const chauffeur = document.getElementById("chauffeurSelect").value;
  const inputDate = document.getElementById("dateInput").value;
  if (!chauffeur || !inputDate) return alert("Sélectionnez un chauffeur et une date.");

  const lundi = getWeekMonday(inputDate);
  console.log("📅 Lundi de la semaine sélectionnée :", lundi); // Debug pour confirmation

  const tauxMap = await fetchTauxChauffeurs(); // charge aussi les primes
  const taux = tauxMap[chauffeur];
  if (!taux) return alert("Taux non trouvés pour ce chauffeur.");

  const semaineData = await fetchSemaineData(chauffeur, lundi);
  const container = document.getElementById("pastillesContainer");
  container.innerHTML = "";

  let totalKm = 0, totalMin = 0, totalForfait = 0, totalDouane = 0, totalPrime = 0;

  // Grouper les voyages par date
  const grouped = {};
  semaineData.forEach(item => {
    if (!grouped[item.date]) grouped[item.date] = [];
    grouped[item.date].push(item);
  });

}


  Object.entries(grouped).forEach(([date, voyages]) => {
    const div = document.createElement("div");
    div.className = "pastille";
    div.innerHTML = `<h5>${parseLocalDate(date).toLocaleDateString("fr-CA", { weekday: 'long', day: 'numeric', month: 'short' })}</h5><div class="details"></div>`;
    
    const details = div.querySelector(".details");

    voyages.forEach(voyage => {
      if (voyage.type === "kilometrage" || voyage.type === "retour") {
        details.innerHTML += `<div><strong>KM:</strong> ${voyage.km} (${voyage.origine} → ${voyage.destination})</div>`;
        totalKm += voyage.km;
      }

      if (voyage.type === "heure") {
        const h = Math.floor(voyage.minutes / 60);
        const m = voyage.minutes % 60;
        details.innerHTML += `<div><strong>Heures:</strong> ${h}h${String(m).padStart(2, '0')} (${voyage.origine} → ${voyage.destination})</div>`;
        totalMin += voyage.minutes;
      }

      // Affichage des primes
      const prime = parseFloat(voyage.prime);
      if (!isNaN(prime) && prime > 0) {
        if (Math.abs(prime - primeForfait) < 0.01) {
          details.innerHTML += `<div class="text-success">+ Forfait: ${prime.toFixed(2)} $</div>`;
          totalForfait += prime;
        } else if (Math.abs(prime - primeDouane) < 0.01) {
          details.innerHTML += `<div class="text-info">+ Prime douane: ${prime.toFixed(2)} $</div>`;
          totalDouane += prime;
        } else {
          details.innerHTML += `<div class="text-secondary">+ Prime: ${prime.toFixed(2)} $</div>`;
        }
        totalPrime += prime;
      }
    });

    container.appendChild(div);
  });

  // Résumé hebdo
  const totalPayable = (totalKm * taux.taux_km) + (totalMin / 60 * taux.taux_h) + totalPrime;

  document.getElementById("totalKm").textContent = totalKm;
  document.getElementById("totalH").textContent = `${Math.floor(totalMin / 60)}h${String(totalMin % 60).padStart(2, '0')}`;
  document.getElementById("totalForfait").textContent = totalForfait.toFixed(2);
  document.getElementById("totalDouane").textContent = totalDouane.toFixed(2);
  document.getElementById("totalPrime").textContent = totalPrime.toFixed(2);
  document.getElementById("totalMontant").textContent = `${totalPayable.toFixed(2)} $`;
}

function changerSemaine() {
  document.getElementById("dateInput").value = "";
  document.getElementById("pastillesContainer").innerHTML = "";
  ["totalKm", "totalH", "totalForfait", "totalDouane", "totalPrime", "totalMontant"].forEach(id => {
    document.getElementById(id).textContent = id === "totalH" ? "0h00" : "0.00";
  });
}

function sauvegarderSemaine() {
  alert("Fonction SAVE désactivée ici.");
}

async function chargerChauffeursDansSelect() {
  const response = await fetch(API_URL);
  const json = await response.json();
  const select = document.getElementById("chauffeurSelect");
  json.chauffeurs.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.nom;
    opt.textContent = c.nom;
    select.appendChild(opt);
  });
}

document.addEventListener("DOMContentLoaded", () => {
  chargerChauffeursDansSelect();
});
</script>
</body>
</html>
