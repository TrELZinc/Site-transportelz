<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Permis & Unités - Docs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-4">

<div class="container">
  <h1 class="mb-4 text-center">Consultation des Documents</h1>

  <div class="row g-3">
    <div class="col-md-6">
      <label for="unitSelect" class="form-label">Unité</label>
      <select id="unitSelect" class="form-select">
        <option selected disabled>Choisir une unité</option>
      </select>
    </div>
    <div class="col-md-6">
      <label for="permitSelect" class="form-label">Type de permis</label>
      <select id="permitSelect" class="form-select">
        <option selected disabled>Choisir un type</option>
      </select>
    </div>
  </div>

  <div class="mt-4">
    <h5 id="docInfo" class="mb-3 d-none">Détails du document</h5>
    <ul class="list-group d-none" id="docDetails">
      <li class="list-group-item"><strong>Unité:</strong> <span id="unitLabel"></span></li>
      <li class="list-group-item"><strong>Permis:</strong> <span id="permitLabel"></span></li>
      <li class="list-group-item"><strong>Expiration:</strong> <span id="expireLabel"></span></li>
    </ul>
    <a id="viewDoc" href="#" target="_blank" class="btn btn-primary mt-3 d-none">Afficher le document</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="data.js"></script>
<script>
  const unitSelect = document.getElementById("unitSelect");
  const permitSelect = document.getElementById("permitSelect");
  const docDetails = document.getElementById("docDetails");
  const docInfo = document.getElementById("docInfo");
  const viewDoc = document.getElementById("viewDoc");
  const unitLabel = document.getElementById("unitLabel");
  const permitLabel = document.getElementById("permitLabel");
  const expireLabel = document.getElementById("expireLabel");

  const units = [...new Set(docs.map(d => d.unit))];
  const permits = [...new Set(docs.map(d => d.permit))];

  units.forEach(unit => {
    unitSelect.innerHTML += `<option value="${unit}">${unit}</option>`;
  });

  permits.forEach(permit => {
    permitSelect.innerHTML += `<option value="${permit}">${permit}</option>`;
  });

  function updateView() {
    const unit = unitSelect.value;
    const permit = permitSelect.value;
    const doc = docs.find(d => d.unit === unit && d.permit === permit);

    if (doc) {
      unitLabel.textContent = unit;
      permitLabel.textContent = permit;
      expireLabel.textContent = doc.expiration;
      viewDoc.href = `https://drive.google.com/file/d/${doc.fileId}/view`;
      docDetails.classList.remove("d-none");
      docInfo.classList.remove("d-none");
      viewDoc.classList.remove("d-none");
    } else {
      docDetails.classList.add("d-none");
      docInfo.classList.add("d-none");
      viewDoc.classList.add("d-none");
    }
  }

  unitSelect.addEventListener("change", updateView);
  permitSelect.addEventListener("change", updateView);
</script>
</body>
</html>
