<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #feca57;
    }
    select, button {
      padding: 10px;
      font-size: 1.2rem;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }
    button {
      background-color: #00c851;
      color: white;
      cursor: pointer;
    }
    .result {
      margin-top: 30px;
      font-size: 1.3rem;
    }
    .highlight {
      font-weight: bold;
      color: #feca57;
    }
  </style>
</head>
<body>
  <h1>Blackjack</h1>
  <p>Entre ta main et celle du croupier</p>

  <label>Ta carte 1 :</label>
  <select id="card1">
    <option value="">--</option>
    <option>2</option><option>3</option><option>4</option><option>5</option>
    <option>6</option><option>7</option><option>8</option><option>9</option>
    <option>10</option><option>As</option>
  </select>

  <label>Ta carte 2 :</label>
  <select id="card2">
    <option value="">--</option>
    <option>2</option><option>3</option><option>4</option><option>5</option>
    <option>6</option><option>7</option><option>8</option><option>9</option>
    <option>10</option><option>As</option>
  </select>

  <br><br>
  <label>Carte du croupier :</label>
  <select id="dealerCard">
    <option value="">--</option>
    <option>2</option><option>3</option><option>4</option><option>5</option>
    <option>6</option><option>7</option><option>8</option><option>9</option>
    <option>10</option><option>As</option>
  </select>

  <br><br>
  <button onclick="analyser()">Analyser</button>
  <button onclick="reset()">Nouvelle main</button>

  <div class="result" id="resultat"></div>

  <script>
    function analyser() {
      const c1 = document.getElementById('card1').value;
      const c2 = document.getElementById('card2').value;
      const dealer = document.getElementById('dealerCard').value;
      const res = document.getElementById('resultat');

      if (!c1 || !c2 || !dealer) {
        res.innerHTML = 'Veuillez sélectionner toutes les cartes.';
        return;
      }

      // Calcul total et structure
      let val1 = c1 === 'As' ? 11 : parseInt(c1);
      let val2 = c2 === 'As' ? 11 : parseInt(c2);
      let total = val1 + val2;
      let soft = (c1 === 'As' || c2 === 'As');
      let pair = (c1 === c2);
      let dealerVal = dealer === 'As' ? 11 : parseInt(dealer);

      let conseil = '';
      let prob = { win: '', tie: '', lose: '' };

      // Probabilités statiques (exemples — à ajuster si tu veux + de précision)
      if (pair && c1 === '8') {
        conseil = 'Séparer';
        prob = { win: '54%', tie: '8%', lose: '38%' };
      } else if (soft && total === 18 && dealerVal >= 9) {
        conseil = 'Tirer';
        prob = { win: '23%', tie: '9%', lose: '68%' };
      } else if (total === 11 && dealerVal < 11) {
        conseil = 'Doubler';
        prob = { win: '63%', tie: '7%', lose: '30%' };
      } else if (total === 16 && dealerVal >= 9) {
        conseil = 'Tirer';
        prob = { win: '23%', tie: '5%', lose: '72%' };
      } else if (total === 12 && dealerVal >= 4 && dealerVal <= 6) {
        conseil = 'Rester';
        prob = { win: '39%', tie: '9%', lose: '52%' };
      } else if (total >= 17) {
        conseil = 'Rester';
        prob = { win: '45%', tie: '8%', lose: '47%' };
      } else {
        conseil = 'Tirer';
        prob = { win: '36%', tie: '7%', lose: '57%' };
      }

      res.innerHTML = `
        <div class="highlight">Décision optimale : ${conseil}</div>
        <br>
        <strong>Probabilités estimées :</strong><br>
        Victoire : ${prob.win} <br>
        Égalité : ${prob.tie} <br>
        Défaite : ${prob.lose}
      `;
    }

    function reset() {
      document.getElementById('card1').value = '';
      document.getElementById('card2').value = '';
      document.getElementById('dealerCard').value = '';
      document.getElementById('resultat').innerHTML = '';
    }
  </script>
</body>
</html>
