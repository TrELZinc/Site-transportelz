<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacances Chauffeurs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background-color: #000;
      color: white;
      text-align: center;
      padding: 1rem;
    }
    header img {
      max-height: 70px;
      margin-bottom: 10px;
    }
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }
    .controls {
      text-align: center;
      margin-bottom: 15px;
    }
    #chauffeur {
      font-size: 1.2rem;
      padding: 12px;
      width: 80%;
      max-width: 400px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .month-display {
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      margin: 20px 0 5px 0;
    }
    .month-nav {
      text-align: center;
      margin-bottom: 20px;
    }
    .month-nav button {
      background-color: transparent;
      color: red;
      font-size: 1rem;
      border: none;
      margin: 0 10px;
      cursor: pointer;
    }
    #calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .day-name {
      text-align: center;
      font-weight: bold;
      background: #ddd;
      padding: 8px;
      border-radius: 4px;
    }
    .day {
      text-align: center;
      background: white;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .day:hover {
      background: #e0e0e0;
    }
    .taken {
      background-color: #ff4d4d !important;
      color: white;
      cursor: not-allowed;
    }
    .selected {
      background-color: #4da6ff !important;
      color: white;
    }
    .today {
      background-color: #4CAF50 !important;
      color: white;
    }
    button#submit {
      display: block;
      margin: 30px auto 10px auto;
      padding: 12px 24px;
      font-size: 1rem;
      background: #000;
      color: white;
      border: none;
      border-radius: 5px;
    }
    #confirmation {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.jpeg" alt="Logo">
    <div>Planification des Vacances</div>
  </header>
  <div class="container">
    <div class="controls">
      <input type="text" id="chauffeur" placeholder="Nom du chauffeur">
    </div>
    <div class="month-display" id="month-year"></div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">← Mois précédent</button>
      <button onclick="changeMonth(1)">Mois suivant →</button>
    </div>
    <div id="calendar"></div>
    <button id="submit" onclick="submitVacation()">Demander cette semaine</button>
    <div id="confirmation"></div>
  </div>
  <script>
    const takenWeeks = ['2025-07-01', '2025-07-08']; // Exemples
    let selectedWeeks = [];
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    const dayNames = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
    const today = new Date();

    function getStartOfWeek(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day;
      return new Date(d.setDate(diff));
    }

    function formatDate(date) {
      return date.toISOString().split('T')[0];
    }

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      } else if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      generateCalendar(currentMonth, currentYear);
    }

    function toggleWeekFromDate(clickedDate) {
      const weekStart = getStartOfWeek(clickedDate);
      const weekKey = formatDate(weekStart);

      if (takenWeeks.includes(weekKey)) return;

      const index = selectedWeeks.indexOf(weekKey);
      if (index > -1) {
        selectedWeeks.splice(index, 1);
      } else {
        selectedWeeks.push(weekKey);
      }

      generateCalendar(currentMonth, currentYear);
    }

    function generateCalendar(month, year) {
      const calendar = document.getElementById('calendar');
      const monthYear = document.getElementById('month-year');
      const firstDay = new Date(year, month, 1);
      const startDay = new Date(firstDay);
      startDay.setDate(1 - firstDay.getDay());

      calendar.innerHTML = '';
      monthYear.textContent = firstDay.toLocaleString('fr-FR', { month: 'long', year: 'numeric' }).toUpperCase();

      for (let i = 0; i < 7; i++) {
        const dayName = document.createElement('div');
        dayName.className = 'day-name';
        dayName.textContent = dayNames[i];
        calendar.appendChild(dayName);
      }

      for (let i = 0; i < 42; i++) {
        const day = new Date(startDay);
        day.setDate(startDay.getDate() + i);
        const dayDiv = document.createElement('div');
        dayDiv.className = 'day';
        dayDiv.textContent = day.getDate();

        const weekStart = getStartOfWeek(day);
        const weekKey = formatDate(weekStart);

        if (day.getMonth() !== month) {
          dayDiv.style.opacity = "0.3";
        }

        if (takenWeeks.includes(weekKey)) {
          dayDiv.classList.add('taken');
        } else if (selectedWeeks.includes(weekKey)) {
          const selectedStart = new Date(weekStart);
          const selectedEnd = new Date(weekStart);
          selectedEnd.setDate(selectedEnd.getDate() + 6);
          if (day >= selectedStart && day <= selectedEnd) {
            dayDiv.classList.add('selected');
          }
          dayDiv.onclick = () => toggleWeekFromDate(day);
        } else {
          dayDiv.onclick = () => toggleWeekFromDate(day);
        }

        if (day.toDateString() === today.toDateString()) {
          dayDiv.classList.add('today');
        }

        calendar.appendChild(dayDiv);
      }
    }

    function submitVacation() {
      const chauffeur = document.getElementById('chauffeur').value.trim();
      const confirmation = document.getElementById('confirmation');

      if (!chauffeur) {
        alert("Veuillez entrer le nom du chauffeur.");
        return;
      }

      if (selectedWeeks.length === 0) {
        alert("Aucune semaine sélectionnée.");
        return;
      }

      confirmation.innerHTML = `
        <p>${chauffeur}, vous avez demandé les semaines suivantes :</p>
        <ul>${selectedWeeks.map(w => `<li>${w}</li>`).join('')}</ul>
      `;
    }

    generateCalendar(currentMonth, currentYear);
  </script>
</body>
</html>
