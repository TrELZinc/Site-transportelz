<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Documents Permis Unités</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet">
  <style>
    body {
      padding: 2rem;
      background-color: #f8f9fa;
    }
    .pdf-section {
      margin-top: 2rem;
    }
    .expiration {
      font-weight: bold;
      color: #dc3545;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2 class="mb-4">Consultation des Permis</h2>

    <div class="row mb-3">
      <div class="col-md-6">
        <label for="uniteSelect" class="form-label">Unité</label>
        <select id="uniteSelect" class="form-select">
          <option selected disabled>Choisir une unité</option>
        </select>
      </div>
      <div class="col-md-6">
        <label for="permisSelect" class="form-label">Permis</label>
        <select id="permisSelect" class="form-select" disabled>
          <option selected disabled>Choisir un permis</option>
        </select>
      </div>
    </div>

    <div class="pdf-section d-none" id="pdfSection">
      <button id="openPdfBtn" class="btn btn-primary mb-2">Ouvrir le document</button>
      <div>Date d’expiration : <span id="expirationDate" class="expiration"></span></div>
    </div>
  </div>

  <script>
    // Simulation de la base de données
    const documents = [
      {
        unite: "Unité A",
        permis: "Permis 1",
        pdf_url: "https://drive.google.com/uc?export=download&id=TON_ID_1",
        expiration: "2025-09-30"
      },
      {
        unite: "Unité A",
        permis: "Permis 2",
        pdf_url: "https://drive.google.com/uc?export=download&id=TON_ID_2",
        expiration: "2025-12-15"
      },
      {
        unite: "Unité B",
        permis: "Permis 1",
        pdf_url: "https://drive.google.com/uc?export=download&id=TON_ID_3",
        expiration: "2026-01-01"
      }
    ];

    const uniteSelect = document.getElementById('uniteSelect');
    const permisSelect = document.getElementById('permisSelect');
    const pdfSection = document.getElementById('pdfSection');
    const openPdfBtn = document.getElementById('openPdfBtn');
    const expirationDate = document.getElementById('expirationDate');

    let selectedDoc = null;

    // Remplir la liste des unités
    const unites = [...new Set(documents.map(doc => doc.unite))];
    unites.forEach(unite => {
      const option = document.createElement('option');
      option.value = unite;
      option.textContent = unite;
      uniteSelect.appendChild(option);
    });

    // Sur changement d'unité
    uniteSelect.addEventListener('change', () => {
      permisSelect.innerHTML = '<option selected disabled>Choisir un permis</option>';
      permisSelect.disabled = false;
      pdfSection.classList.add('d-none');
      const selectedUnite = uniteSelect.value;

      const permisList = documents
        .filter(doc => doc.unite === selectedUnite)
        .map(doc => doc.permis);

      [...new Set(permisList)].forEach(permis => {
        const option = document.createElement('option');
        option.value = permis;
        option.textContent = permis;
        permisSelect.appendChild(option);
      });
    });

    // Sur changement de permis
    permisSelect.addEventListener('change', () => {
      const selectedUnite = uniteSelect.value;
      const selectedPermis = permisSelect.value;

      selectedDoc = documents.find(doc =>
        doc.unite === selectedUnite && doc.permis === selectedPermis
      );

      if (selectedDoc) {
        const dateParts = selectedDoc.expiration.split("-");
        expirationDate.textContent = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
        pdfSection.classList.remove('d-none');
      }
    });

    // Ouvrir le PDF
    openPdfBtn.addEventListener('click', () => {
      if (selectedDoc) {
        window.open(selectedDoc.pdf_url, '_blank');
      }
    });
  </script>

</body>
</html>
