<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paye Chauffeur - Semaine</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: #f8f9fa;
    }
    .pastille {
      background: white;
      border: 2px solid #dee2e6;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      min-width: 220px;
    }
    .pastille h5 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }
    .pastille .details {
      font-size: 0.9rem;
      line-height: 1.3;
    }
    .grid-week {
      display: flex;
      flex-wrap: nowrap;
      gap: 12px;
      overflow-x: auto;
      margin-bottom: 2rem;
    }
    .summary-box {
      border: 2px solid #ccc;
      border-radius: 8px;
      padding: 1rem;
      background: #e6f4ea;
    }
    .summary-box h5 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body class="p-4">

  <div class="container">
    <h2 class="mb-4">Semaine de paie - Visualisation</h2>

    <!-- Sélection -->
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label">Nom du chauffeur</label>
        <select id="chauffeurSelect" class="form-select">
        <option value="">-- Choisir --</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Date d'une journée de la semaine</label>
        <input type="date" id="dateInput" class="form-control" />
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="loadSemaine()">Charger la semaine enregistrée</button>
      </div>
    </div>

    <!-- Pastilles -->
    <div class="grid-week" id="pastillesContainer">
      <!-- pastilles journalières générées ici -->
    </div>

    <!-- Sommaire -->
    <div class="summary-box">
      <h5>Totaux de la semaine</h5>
      <p><strong>Kilomètres totaux :</strong> <span id="totalKm">0</span> km</p>
      <p><strong>Heures totales :</strong> <span id="totalH">0h00</span></p>
      <p><strong>Forfaits / Primes :</strong> <span id="totalPrime">0.00</span> $</p>
    </div>

    <div class="mt-4 d-flex gap-3">
      <button class="btn btn-secondary" onclick="changerSemaine()">Changer la semaine</button>
      <button class="btn btn-success" onclick="sauvegarderSemaine()">Enregistrer cette semaine dans Firebase</button>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- JS logique -->
  <script>

    async function loadSemaine() {
  const chauffeur = document.getElementById("chauffeurSelect").value;
  const inputDate = document.getElementById("dateInput").value;
  if (!chauffeur || !inputDate) return alert("Sélectionnez un chauffeur et une date.");

  const lundi = getWeekMonday(inputDate);
  const tauxMap = await fetchTauxChauffeurs();
  const taux = tauxMap[chauffeur];
  if (!taux) return alert("Taux non trouvés pour ce chauffeur.");

  const semaineData = await fetchSemaineData(chauffeur, lundi);
  const container = document.getElementById("pastillesContainer");
  container.innerHTML = "";

  let totalKm = 0, totalMin = 0, totalPrime = 0;

  const grouped = {};
  semaineData.forEach(item => {
    if (!grouped[item.date]) grouped[item.date] = [];
    grouped[item.date].push(item);
  });

  Object.keys(grouped).forEach(date => {
    const div = document.createElement("div");
    div.className = "pastille";
    div.innerHTML = `<h5>${new Date(date).toLocaleDateString("fr-CA", { weekday: 'long', day: 'numeric', month: 'short' })}</h5><div class="details"></div>`;
    
    const details = div.querySelector(".details");
    grouped[date].forEach(voyage => {
      if (voyage.type === "kilometrage" || voyage.type === "retour") {
        details.innerHTML += `<div><strong>KM:</strong> ${voyage.km} (${voyage.origine} → ${voyage.destination})</div>`;
        totalKm += voyage.km;
        totalPrime += voyage.prime || 0;
      }
      if (voyage.type === "heure") {
        const h = Math.floor(voyage.minutes / 60);
        const m = voyage.minutes % 60;
        details.innerHTML += `<div><strong>Heures:</strong> ${h}h${String(m).padStart(2, '0')} (${voyage.origine} → ${voyage.destination})</div>`;
        totalMin += voyage.minutes;
      }
    });

    container.appendChild(div);
  });

  const totalH = Math.floor(totalMin / 60);
  const totalM = totalMin % 60;
  const totalPayable = (totalKm * taux.taux_km) + (totalMin / 60 * taux.taux_h) + totalPrime;

  document.getElementById("totalKm").textContent = totalKm;
  document.getElementById("totalH").textContent = `${totalH}h${String(totalM).padStart(2, '0')}`;
  document.getElementById("totalPrime").textContent = totalPrime.toFixed(2);

  const summary = document.querySelector(".summary-box");
  const existing = summary.querySelector("p:last-child");
  if (existing) existing.remove();
  const montantEl = document.createElement("p");
  montantEl.innerHTML = `<strong>Montant total estimé :</strong> <span class="text-success fw-bold">${totalPayable.toFixed(2)} $</span>`;
  summary.appendChild(montantEl);
}

  function getWeekMonday(dateStr) {
  const parts = dateStr.split("-");
  const d = new Date(parts[0], parts[1] - 1, parts[2]); // YYYY, MM-1, DD
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1); // lundi
  d.setDate(diff);
  return d.toISOString().split("T")[0];
}


    function changerSemaine() {
      document.getElementById("dateInput").value = "";
      document.getElementById("pastillesContainer").innerHTML = "";
      document.getElementById("totalKm").textContent = "0";
      document.getElementById("totalH").textContent = "0h00";
      document.getElementById("totalPrime").textContent = "0.00";
    }

    function sauvegarderSemaine() {
      alert("Fonction SAVE désactivée ici pour éviter d’écraser les données — à activer quand prêt.");
      // Tu pourras copier la logique de sauvegarde depuis ton autre projet ici
    }
  </script>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbycIpxZ_-ifvc2CAt0CChVQXI-vQuX4MXwPQKJ39_YcA3ycW082jJEw2kMyloRj2F4O/exec";

// Récupère les données de la semaine (pastilles journalières)
async function fetchSemaineData(chauffeur, lundi) {
  const url = `${API_URL}?chauffeur=${encodeURIComponent(chauffeur)}&lundi=${lundi}`;
  const res = await fetch(url);
  return await res.json(); // tableau [{ date, km, minutes, prime, ... }]
}

// Récupère la map des taux par chauffeur
async function fetchTauxChauffeurs() {
  const response = await fetch(API_URL);
  const json = await response.json();

  const tauxMap = {};
  json.chauffeurs.forEach(chauffeur => {
    tauxMap[chauffeur.nom] = {
      taux_km: parseFloat(chauffeur.taux_km),
      taux_h: parseFloat(chauffeur.taux_h)
    };
  });

  return tauxMap;
}
</script>
<script>
async function chargerChauffeursDansSelect() {
  const response = await fetch(API_URL);
  const json = await response.json();

  const select = document.getElementById("chauffeurSelect");
  json.chauffeurs.forEach(chauffeur => {
    const opt = document.createElement("option");
    opt.value = chauffeur.nom;
    opt.textContent = chauffeur.nom;
    select.appendChild(opt);
  });
}

  document.addEventListener("DOMContentLoaded", () => {
  chargerChauffeursDansSelect();
});
  
  console.log(document.getElementById("totalKm")); // doit afficher <span>…</span>

</script>

</body>
</html>
