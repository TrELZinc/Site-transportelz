<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vacances Chauffeurs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    header {
      background: #000;
      color: white;
      text-align: center;
      padding: 1rem;
    }

    .container {
      padding: 20px;
    }

    .controls {
      text-align: center;
      margin-bottom: 15px;
    }

    select, input, button {
      padding: 8px;
      margin: 5px;
      font-size: 1rem;
    }

    #calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .day, .week-label {
      text-align: center;
      padding: 10px;
      background: white;
      border-radius: 5px;
    }

    .taken {
      background-color: #ff4d4d;
      color: white;
    }

    .selected {
      background-color: #4da6ff;
      color: white;
    }

    .week-label {
      grid-column: span 7;
      background: #ddd;
      font-weight: bold;
    }

    .month-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .month-nav button {
      background-color: #000;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
    }

    @media (max-width: 600px) {
      #calendar {
        grid-template-columns: repeat(7, 1fr);
      }
    }
  </style>
</head>
<body>

  <header>Planification des Vacances</header>

  <div class="container">

    <div class="controls">
      <input type="text" id="chauffeur" placeholder="Nom du chauffeur">
    </div>

    <div class="month-nav">
      <button onclick="changeMonth(-1)">← Mois précédent</button>
      <div id="month-year"></div>
      <button onclick="changeMonth(1)">Mois suivant →</button>
    </div>

    <div id="calendar"></div>

    <button onclick="submitVacation()">Demander cette semaine</button>
  </div>

  <script>
    const takenWeeks = ['2025-07-01', '2025-07-08']; // À remplacer par des données de Sheets plus tard
    let selectedWeeks = [];
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    const calendarEl = document.getElementById('calendar');
    const monthYearEl = document.getElementById('month-year');

    function getStartOfWeek(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(d.setDate(diff));
    }

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      } else if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      generateCalendar(currentMonth, currentYear);
    }

    function generateCalendar(month, year) {
      calendarEl.innerHTML = '';
      const monthNames = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
      monthYearEl.textContent = `${monthNames[month]} ${year}`;

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      let currentWeekStart = getStartOfWeek(firstDay);

      while (currentWeekStart <= lastDay) {
        const weekLabel = document.createElement('div');
        const weekKey = currentWeekStart.toISOString().slice(0, 10);
        weekLabel.className = 'week-label';
        weekLabel.textContent = `Semaine du ${currentWeekStart.toLocaleDateString('fr-CA')}`;
        if (selectedWeeks.includes(weekKey)) weekLabel.classList.add('selected');
        calendarEl.appendChild(weekLabel);

        for (let i = 0; i < 7; i++) {
          const day = new Date(currentWeekStart);
          day.setDate(currentWeekStart.getDate() + i);

          const dayDiv = document.createElement('div');
          dayDiv.className = 'day';
          dayDiv.textContent = day.getDate();

          if (takenWeeks.includes(weekKey)) {
            dayDiv.classList.add('taken');
          } else {
            dayDiv.onclick = () => toggleWeek(weekKey);
            if (selectedWeeks.includes(weekKey)) {
              dayDiv.classList.add('selected');
            }
          }

          calendarEl.appendChild(dayDiv);
        }

        currentWeekStart.setDate(currentWeekStart.getDate() + 7);
      }
    }

    function toggleWeek(weekKey) {
      if (takenWeeks.includes(weekKey)) return;

      const index = selectedWeeks.indexOf(weekKey);
      if (index > -1) {
        selectedWeeks.splice(index, 1);
      } else {
        selectedWeeks.push(weekKey);
      }

      generateCalendar(currentMonth, currentYear);
    }

    function submitVacation() {
      const chauffeur = document.getElementById('chauffeur').value.trim();
      if (!chauffeur) {
        alert("Veuillez entrer le nom du chauffeur.");
        return;
      }

      if (selectedWeeks.length === 0) {
        alert("Aucune semaine sélectionnée.");
        return;
      }

      // Envoi futur vers Apps Script :
      // fetch(URL, { method: 'POST', body: JSON.stringify({ chauffeur, semaines: selectedWeeks }) });

      alert(`Demande envoyée pour ${chauffeur} :\n${selectedWeeks.join(', ')}`);
    }

    generateCalendar(currentMonth, currentYear);
  </script>

</body>
</html>
