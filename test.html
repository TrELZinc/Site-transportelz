<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Portail Permis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <div class="container">
    <h2 class="mb-4">Consultation des Permis</h2>

    <div class="mb-3">
      <label for="unitSelect" class="form-label">Unité</label>
      <select id="unitSelect" class="form-select"></select>
    </div>

    <div class="mb-3">
      <label for="permitSelect" class="form-label">Type de permis</label>
      <select id="permitSelect" class="form-select"></select>
    </div>

    <div id="expirationInfo" class="mb-3 text-muted"></div>

    <div id="pdfContainer" class="border p-2" style="height: 600px;">
      <p>Sélectionnez une unité et un permis pour afficher le document.</p>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
