  <style>

    .pastille {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: white;
      border: 2px solid #dee2e6;
      border-radius: 12px;

      margin-bottom: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      min-width: 220px;
      height: 100%;
    }
      .pastille .details div {
        margin-bottom: 4px;
      }

  border-top: 1px solid #dee2e6;

}

.badge {
  display: inline-block;

  font-size: 0.75rem;

  display: inline-block;

.editable:focus {
  background: #fff8e1;
  outline: none;

    .badge-prime { font-size: 0.75rem; margin-left: 0.4rem; }

</head>
<body class="p-4">
<div class="container">
  <h2 class="mb-4">Vue hebdomadaire - Paie Chauffeurs</h2>

  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <label class="form-label">Nom du chauffeur</label>
      <select id="chauffeurSelect" class="form-select">
        <option value="">-- Choisir --</option>
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Date de la semaine</label>
      <input type="date" id="dateInput" class="form-control" />
    </div>
    <div class="col-md-4 d-flex align-items-end">
      <button class="btn btn-primary w-100" onclick="loadSemaine()">Charger la semaine</button>
    </div>
  </div>

  <div class="grid-week" id="pastillesContainer"></div>

  <div class="summary-box">
    <h5>Récapitulatif de la semaine</h5>
    <p><strong>Kilomètres :</strong> <span id="totalKm">0</span> km</p>
    <p><strong>Heures :</strong> <span id="totalH">0h00</span></p>
    <p><strong>Total forfaits :</strong> <span id="totalForfait">0.00</span> $</p>
    <p><strong>Total primes douane :</strong> <span id="totalDouane">0.00</span> $</p>
    <p><strong>Total primes :</strong> <span id="totalPrime">0.00</span> $</p>
    <p><strong>Montant estimé :</strong> <span id="totalMontant" class="text-success fw-bold">0.00 $</span></p>
  </div>

  <div class="mt-4 text-end">
    <button class="btn btn-success" onclick="sauvegarderSemaine()">Sauvegarder dans Firebase</button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzH1D5uFJTvh23ZhrIrw9qVqP6oy5Xgir9E-eyvLyuB09iOtqKt7c3Z1RrMFlgluvcM/exec";

let primeDouane = 0;
let primeForfait = 0;
let primeStanstedBonus = 0;

function parseLocalDate(str) {
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d); // SANS UTC – utiliser fuseau local
}

function getWeekMonday(dateStr) {
  const [year, month, day] = dateStr.split("-").map(Number);
  const date = new Date(year, month - 1, day); // ← Ceci respecte le fuseau local
  const dayOfWeek = date.getDay(); // 0=dimanche, 1=lundi, ..., 6=samedi
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  date.setDate(date.getDate() + mondayOffset);
  return date.toISOString().split("T")[0];
}


async function fetchSemaineData(chauffeur, lundi) {
  const url = `${API_URL}?chauffeur=${encodeURIComponent(chauffeur)}&lundi=${lundi}`;
  const res = await fetch(url);
  return await res.json();
}

async function fetchTauxChauffeurs() {
  const res = await fetch(API_URL);
  const json = await res.json();
  primeDouane = parseFloat(json.parametres.prime_douane);
  primeForfait = parseFloat(json.parametres.prime_forfait);

  const map = {};
  json.chauffeurs.forEach(c => {
    map[c.nom] = { taux_km: parseFloat(c.taux_km), taux_h: parseFloat(c.taux_h) };
  });
  return map;
}

async function loadSemaine() {
  const chauffeur = document.getElementById("chauffeurSelect").value;
  const inputDate = document.getElementById("dateInput").value;
  if (!chauffeur || !inputDate) return alert("Sélectionnez un chauffeur et une date.");

  const lundi = getWeekMonday(inputDate);
  const tauxMap = await fetchTauxChauffeurs();
  const taux = tauxMap[chauffeur];
  if (!taux) return alert("Taux non trouvés pour ce chauffeur.");

  const semaineData = await fetchSemaineData(chauffeur, lundi);
  console.log("📤 Requête envoyée à l'API avec :", chauffeur, lundi);
  console.log("📦 Données reçues du serveur :", semaineData);
  const container = document.getElementById("pastillesContainer");
  container.innerHTML = "";

  let totalKm = 0, totalMin = 0, totalForfait = 0, totalDouane = 0, totalPrime = 0;
  const grouped = {};
  semaineData.forEach(item => {
    if (!grouped[item.date]) grouped[item.date] = [];
    grouped[item.date].push(item);
  });

  Object.entries(grouped)
  .sort(([dateA], [dateB]) => new Date(dateA) - new Date(dateB))
  .forEach(([date, voyages]) => {
  
  console.log("📆 JOUR :", date, voyages);

  const div = document.createElement("div");
  div.className = "pastille";

  const parts = date.split("-");
  const jsDate = new Date(parts[0], parts[1] - 1, parts[2]);
  const dateAffich = jsDate.toLocaleDateString("fr-CA", { weekday: 'long', day: 'numeric', month: 'short' });
  div.innerHTML = `<h5>${dateAffich}</h5><div class="details"></div>`;

  const details = div.querySelector(".details");
     if (voyages.length === 0) {
      details.innerHTML = `<span class="badge bg-warning text-dark">Aucune donnée ce jour-là</span>`;
    }
  let jourKm = 0, jourMin = 0, jourForfait = 0, jourDouane = 0, jourPrime = 0;

voyages.forEach((voyage, idx) => {
  if (voyage.origine && voyage.origine.toLowerCase().includes("stanstead")) {
  nbVoyagesStansted++;
  }
  details.innerHTML += `<div class="fw-bold mb-1">Voyage ${idx + 1} :</div>`;
  details.innerHTML += `<div class="mb-1">(${voyage.origine} → ${voyage.destination})</div>`;

  if (voyage.type === "kilometrage" || voyage.type === "retour") {
    details.innerHTML += `
      <div><strong>KM:</strong> <span class="editable" contenteditable="true" data-type="km" data-idx="${idx}">${voyage.km}</span> km</div>
    `;
  }

  if (voyage.type === "heure") {
    const h = Math.floor(voyage.minutes / 60);
    const m = voyage.minutes % 60;
    details.innerHTML += `
    <div><strong>Heures:</strong> 
    <span class="editable" contenteditable="true" data-type="heure-h" data-idx="${idx}">${h}</span> h 
    <span class="editable" contenteditable="true" data-type="heure-m" data-idx="${idx}">${m}</span> m
</div>
    `;
  }

  const forfait = voyage.prime_forfait || 0;
  const douane = voyage.prime_douane || 0;
  jourForfait += forfait;
  jourDouane  += douane;

  details.innerHTML += `
  <div><strong>Forfait:</strong> <span class="editable" contenteditable="true" data-type="forfait" data-idx="${idx}">${forfait.toFixed(2)}</span> $</div>
  <div><strong>Douane:</strong> <span class="editable" contenteditable="true" data-type="douane" data-idx="${idx}">${douane.toFixed(2)}</span> $</div>
  `;

  if (idx < voyages.length - 1) {
    details.innerHTML += `<hr class="my-2">`;
  }
});

// Primes regroupées à la fin
details.innerHTML += `<hr class="my-2">`;
details.innerHTML += `<div><strong>Forfait:</strong> ${jourForfait.toFixed(2)} $</div>`;
details.innerHTML += `<div><strong>Douane:</strong> ${jourDouane.toFixed(2)} $</div>`;


  const montantJour = (jourKm * taux.taux_km) + (jourMin / 60 * taux.taux_h) + jourPrime;
totalKm += jourKm;
totalMin += jourMin;
totalForfait += jourForfait;
totalDouane += jourDouane;
totalPrime += jourPrime;

  // Footer journalier
  const footer = document.createElement("div");
  footer.className = "mt-2 fw-bold text-end text-success";
  footer.textContent = `Total jour : ${montantJour.toFixed(2)} $`;

  div.appendChild(footer);
  container.appendChild(div);
    });
  

// Ici, après la boucle :
const totalMontant = (totalKm * taux.taux_km) + (totalMin / 60 * taux.taux_h) + totalPrime;
let primeStanstedBonus = 0;
if (nbVoyagesStansted >= 5) {
  primeStanstedBonus = 300;
  totalPrime += primeStanstedBonus;
}

document.getElementById("totalKm").textContent = totalKm;
document.getElementById("totalH").textContent = `${Math.floor(totalMin / 60)}h${String(totalMin % 60).padStart(2,'0')}`;
document.getElementById("totalForfait").textContent = totalForfait.toFixed(2);
document.getElementById("totalDouane").textContent = totalDouane.toFixed(2);
document.getElementById("totalPrime").textContent = totalPrime.toFixed(2);
document.getElementById("totalMontant").textContent = `${totalMontant.toFixed(2)} $`;

// ✅ Après avoir injecté tout le HTML (à la fin de loadSemaine)
setTimeout(() => {
  document.querySelectorAll(".editable").forEach(el => {
    el.addEventListener("input", () => {
      el.textContent = el.textContent.replace(/[^0-9.,]/g, '');
      recalculerTotaux(taux);
    });
  });

  // ✅ Lance le premier calcul après ajout de tous les éléments
  recalculerTotaux(taux);
}, 0);
  }
  
  
function recalculerTotaux(taux) {
  if (!taux || typeof taux.taux_km !== "number" || typeof taux.taux_h !== "number") {
    console.warn("❌ Paramètres de taux invalides :", taux);
    return;
  }

  let totalKm = 0, totalMin = 0, totalForfait = 0, totalDouane = 0, totalPrime = 0;
  let nbVoyagesStansted = 0;

  document.querySelectorAll(".pastille").forEach(pastille => {
    let jourKm = 0, jourMin = 0, jourForfait = 0, jourDouane = 0;
    const voyages = {};

    const inputs = pastille.querySelectorAll(".editable");
    inputs.forEach(input => {
      const idx = input.dataset.idx;
      const type = input.dataset.type;
      if (!idx || !type) return;

      if (!voyages[idx]) voyages[idx] = {};
      voyages[idx][type] = parseFloat(input.textContent) || 0;
    });

    Object.entries(voyages).forEach(([_, v]) => {
      jourKm += v.km || 0;
      jourMin += ((v["heure-h"] || 0) * 60) + (v["heure-m"] || 0);
      jourForfait += v.forfait || 0;
      jourDouane += v.douane || 0;
    });

    // Compter les voyages Stanstead visibles dans le texte
    const texte = pastille.textContent.toLowerCase();
    nbVoyagesStansted += (texte.match(/stanstead/g) || []).length;

    const jourPrime = jourForfait + jourDouane;
    const montantJour = (jourKm * taux.taux_km) + (jourMin / 60 * taux.taux_h) + jourPrime;

    const totalElem = pastille.querySelector(".text-end.text-success");
    if (totalElem) totalElem.textContent = `Total jour : ${montantJour.toFixed(2)} $`;

    totalKm += jourKm;
    totalMin += jourMin;
    totalForfait += jourForfait;
    totalDouane += jourDouane;
    totalPrime += jourPrime;
  });

  // Bonus Stanstead 5 voyages et plus
  primeStanstedBonus = nbVoyagesStansted >= 5 ? 300 : 0;
  totalPrime += primeStanstedBonus;

  const totalMontant = (totalKm * taux.taux_km) + (totalMin / 60 * taux.taux_h) + totalPrime;

  document.getElementById("totalKm").textContent = totalKm;
  document.getElementById("totalH").textContent = `${Math.floor(totalMin / 60)}h${String(totalMin % 60).padStart(2, '0')}`;
  document.getElementById("totalForfait").textContent = totalForfait.toFixed(2);
  document.getElementById("totalDouane").textContent = totalDouane.toFixed(2);
  document.getElementById("totalPrime").textContent = totalPrime.toFixed(2);
  document.getElementById("totalMontant").textContent = `${totalMontant.toFixed(2)} $`;

  // Afficher bonus dans le résumé si applicable
  const summaryBox = document.querySelector(".summary-box");
  const existingBonus = summaryBox.querySelector(".prime-stanstead");
  if (existingBonus) existingBonus.remove();
  if (primeStanstedBonus > 0) {
    const bonusEl = document.createElement("p");
    bonusEl.classList.add("prime-stanstead");
    bonusEl.innerHTML = `<strong>Prime Stanstead (5 voyages +):</strong> <span class="text-success">${primeStanstedBonus.toFixed(2)} $</span>`;
    summaryBox.appendChild(bonusEl);
  }
}

function sauvegarderSemaine() {
  alert("Fonction de sauvegarde activée (Firebase). Implémentation personnalisable.");
}

async function chargerChauffeursDansSelect() {
  try {
    const response = await fetch(API_URL);
    const json = await response.json();

    if (!json.chauffeurs || !Array.isArray(json.chauffeurs)) {
      throw new Error("Le champ 'chauffeurs' est manquant ou invalide.");
    }

    const select = document.getElementById("chauffeurSelect");
    json.chauffeurs.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.nom;
      opt.textContent = c.nom;
      select.appendChild(opt);
    });

  } catch (error) {
    console.error("❌ Erreur de chargement des chauffeurs:", error.message);
    alert("Impossible de charger les chauffeurs depuis Google Sheets.");
  }
}


document.addEventListener("DOMContentLoaded", () => {
  chargerChauffeursDansSelect();
});
</script>

</body>
