<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacances Chauffeurs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background-color: #000;
      color: white;
      text-align: center;
      padding: 1rem;
    }

    header img {
      max-height: 70px;
      margin-bottom: 10px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .remarks {
      text-align: center;
      font-size: 1.2rem;
      color: red;
      font-weight: bold;
      margin: 20px 0;
    }

    .controls {
      text-align: center;
      margin-bottom: 10px;
    }

    select#chauffeur, input#motdepasse {
      font-size: 1.2rem;
      padding: 12px;
      width: 80%;
      max-width: 400px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-top: 10px;
    }

    .turn-box {
      border-radius: 8px;
      padding: 15px;
      margin: 15px auto;
      max-width: 600px;
      font-size: 1.2rem;
      text-align: center;
    }

    .turn-box.success {
      background-color: #d4edda;
      color: #155724;
      border: 2px solid #c3e6cb;
    }

    .turn-box.waiting {
      background-color: #f8d7da;
      color: #721c24;
      border: 2px solid #f5c6cb;
    }

    .month-display {
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      margin: 20px 0 5px 0;
    }

    .month-nav {
      text-align: center;
      margin-bottom: 20px;
    }

    .month-nav button {
      background-color: transparent;
      color: red;
      font-size: 1rem;
      border: none;
      margin: 0 10px;
      cursor: pointer;
    }

    #calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-name {
      text-align: center;
      font-weight: bold;
      background: #ddd;
      padding: 8px;
      border-radius: 4px;
    }

    .day {
      text-align: center;
      background: white;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .day:hover {
      background: #e0e0e0;
    }

    .taken {
      background-color: #ff4d4d !important;
      color: white;
      cursor: not-allowed;
    }

    .selected {
      background-color: #4da6ff !important;
      color: white;
    }

    .disabled {
      pointer-events: none;
      opacity: 0.4;
    }

    button#submit {
      display: block;
      margin: 30px auto 10px auto;
      padding: 12px 24px;
      font-size: 1rem;
      background: #000;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <header>
    <img src="assets/logo.jpeg" alt="Logo">
    <div>Planification des Vacances</div>
  </header>

  <div class="container">
    <div class="remarks">
      <p>MAXIMUM 2 SEMAINES CONSÉCUTIVES</p>
      <p>MAXIMUM 1 PERSONNE À LA FOIS</p>
    </div>

    <div class="controls">
      <select id="chauffeur" onchange="afficherInfosChauffeur()">
        <option value="">-- Sélectionnez votre nom --</option>
        <option value="Kevin Roy">Kevin Roy</option>
        <option value="Luc Tremblay">Luc Tremblay</option>
        <option value="Marie Duval">Marie Duval</option>
      </select>
      <div id="passwordBox" style="display:none;">
        <input type="password" id="motdepasse" placeholder="Mot de passe">
      </div>
    </div>

    <div id="rangMessage"></div>

    <div class="month-display" id="month-year"></div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">← Mois précédent</button>
      <button onclick="changeMonth(1)">Mois suivant →</button>
    </div>

    <div id="calendar" class="disabled"></div>

    <button id="submit" onclick="submitVacation()" disabled>Demander cette semaine</button>
  </div>

  <script>
    const takenWeeks = ['2025-07-01', '2025-07-08'];
    let selectedWeeks = [];
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let autorise = false;
    const dayNames = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];

    const classement = {
      "Luc Tremblay": { rang: 1 },
      "Marie Duval": { rang: 2 },
      "Kevin Roy": { rang: 3 }
    };

    function afficherInfosChauffeur() {
      const nom = document.getElementById("chauffeur").value;
      const div = document.getElementById("rangMessage");
      const calendrier = document.getElementById("calendar");
      const bouton = document.getElementById("submit");
      const passwordBox = document.getElementById("passwordBox");

      if (classement[nom]) {
        passwordBox.style.display = "block";
        const rang = classement[nom].rang;
        if (rang === 1) {
          autorise = true;
          calendrier.classList.remove("disabled");
          bouton.disabled = false;
          div.innerHTML = `<div class="turn-box success">C’est ton tour de choisir tes vacances !<br>Merci de faire ton choix dès maintenant.</div>`;
        } else {
          autorise = false;
          calendrier.classList.add("disabled");
          bouton.disabled = true;
          div.innerHTML = `<div class="turn-box waiting">Tu es actuellement <strong>#${rang}</strong> dans la liste. Merci de patienter.</div>`;
        }
      } else {
        passwordBox.style.display = "none";
        div.innerHTML = "";
        calendrier.classList.add("disabled");
        bouton.disabled = true;
      }

      selectedWeeks = [];
      generateCalendar(currentMonth, currentYear);
    }

    function getStartOfWeek(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day;
      return new Date(d.setDate(diff));
    }

    function formatDate(date) {
      return date.toISOString().split('T')[0];
    }

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      } else if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      generateCalendar(currentMonth, currentYear);
    }

    function toggleWeekFromDate(clickedDate) {
      const weekStart = getStartOfWeek(clickedDate);
      const weekKey = formatDate(weekStart);
      if (takenWeeks.includes(weekKey)) {
        alert("Cette semaine est déjà prise.");
        return;
      }
      if (selectedWeeks.length >= 2 && !selectedWeeks.includes(weekKey)) {
        alert("Vous ne pouvez sélectionner que deux semaines maximum.");
        return;
      }
      const index = selectedWeeks.indexOf(weekKey);
      if (index > -1) {
        selectedWeeks.splice(index, 1);
      } else {
        selectedWeeks.push(weekKey);
      }
      generateCalendar(currentMonth, currentYear);
    }

    function generateCalendar(month, year) {
      const calendar = document.getElementById('calendar');
      const monthYear = document.getElementById('month-year');
      const firstDay = new Date(year, month, 1);
      const startDay = new Date(firstDay);
      startDay.setDate(1 - firstDay.getDay());

      calendar.innerHTML = '';
      monthYear.textContent = firstDay.toLocaleString('fr-FR', { month: 'long', year: 'numeric' }).toUpperCase();

      for (let i = 0; i < 7; i++) {
        const dayName = document.createElement('div');
        dayName.className = 'day-name';
        dayName.textContent = dayNames[i];
        calendar.appendChild(dayName);
      }

      for (let i = 0; i < 42; i++) {
        const day = new Date(startDay);
        day.setDate(startDay.getDate() + i);
        const dayDiv = document.createElement('div');
        dayDiv.className = 'day';
        dayDiv.textContent = day.getDate();

        const weekStart = getStartOfWeek(day);
        const weekKey = formatDate(weekStart);

        if (day.getMonth() !== month) {
          dayDiv.style.opacity = "0.3";
        }

        if (takenWeeks.includes(weekKey)) {
          dayDiv.classList.add('taken');
        } else if (selectedWeeks.includes(weekKey)) {
          const selectedStart = new Date(weekStart);
          const selectedEnd = new Date(weekStart);
          selectedEnd.setDate(selectedEnd.getDate() + 6);
          if (day >= selectedStart && day <= selectedEnd) {
            dayDiv.classList.add('selected');
            dayDiv.style.opacity = "1";
          }
          if (autorise) dayDiv.onclick = () => toggleWeekFromDate(day);
        } else {
          if (autorise) dayDiv.onclick = () => toggleWeekFromDate(day);
        }

        calendar.appendChild(dayDiv);
      }
    }

    function submitVacation() {
      const chauffeur = document.getElementById('chauffeur').value;
      const motdepasse = document.getElementById('motdepasse').value.trim();

      if (!chauffeur || !motdepasse) {
        alert("Veuillez sélectionner votre nom et entrer votre mot de passe.");
        return;
      }

      if (selectedWeeks.length === 0) {
        alert("Aucune semaine sélectionnée.");
        return;
      }

      // Affichage temporaire pour test. On vérifiera plus tard côté serveur.
      const confirmation = `
        Chauffeur : ${chauffeur}
        Mot de passe : ${motdepasse}
        Semaines choisies :
        ${selectedWeeks.join('\n')}
      `;

      alert(confirmation);
    }

    generateCalendar(currentMonth, currentYear);
  </script>
</body>
</html>
