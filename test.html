<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disponibilités</title>
  <style>
    html, body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f4f4;
      font-size: 16px;
    }
    header {
      background-color: #111;
      padding: 10px 20px;
      width: 100vw;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header img {
      height: 40px;
    }
    .menu-toggle {
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }
    .menu-toggle span {
      height: 3px;
      width: 25px;
      background: white;
      margin: 4px 0;
    }
    .menu {
      display: none;
      position: absolute;
      top: 60px;
      right: 20px;
      background-color: #111;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px;
      z-index: 999;
    }
    .menu.show {
      display: block;
    }
    .menu a {
      display: block;
      color: white;
      padding: 8px 12px;
      text-decoration: none;
    }
    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: vertical;
      box-sizing: border-box;
      font-size: 15px;
    }
    .table-wrapper {
      overflow-x: auto;
      margin-top: 20px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    table {
      min-width: 700px;
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
      height: 36px;
    }
    th {
      background-color: #d32f2f;
      color: white;
    }
    td[contenteditable] {
      outline: none;
      text-transform: uppercase;
    }
    .us-cell {
      cursor: pointer;
    }
    .buttons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .buttons button {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .reset-btn { background-color: #e74c3c; }
    .save-btn { background-color: #2ecc71; }
    .send-btn { background-color: black; }
  </style>
</head>
<body>
  <header>
    <img src="assets/logo.jpeg" alt="Logo Transport ELZ">
    <div class="menu-toggle" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
    <div class="menu" id="menuDropdown">
      <a href="test.html">Sommaire</a>
      <a href="linktree.html">Menu</a>
    </div>
  </header>

  <div class="container">
    <label for="workDate">Date de disponibilité :</label>
<input type="date" id="workDate" style="margin-bottom: 10px;" />
    <label for="note">Note:</label>
    <textarea id="note" rows="2"></textarea>

    <div class="table-wrapper">
      <table id="dispoTable">
        <thead>
          <tr>
            <th>CHAUFFEUR</th><th>US</th><th>CAMION</th><th>REMORQUE</th><th>DÉPART</th><th>NOTE</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="buttons">
      <button class="reset-btn" onclick="resetForm()">Reset</button>
      <button class="save-btn" onclick="saveToSheet()">Save</button>
      <button class="send-btn" onclick="sendForm()">Send</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby679oo4AlmmlqsvYefuklKLUsoyhgABxe5H5khHmp-Ej9ApmEkhn3u-z6lfOTbPVb0/exec";

    function toggleMenu() {
      document.getElementById("menuDropdown").classList.toggle("show");
    }

    document.addEventListener("click", function (e) {
      const menu = document.getElementById("menuDropdown");
      const toggle = document.querySelector(".menu-toggle");
      if (!toggle.contains(e.target) && !menu.contains(e.target)) menu.classList.remove("show");
    });

    function createRow(data = ["", "❌", "", "", "", ""]) {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td contenteditable>${data[0]}</td>
        <td class="us-cell" onclick="toggleUS(this)">${data[1] === "✔️" ? "✔️" : "❌"}</td>
        <td contenteditable>${data[2]}</td>
        <td contenteditable>${data[3]}</td>
        <td contenteditable>${data[4]}</td>
        <td contenteditable>${data[5]}</td>`;
      return row;
    }

    function generateDefaultRows(n = 9) {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";
      for (let i = 0; i < n; i++) tbody.appendChild(createRow());
    }

    function toggleUS(cell) {
      cell.innerHTML = cell.innerHTML.includes("✔️") ? "❌" : "✔️";
    }

    function resetForm() {
      document.getElementById("note").value = "";
      generateDefaultRows(9);
    }

    function saveToSheet() {
  const rows = [];
  const trs = document.querySelectorAll("#tableBody tr");

  trs.forEach(tr => {
    const cells = tr.querySelectorAll("td");
    const row = Array.from(cells).map((cell, i) =>
      i === 1 ? (cell.textContent.includes("✔️") ? "✔️" : "❌") : cell.innerText.trim().toUpperCase()
    );
    rows.push(row);
  });

  const data = {
    rows,
    note: document.getElementById("note").value,
    date: document.getElementById("workDate").value, // 🔸 ajout ici
    mode: "save"
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  }).then(() => alert("Données enregistrées !"));
}

    function sendForm() {
      const tableClone = document.getElementById("dispoTable").cloneNode(true);
      const rows = tableClone.querySelectorAll("tbody tr");

      rows.forEach(row => {
        const cells = row.querySelectorAll("td");
        cells.forEach((cell, i) => {
          if (i === 1) {
            const content = cell.textContent.trim();
            cell.innerHTML = content.includes("✔️") ? "✔️" : "❌";
          } else {
            cell.innerText = cell.innerText.trim().toUpperCase();
          }
        });
      });

      fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          note: document.getElementById("note").value,
          table: tableClone.outerHTML,
          mode: "send"
        })
      });

      alert("Disponibilités envoyées !");
    }

    function loadFromSheet() {
  fetch(SCRIPT_URL)
    .then(res => res.json())
    .then(data => {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      if (!data || !data.rows || data.rows.length === 0) {
        document.getElementById("note").value = "";
        document.getElementById("workDate").value = "";
        generateDefaultRows(9);
        return;
      }

      document.getElementById("note").value = data.note || "";
      document.getElementById("workDate").value = data.date || "";

      data.rows.forEach(row => {
        tbody.appendChild(createRow(row));
      });
    })
    .catch(() => {
      document.getElementById("workDate").value = "";
      generateDefaultRows(9);
    });
}


    window.onload = loadFromSheet;
  </script>
</body>
</html>
