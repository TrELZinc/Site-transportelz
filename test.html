<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    select, button {
      font-size: 1.2rem;
      padding: 10px;
      margin: 10px 5px;
      border: none;
      border-radius: 5px;
    }
    select {
      background-color: #333;
      color: #fff;
    }
    button {
      background-color: #00c851;
      color: white;
      cursor: pointer;
    }
    .result {
      font-size: 1.5rem;
      margin-top: 30px;
      color: #feca57;
    }
  </style>
</head>
<body>
  <h1>Blackjack</h1>

  <div>
    <label for="playerHand">Ta main :</label><br>
    <select id="playerHand">
      <option value="">-- Choisir --</option>
      <option value="5,5">5 et 5</option>
      <option value="6,4">6 et 4</option>
      <option value="10,6">10 et 6</option>
      <option value="9,7">9 et 7</option>
      <option value="As,6">As et 6</option>
      <option value="As,7">As et 7</option>
      <option value="8,8">8 et 8</option>
      <option value="10,10">10 et 10</option>
      <option value="9,9">9 et 9</option>
      <!-- Ajoute d'autres mains au besoin -->
    </select>
  </div>

  <div>
    <label for="dealerCard">Carte du croupier :</label><br>
    <select id="dealerCard">
      <option value="">-- Choisir --</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="As">As</option>
    </select>
  </div>

  <button onclick="analyser()">Analyser</button>
  <button onclick="reset()">Nouvelle main</button>

  <div class="result" id="resultat"></div>

  <script>
    function analyser() {
      const main = document.getElementById('playerHand').value;
      const dealer = document.getElementById('dealerCard').value;
      const res = document.getElementById('resultat');

      if (!main || !dealer) {
        res.textContent = 'Choisis les deux cartes.';
        return;
      }

      let [carte1, carte2] = main.split(',');
      let total = 0;
      let hasAce = false;

      if (carte1 === 'As' || carte2 === 'As') hasAce = true;
      total += carte1 === 'As' ? 11 : parseInt(carte1);
      total += carte2 === 'As' ? 11 : parseInt(carte2);
      if (hasAce && total > 21) total -= 10;

      const isPair = carte1 === carte2;
      const isSoft = hasAce && total < 21;

      // LOGIQUE SIMPLIFIÉE
      let action = '';

      if (isPair) {
        if (carte1 === '8') action = 'Séparer';
        else if (carte1 === 'As') action = 'Séparer';
        else if (carte1 === '9' && ['7','10','As'].includes(dealer)) action = 'Rester';
        else if (carte1 === '9') action = 'Séparer';
        else if (carte1 === '10') action = 'Rester';
        else action = 'Ne pas séparer';
      }
      else if (isSoft) {
        if (total === 18 && ['2','7','8'].includes(dealer)) action = 'Rester';
        else if (total === 18 && ['3','4','5','6'].includes(dealer)) action = 'Doubler si possible';
        else if (total === 18) action = 'Tirer';
        else if (total <= 17 && ['4','5','6'].includes(dealer)) action = 'Doubler si possible';
        else action = 'Tirer';
      }
      else {
        if (total <= 8) action = 'Tirer';
        else if (total === 9 && ['3','4','5','6'].includes(dealer)) action = 'Doubler si possible';
        else if (total === 10 && dealer < 10) action = 'Doubler si possible';
        else if (total === 11) action = 'Doubler si possible';
        else if (total === 12 && ['4','5','6'].includes(dealer)) action = 'Rester';
        else if (total >= 13 && total <= 16 && dealer <= 6) action = 'Rester';
        else if (total >= 17) action = 'Rester';
        else action = 'Tirer';
      }

      res.textContent = `Décision : ${action}`;
    }

    function reset() {
      document.getElementById('playerHand').value = '';
      document.getElementById('dealerCard').value = '';
      document.getElementById('resultat').textContent = '';
    }
  </script>
</body>
</html>
