<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paye Chauffeur - Semaine</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: #f8f9fa;
    }
    .pastille {
      background: white;
      border: 2px solid #dee2e6;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      min-width: 220px;
    }
    .pastille h5 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }
    .pastille .details {
      font-size: 0.9rem;
      line-height: 1.3;
    }
    .grid-week {
      display: flex;
      flex-wrap: nowrap;
      gap: 12px;
      overflow-x: auto;
      margin-bottom: 2rem;
    }
    .summary-box {
      border: 2px solid #ccc;
      border-radius: 8px;
      padding: 1rem;
      background: #e6f4ea;
    }
    .summary-box h5 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body class="p-4">

  <div class="container">
    <h2 class="mb-4">Semaine de paie - Visualisation</h2>

    <!-- Sélection -->
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label">Nom du chauffeur</label>
        <select id="chauffeurSelect" class="form-select">
          <option value="">-- Choisir --</option>
          <option value="Jean Tremblay">Jean Tremblay</option>
          <option value="Marie Dubois">Marie Dubois</option>
          <option value="Luc Desjardins">Luc Desjardins</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Date d'une journée de la semaine</label>
        <input type="date" id="dateInput" class="form-control" />
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="loadSemaine()">Charger la semaine enregistrée</button>
      </div>
    </div>

    <!-- Pastilles -->
    <div class="grid-week" id="pastillesContainer">
      <!-- pastilles journalières générées ici -->
    </div>

    <!-- Sommaire -->
    <div class="summary-box">
      <h5>Totaux de la semaine</h5>
      <p><strong>Kilomètres totaux :</strong> <span id="totalKm">0</span> km</p>
      <p><strong>Heures totales :</strong> <span id="totalH">0h00</span></p>
      <p><strong>Forfaits / Primes :</strong> <span id="totalPrime">0.00</span> $</p>
    </div>

    <div class="mt-4 d-flex gap-3">
      <button class="btn btn-secondary" onclick="changerSemaine()">Changer la semaine</button>
      <button class="btn btn-success" onclick="sauvegarderSemaine()">Enregistrer cette semaine dans Firebase</button>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD4U85mokKXsAP1AdwClWtcbt8udZrwlAw",
      authDomain: "sommaireelz.firebaseapp.com",
      projectId: "sommaireelz",
      storageBucket: "sommaireelz.firebasestorage.app",
      messagingSenderId: "171788284751",
      appId: "1:171788284751:web:694f070d1cafe8b7c04b3a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

  <!-- JS logique -->
  <script>
    function getWeekDates(dateStr) {
      const date = new Date(dateStr);
      const monday = new Date(date.setDate(date.getDate() - date.getDay() + 1));
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        dates.push(d.toISOString().split("T")[0]);
      }
      return dates;
    }

    async function loadSemaine() {
  const chauffeur = document.getElementById("chauffeurSelect").value;
  const date = document.getElementById("dateInput").value;
  if (!chauffeur || !date) return alert("Sélectionnez un chauffeur et une date");

  const tauxMap = await fetchTauxChauffeurs();
  const taux = tauxMap[chauffeur];
  if (!taux) return alert("Taux non trouvés pour ce chauffeur");

  const dates = getWeekDates(date);
  document.getElementById("pastillesContainer").innerHTML = "";

  let totalKm = 0, totalMin = 0, totalPrime = 0;
  let promises = [];

  dates.forEach(day => {
    const p = db.collection("paye_semaine")
      .where("chauffeur", "==", chauffeur)
      .where("date", "==", day)
      .limit(1)
      .get()
      .then(snapshot => {
        if (!snapshot.empty) {
          const data = snapshot.docs[0].data();
          totalKm += data.km || 0;
          totalMin += data.minutes || 0;
          totalPrime += data.prime || 0;

          const pastille = document.createElement("div");
          pastille.className = "pastille";
          pastille.innerHTML = `
            <h5>${new Date(day).toLocaleDateString("fr-CA", { weekday: "long", day: "numeric", month: "short" })}</h5>
            <div class="details">
              <div><strong>Destination:</strong> ${data.destination || "—"}</div>
              <div><strong>KM:</strong> ${data.km || 0}</div>
              <div><strong>Heures:</strong> ${Math.floor((data.minutes || 0) / 60)}h${String((data.minutes || 0) % 60).padStart(2, '0')}</div>
              <div><strong>Forfait:</strong> ${data.prime?.toFixed(2) || "0.00"} $</div>
            </div>`;
          document.getElementById("pastillesContainer").appendChild(pastille);
        }
      });

    promises.push(p);
  });

  Promise.all(promises).then(() => {
    // Une fois TOUTES les journées chargées
    document.getElementById("totalKm").textContent = totalKm;
    document.getElementById("totalH").textContent = `${Math.floor(totalMin / 60)}h${String(totalMin % 60).padStart(2, '0')}`;
    document.getElementById("totalPrime").textContent = totalPrime.toFixed(2);

    const montantKm = totalKm * taux.taux_km;
    const montantHeures = (totalMin / 60) * taux.taux_h;
    const totalPayable = montantKm + montantHeures + totalPrime;

    const summary = document.querySelector(".summary-box");
    const montantEl = document.createElement("p");
    montantEl.innerHTML = `<strong>Montant total estimé :</strong> <span class="text-success fw-bold">${totalPayable.toFixed(2)} $</span>`;
    summary.appendChild(montantEl);
  });
}

    function changerSemaine() {
      document.getElementById("dateInput").value = "";
      document.getElementById("pastillesContainer").innerHTML = "";
      document.getElementById("totalKm").textContent = "0";
      document.getElementById("totalH").textContent = "0h00";
      document.getElementById("totalPrime").textContent = "0.00";
    }

    function sauvegarderSemaine() {
      alert("Fonction SAVE désactivée ici pour éviter d’écraser les données — à activer quand prêt.");
      // Tu pourras copier la logique de sauvegarde depuis ton autre projet ici
    }
  </script>
<script>
  async function fetchTauxChauffeurs() {
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTcInEzmgjQHLhoFTkgPJzJ9e2gGs6OgTLkqXf7LxSW62S-1WOBNzbQL9vjYR7KEfyy-dOnr1_hrUQE/pub?output=csv'; // Remplace TON_ID par l'ID de ta feuille
    const response = await fetch(url);
    const data = await response.text();
    const rows = data.split('\n').slice(1); // Ignore l'en-tête
    const tauxMap = {};

    rows.forEach(row => {
      const [nom, tauxKm, tauxH] = row.split(',');
      if (nom && tauxKm && tauxH) {
        tauxMap[nom.trim()] = {
          taux_km: parseFloat(tauxKm),
          taux_h: parseFloat(tauxH)
        };
      }
    });

    return tauxMap;
  }
</script>

  
</body>
</html>
