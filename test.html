<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacances Chauffeurs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }

    header {
      background: #000;
      color: white;
      text-align: center;
      padding: 1rem;
      font-size: 1.5rem;
    }

    #calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      padding: 10px;
    }

    .day, .week-label {
      text-align: center;
      padding: 10px;
      background: white;
      border-radius: 5px;
    }

    .taken {
      background-color: #ff4d4d;
      color: white;
    }

    .selected {
      background-color: #4da6ff;
      color: white;
    }

    .week-label {
      grid-column: span 7;
      background: #ddd;
      font-weight: bold;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      font-size: 1rem;
      background: #000;
      color: white;
      border: none;
      border-radius: 5px;
    }

    @media (max-width: 600px) {
      #calendar {
        grid-template-columns: repeat(7, 1fr);
      }
    }
  </style>
</head>
<body>

  <header>Planification des Vacances</header>

  <div id="calendar"></div>

  <button onclick="submitVacation()">Demander cette semaine</button>

  <script>
    const takenWeeks = ['2025-07-01', '2025-07-08']; // début des semaines prises (à personnaliser)
    const calendarEl = document.getElementById('calendar');
    const today = new Date();
    const selectedWeeks = [];

    function getStartOfWeek(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(d.setDate(diff));
    }

    function generateCalendar(month, year) {
      calendarEl.innerHTML = '';

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);

      let date = new Date(firstDay);
      let currentWeekStart = getStartOfWeek(date);

      while (currentWeekStart <= lastDay) {
        const weekLabel = document.createElement('div');
        weekLabel.className = 'week-label';
        weekLabel.textContent = `Semaine du ${currentWeekStart.toLocaleDateString('fr-CA')}`;
        calendarEl.appendChild(weekLabel);

        for (let i = 0; i < 7; i++) {
          const day = new Date(currentWeekStart);
          day.setDate(currentWeekStart.getDate() + i);

          const dayDiv = document.createElement('div');
          dayDiv.className = 'day';
          dayDiv.textContent = day.getDate();

          const weekKey = currentWeekStart.toISOString().slice(0, 10);
          if (takenWeeks.includes(weekKey)) {
            dayDiv.classList.add('taken');
          } else {
            dayDiv.onclick = () => selectWeek(weekKey);
          }

          calendarEl.appendChild(dayDiv);
        }

        currentWeekStart.setDate(currentWeekStart.getDate() + 7);
      }
    }

    function selectWeek(weekStart) {
      if (takenWeeks.includes(weekStart)) return;

      const alreadySelected = selectedWeeks.includes(weekStart);
      if (alreadySelected) {
        selectedWeeks.splice(selectedWeeks.indexOf(weekStart), 1);
      } else {
        selectedWeeks.push(weekStart);
      }

      generateCalendar(today.getMonth(), today.getFullYear());
      selectedWeeks.forEach(week => {
        const elems = [...document.querySelectorAll('.week-label')]
          .filter(el => el.textContent.includes(week));
        elems.forEach(el => el.classList.add('selected'));
      });
    }

    function submitVacation() {
      if (selectedWeeks.length === 0) {
        alert("Veuillez sélectionner une semaine.");
        return;
      }

      // Ici, on pourrait envoyer les semaines sélectionnées avec fetch()
      alert("Semaine demandée : " + selectedWeeks.join(', '));
    }

    generateCalendar(today.getMonth(), today.getFullYear());
  </script>

</body>
</html>
