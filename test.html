<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendrier Vacances</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: calc(100% - 20px); /* Ajuster la largeur pour inclure les marges */
      height: calc(100% - 20px); /* Ajuster la hauteur pour inclure les marges */
      border: none;
      display: block;
      margin: 10px; /* Ajouter des marges de 10px */
    }
    @media (max-width: 600px) {
      iframe {
        width: calc(100% - 20px); /* Réduire les marges sur les petits écrans */
        height: calc(100% - 20px); /* Réduire les marges sur les petits écrans */
        margin: 15px; /* Ajouter des marges de 5px */
      }
    }
  </style>
</head>
<body>
  <iframe
    src="https://script.google.com/macros/s/AKfycbzZFiURdOcjJmlRKbofpuPDDz9yjZlejrJMVHyJSA-cSYH5MqHg8yZ0b5JWY8nHahxQoQ/exec"
    allowfullscreen
    loading="lazy"
    scrolling="no"
  ></iframe>
</body>
</html>
