<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacances Chauffeurs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background-color: #000;
      color: white;
      text-align: center;
      padding: 1rem;
    }
    header img {
      max-height: 70px;
      margin-bottom: 10px;
    }
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }
    .controls {
      text-align: center;
      margin-bottom: 10px;
    }
    select#chauffeur {
      font-size: 1.2rem;
      padding: 12px;
      width: 80%;
      max-width: 400px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .rang-message {
      text-align: center;
      font-size: 1rem;
      font-weight: bold;
      margin-top: 10px;
      color: #333;
    }
    .remarks {
      text-align: center;
      font-size: 1.2rem;
      color: red;
      font-weight: bold;
      margin: 20px 0;
    }
    .month-display {
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      margin: 20px 0 5px 0;
    }
    .month-nav {
      text-align: center;
      margin-bottom: 20px;
    }
    .month-nav button {
      background-color: transparent;
      color: red;
      font-size: 1rem;
      border: none;
      margin: 0 10px;
      cursor: pointer;
    }
    #calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .day-name {
      text-align: center;
      font-weight: bold;
      background: #ddd;
      padding: 8px;
      border-radius: 4px;
    }
    .day {
      text-align: center;
      background: white;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .day:hover {
      background: #e0e0e0;
    }
    .taken {
      background-color: #ff4d4d !important;
      color: white;
      cursor: not-allowed;
    }
    .selected {
      background-color: #4da6ff !important;
      color: white;
    }
    .today {
      background-color: #4CAF50 !important;
      color: white;
    }
    button#submit {
      display: block;
      margin: 30px auto 10px auto;
      padding: 12px 24px;
      font-size: 1rem;
      background: #000;
      color: white;
      border: none;
      border-radius: 5px;
    }
    #confirmation {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <header>
    <img src="assets/logo.jpeg" alt="Logo">
    <div>Planification des Vacances</div>
  </header>
  <div class="container">
    <div class="remarks">
      <p>MAXIMUM 2 SEMAINES CONSÉCUTIVES</p>
      <p>MAXIMUM 1 PERSONNE À LA FOIS</p>
    </div>

    <div class="controls">
      <select id="chauffeur" onchange="afficherRang()">
        <option value="">-- Sélectionnez votre nom --</option>
        <option value="Kevin Roy">Kevin Roy</option>
        <option value="Luc Tremblay">Luc Tremblay</option>
        <option value="Marie Duval">Marie Duval</option>
      </select>
    </div>
    <div class="rang-message" id="rangMessage"></div>

    <div class="month-display" id="month-year"></div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">← Mois précédent</button>
      <button onclick="changeMonth(1)">Mois suivant →</button>
    </div>

    <div id="calendar"></div>

    <button id="submit" onclick="submitVacation()">Demander cette semaine</button>

    <div id="confirmation"></div>
  </div>

  <script>
    const takenWeeks = ['2025-07-01', '2025-07-08'];
    let selectedWeeks = [];
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    const dayNames = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
    const today = new Date();

    // Données fictives de classement (à remplacer par données Sheets)
    const classement = {
      "Luc Tremblay": { rang: 1, anciennete: "9 ans" },
      "Marie Duval": { rang: 2, anciennete: "5 ans" },
      "Kevin Roy": { rang: 3, anciennete: "3 ans" }
    };

    function afficherRang() {
      const nom = document.getElementById("chauffeur").value;
      const div = document.getElementById("rangMessage");
      if (classement[nom]) {
        div.innerHTML = `Tu es actuellement <strong>#${classement[nom].rang}</strong> dans la liste (ancienneté : ${classement[nom].anciennete}).`;
      } else {
        div.innerHTML = "";
      }
    }

    function getStartOfWeek(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day;
      return new Date(d.setDate(diff));
    }

    function formatDate(date) {
      return date.toISOString().split('T')[0];
    }

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      } else if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      generateCalendar(currentMonth, currentYear);
    }

    function toggleWeekFromDate(clickedDate) {
      const weekStart = getStartOfWeek(clickedDate);
      const weekKey = formatDate(weekStart);

      if (takenWeeks.includes(weekKey)) {
        alert("Cette semaine est déjà prise.");
        return;
      }

      if (selectedWeeks.length >= 2 && !selectedWeeks.includes(weekKey)) {
        alert("Vous ne pouvez sélectionner que deux semaines maximum.");
        return;
      }

      const index = selectedWeeks.indexOf(weekKey);
      if (index > -1) {
        selectedWeeks.splice(index, 1);
      } else {
        selectedWeeks.push(weekKey);
      }

      generateCalendar(currentMonth, currentYear);
    }

    function generateCalendar(month, year) {
      const calendar = document.getElementById('calendar');
      const monthYear = document.getElementById('month-year');
      const firstDay = new Date(year, month, 1);
      const startDay = new Date(firstDay);
      startDay.setDate(1 - firstDay.getDay());

      calendar.innerHTML = '';
      monthYear.textContent = firstDay.toLocaleString('fr-FR', { month: 'long', year: 'numeric' }).toUpperCase();

      for (let i = 0; i < 7; i++) {
        const dayName = document.createElement('div');
        dayName.className = 'day-name';
        dayName.textContent = dayNames[i];
        calendar.appendChild(dayName);
      }

      for (let i = 0; i < 42; i++) {
        const day = new Date(startDay);
        day.setDate(startDay.getDate() + i);
        const dayDiv = document.createElement('div');
        dayDiv.className = 'day';
        dayDiv.textContent = day.getDate();

        const weekStart = getStartOfWeek(day);
        const weekKey = formatDate(weekStart);

        if (day.getMonth() !== month) {
          dayDiv.style.opacity = "0.3";
        }

        if (takenWeeks.includes(weekKey)) {
          dayDiv.classList.add('taken');
        } else if (selectedWeeks.includes(weekKey)) {
          const selectedStart = new Date(weekStart);
          const selectedEnd = new Date(weekStart);
          selectedEnd.setDate(selectedEnd.getDate() + 6);
          if (day >= selectedStart && day <= selectedEnd) {
            dayDiv.classList.add('selected');
            dayDiv.style.opacity = "1";
          }
          dayDiv.onclick = () => toggleWeekFromDate(day);
        } else {
          dayDiv.onclick = () => toggleWeekFromDate(day);
        }

        if (day.toDateString() === today.toDateString()) {
          dayDiv.classList.add('today');
        }

        calendar.appendChild(dayDiv);
      }
    }

    function submitVacation() {
      const chauffeur = document.getElementById('chauffeur').value;
      if (!chauffeur) {
        alert("Veuillez sélectionner votre nom.");
        return;
      }

      if (selectedWeeks.length === 0) {
        alert("Aucune semaine sélectionnée.");
        return;
      }

      const confirmationPage = `
        <html>
        <head>
          <title>Confirmation</title>
          <meta name="viewport" content="width=device-width, initial-scale=1.0" />
          <style>
            body {
              font-family: Arial, sans-serif;
              margin: 0;
              background: #f4f4f4;
              text-align: center;
              padding: 20px;
            }
            h2 {
              margin-top: 20px;
              font-size: 2.5rem;
            }
            p {
              font-size: 1.5rem;
            }
            ul {
              list-style-type: none;
              padding: 0;
            }
            li {
              background: #4da6ff;
              color: white;
              padding: 15px;
              margin: 10px 0;
              border-radius: 5px;
              font-size: 1.5rem;
            }
            button {
              margin-top: 20px;
              padding: 15px 30px;
              background: #4CAF50;
              color: white;
              border: none;
              border-radius: 5px;
              font-size: 1.5rem;
              cursor: pointer;
            }
          </style>
        </head>
        <body>
          <h2>Confirmation</h2>
          <p>${chauffeur}, vous avez demandé les semaines suivantes :</p>
          <ul>${selectedWeeks.map(w => `<li>${w}</li>`).join('')}</ul>
          <p>On vous revient rapidement avec l'approbation.</p>
          <button onclick="window.close()">Retour au calendrier 📅</button>
        </body>
        </html>
      `;

      const newWindow = window.open('', '_blank');
      newWindow.document.write(confirmationPage);
      newWindow.document.close();
    }

    generateCalendar(currentMonth, currentYear);
  </script>
</body>
</html>
