
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacances Chauffeurs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
    }
    header {
      background: #000;
      color: white;
      text-align: center;
      padding: 1rem;
    }
    header img {
      max-height: 70px;
      margin-bottom: 10px;
    }
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }
    select, button {
      font-size: 1.2rem;
      padding: 12px;
      width: 100%;
      max-width: 400px;
      margin: 10px auto;
      display: block;
    }
    .info {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <img src="assets/logo.jpeg" alt="Logo" />
    <div>Planification des Vacances</div>
  </header>

  <div class="container">
    <select id="chauffeur">
      <option value="">-- Sélectionnez votre nom --</option>
    </select>
    <div class="info" id="info"></div>
    <button onclick="chargerChauffeurs()">Recharger les données</button>
  </div>

  <script>
    const url = "https://script.google.com/macros/s/AKfycbx4iR4bZucxF5yazJU_DkHTTGXHk4ZNMPPF1WiG28ZjqV4W8TdBvAggf9jMGWQjUFPhtA/exec";

    function chargerChauffeurs() {
      fetch(url, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "getChauffeursData" })
      })
      .then(res => res.json())
      .then(data => {
        const select = document.getElementById("chauffeur");
        select.innerHTML = '<option value="">-- Sélectionnez votre nom --</option>';
        data.forEach(chauffeur => {
          const option = document.createElement("option");
          option.value = chauffeur.nom;
          option.textContent = chauffeur.nom;
          select.appendChild(option);
        });
        document.getElementById("info").textContent = "Données chargées avec succès.";
      })
      .catch(err => {
        document.getElementById("info").textContent = "Erreur de chargement.";
        console.error(err);
      });
    }

    // Chargement initial
    window.onload = chargerChauffeurs;
  </script>
</body>
</html>
